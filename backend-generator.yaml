# ============================================================================
# TESTING CONFIGURATION
# ============================================================================
testing:
  framework: 'vitest'

  # Test struktura
  test_files:
    - '{module_name}.repository.test.ts' # Unit testovi za repository
    - '{module_name}.service.test.ts' # Unit testovi za service
    - '{module_name}.controller.test.ts' # Unit testovi za controller (opciono)
    - '{module_name}.integration.test.ts' # Integration testovi (opciono)

  # Test patterns
  patterns:
    # Repository testovi:
    repository_tests:
      file: '{module_name}.repository.test.ts'
      location: 'src/modules/{module_name}/__tests__/'
      pattern: |
        import { describe, it, expect, beforeEach, vi } from 'vitest';
        import { {Module}Repository } from '../{module_name}.repository';
        import { getPoolSync } from '../../../config/db.config';

        vi.mock('../../../config/db.config');

        describe('{Module}Repository', () => {
          let repo: {Module}Repository;
          let mockClient: any;
          let mockQuery: any;

          beforeEach(() => {
            repo = new {Module}Repository();
            mockQuery = vi.fn();
            mockClient = {
              query: mockQuery,
              release: vi.fn(),
            };
            vi.mocked(getPoolSync).mockReturnValue({
              connect: vi.fn().mockResolvedValue(mockClient),
            } as any);
          });

          # OBAVEZNO testirati sve metode:
          # - listDomains (sa translation filtering, empty translation - text: null)
          # - findDomainById (sa translation, null return)
          # - listTranslations (ako ima _x tabelu)
          # - createDomain (sa translations - vraća translation sa grammcase i text iz dto.translations[0], bez translations - vraća translation sa null, rollback)
          # - updateDomain (sa translations - vraća translation sa grammcase i text iz dto.translations[0], bez translations - vraća translation sa null, null return, rollback)
          # - removeDomain (success, not found, rollback)
      test_cases:
        - 'Mock database connection (pool.connect)'
        - 'Test CRUD operacije'
        - 'Test translation handling (fetchTranslations)'
        - 'Test foreign key joins'
        - 'Test transaction handling (BEGIN, COMMIT, ROLLBACK)'
        - 'Test error handling'

    # Service testovi:
    service_tests:
      file: '{module_name}.service.test.ts'
      location: 'src/modules/{module_name}/__tests__/'
      pattern: |
        import { describe, it, expect, beforeEach, vi } from 'vitest';
        import { {Module}Service } from '../{module_name}.service';
        import { {Module}Repository } from '../{module_name}.repository';
        import { AppError } from '../../../core/errors/AppError';

        let mockRepo: any;

        function repoFactory() {
          return mockRepo;
        }

        vi.mock('../{module_name}.repository', () => {
          return {
            {Module}Repository: class {
              constructor() {
                return repoFactory();
              }
            },
          };
        });

        vi.mock('../../../core/utils/uniqueId', () => ({
          uniqueId: () => 'generated-id',
        }));

        describe('{Module}Service', () => {
          let service: {Module}Service;

          beforeEach(() => {
            process.env.DEFAULT_LANG = 'en';
            mockRepo = {
              listDomains: vi.fn(),
              findDomainById: vi.fn(),
              createDomain: vi.fn(),
              updateDomain: vi.fn(),
              removeDomain: vi.fn(),
              listTranslations: vi.fn(), // ako ima _x tabelu
            };
            service = new {Module}Service();
          });

          # OBAVEZNO testirati:
          # - list (default lang, custom lang)
          # - getOne (success, not found -> AppError)
          # - create (validation, sa simplified input - text i grammcase top-level, provera da se generiše ID za translations, auto-fill code ako ima)
          # - update (validation, sa simplified input - text i grammcase top-level, provera da se generiše ID za translations, not found -> AppError)
          # - remove (success, not found -> AppError)
          # - translations (ako ima _x tabelu)
          # - resolveLang (DEFAULT_LANG, custom lang, missing lang -> AppError)
      test_cases:
        - 'Mock repository (NE mock database) - koristi repoFactory pattern'
        - 'Mock uniqueId() funkcija'
        - 'Test list - default lang (DEFAULT_LANG), custom lang forwarding'
        - 'Test getOne - success, not found -> AppError 404'
        - 'Test create - Zod validation (invalid data), sa translations (ID generisan), auto-fill code (ako ima code polje)'
        - 'Test update - Zod validation, sa simplified input (text + grammcase), not found -> AppError 404'
        - 'Test remove - success, not found -> AppError 404'
        - 'Test translations - wrapper za listTranslations (ako ima _x tabelu)'
        - 'Test resolveLang - DEFAULT_LANG, custom lang, missing lang -> AppError'
      critical_rules: |
        # ⚠️ KRITIČNO - Service testovi:
        # 1. Mock repository koristi repoFactory pattern (NE direktno mockImplementation)
        # 2. Mock uniqueId() da vraća 'generated-id'
        # 3. Test create - proveri da se ID-jevi generišu za translations (expect.objectContaining sa id: 'generated-id')
        # 4. Test create - proveri auto-fill code = id ako code nije prosleđen ili je prazan string (ako modul ima code polje)
        # 5. Test create - proveri simplified input (text i grammcase top-level, ne translations array)
        # 6. Test update - proveri simplified input (text i grammcase top-level, ne translations array)
        # 7. Test update - proveri da se ID generiše za translations (uniqueId() za svaki translation)
        # 8. Test resolveLang - proveri da se DEFAULT_LANG koristi, custom lang prosleđuje, missing lang -> AppError
        # 9. Test error handling - AppError sa 404 za not found

    # Integration testovi:
    integration_tests:
      file: '{module_name}.integration.test.ts'
      location: 'src/modules/{module_name}/__tests__/'
      pattern: |
        import { describe, it, expect, beforeAll, afterAll, afterEach } from 'vitest';
        import { getPoolSync } from '../../../config/db.config';
        import { {Module}Repository } from '../{module_name}.repository';
        import { {Module}Service } from '../{module_name}.service';
        import { uniqueId } from '../../../core/utils/uniqueId';
        import { attemptDatabaseConnection, checkTableExists } from '../../../core/test-helpers/db-connection';

        // ⚠️ VAŽNO: Ovaj test koristi STVARNU BAZU!
        // Koristi prave parametre iz .env fajla
        // Pokušava konekciju 5 puta sa čekanjem između pokušaja
        const shouldSkip = process.env.SKIP_INTEGRATION_TESTS === 'true';
        (shouldSkip ? describe.skip : describe)(
          '{Module}Repository - Integration Tests (Real Database)',
          () => {
          let repo: {Module}Repository;
          let service: {Module}Service;
          let testIds: string[] = [];
          let dbConnected = false;
          let tablesExist = false;

          beforeAll(async () => {
            repo = new {Module}Repository();
            service = new {Module}Service();
            
            // Pokušaj konekciju sa bazom (5 pokušaja sa čekanjem)
            const connectionResult = await attemptDatabaseConnection();
            
            if (!connectionResult.connected) {
              // eslint-disable-next-line no-console
              console.warn(
                `⚠️  Integration tests skipped: ${connectionResult.message}. Set SKIP_INTEGRATION_TESTS=true to skip.`
              );
              dbConnected = false;
              return;
            }
            
            dbConnected = true;
            
            // Proveri da li tabele postoje (koristi pool iz connectionResult)
            tablesExist = await checkTableExists('{table_name}', 'iis', connectionResult.pool || undefined);
            
            if (!tablesExist) {
              // eslint-disable-next-line no-console
              console.warn(
                '⚠️  Integration tests skipped: Database tables not found in iis schema. Please run migrations first. Set SKIP_INTEGRATION_TESTS=true to skip.'
              );
              return;
            }
          });

          afterAll(async () => {
            // Cleanup test data if needed
          });

          afterEach(async () => {
            // Obriši test podatke samo ako je konekcija uspešna
            if (dbConnected && tablesExist && testIds.length > 0) {
              const pool = getPoolSync();
              const client = await pool.connect();
              try {
                for (const id of testIds) {
                  // Obriši translations ako postoje
                  // await client.query('DELETE FROM iis.{table_name}x WHERE tableid::text = $1', [id]);
                  // Obriši main record
                  await client.query('DELETE FROM iis.{table_name} WHERE id::text = $1', [id]);
                }
                testIds = [];
              } finally {
                client.release();
              }
            } else {
              testIds = [];
            }
          });

          describe('CRUD Flow', () => {
            it('should create, read, update, and delete {module_name}', async () => {
              if (!dbConnected || !tablesExist) {
                // eslint-disable-next-line no-console
                console.log('⏭️  Skipping test: dbConnected=', dbConnected, 'tablesExist=', tablesExist);
                return;
              }
              // Real database test
            });
          });
        });
      standard_rules: |
        # OBAVEZNA PRAVILA ZA INTEGRACIONE TESTOVE:
        
        1. **Database Connection Helper:**
           - OBAVEZNO koristiti `attemptDatabaseConnection()` iz `src/core/test-helpers/db-connection.ts`
           - OBAVEZNO koristiti `checkTableExists()` za proveru postojanja tabela
           - Helper pokušava konekciju 5 puta sa čekanjem između pokušaja
           - Koristi prave parametre iz .env fajla (DB_CONFIG)
        
        2. **Conditional Test Execution:**
           - NIKADA koristiti `it.skipIf()` ili `describe.skipIf()` - oni se evaluiraju na vreme definicije, ne izvršavanja
           - Umesto toga, koristiti `if (!dbConnected || !tablesExist) { return; }` unutar svakog `it()` bloka
           - Koristiti `(shouldSkip ? describe.skip : describe)` samo za SKIP_INTEGRATION_TESTS env varijablu
        
        3. **Test Structure:**
           - `beforeAll`: Pokušaj konekciju, proveri tabele, kreiraj test dependencies (FK objekti)
           - `afterAll`: Cleanup test dependencies (FK objekti) ako su kreirani
           - `afterEach`: Cleanup test podataka (main table + translation table ako postoji)
           - `testIds`: Array za praćenje svih kreiranih ID-jeva za cleanup
        
        4. **Cleanup Logic:**
           - Cleanup samo ako `dbConnected && tablesExist`
           - Prvo obriši iz translation tabele (ako postoji), pa iz glavne tabele
           - Uvek resetuj `testIds = []` nakon cleanup-a
        
        5. **Unique Test Data:**
           - Koristiti `uniqueId()` za ID-jeve
           - Koristiti `Date.now()` za unique codes/names
           - Koristiti unique codes za tabele sa unique constraints
        
        6. **Error Handling:**
           - Logovati sve greške sa `console.warn()` ili `console.log()`
           - Ne bacati greške u `beforeAll` - samo postaviti `dbConnected = false`
           - Testovi se automatski preskaču ako `dbConnected = false` ili `tablesExist = false`
        
        7. **FK Dependencies:**
           - Ako test zahteva FK objekte (npr. `terr`, `loc`, `par`), kreiraj ih u `beforeAll`
           - Čuvaj ID-jeve FK objekata u varijablama (npr. `testTerrId`, `testLocId`)
           - Cleanup FK objekte u `afterAll` ako su kreirani
        
        8. **Translation Handling:**
           - Ako modul ima translation tabelu, testirati kreiranje i ažuriranje translations
           - Koristiti unique ID-jeve za translations (sa delay između generisanja ako je potrebno)
           - Cleanup translations pre glavne tabele
           
           **Integration Test Pattern za Update sa Translations (Simplified Input):**
           - Kreirati entitet sa simplified input (text i grammcase top-level)
           - ⚠️ VAŽNO: Lang kodovi moraju biti u formatu {language}_{variant} (npr. 'sr_cyr', 'en_usa', 'en_en')
           - Ažurirati translations kroz service.update() sa simplified input (text i grammcase top-level)
           - ⚠️ VAŽNO: updateDomain vraća translation objekat sa grammcase i text iz insertovanih podataka
           - Proveriti rezultat kroz repo.listTranslations(testId) - NE kroz service.getOne()
           - Pattern:
             ```typescript
             // 1. Create sa simplified input
             const createDto = {
               text: 'Test EN',
               code: 'TEST001',
               grammcase: '1',
               valid: 1,
             };
             const created = await service.create(createDto, 'en');
             const testId = created.id;
             
             // 2. Update sa simplified input (text i grammcase top-level)
             const updateDto = {
               id: testId,
               text: 'Updated EN',
               grammcase: '1',
             };
             const updated = await service.update(updateDto, 'en');
             
             // 3. Provera da updateDomain vraća translation sa grammcase i text
             expect(updated.translation).toBeDefined();
             expect(updated.translation.lang).toBe('en');
             expect(updated.translation.grammcase).toBe('1');
             expect(updated.translation.text).toBe('Updated EN');
             
             // 4. Provera kroz listTranslations (NE getOne)
             const translations = await repo.listTranslations(testId);
             expect(translations).toHaveLength(1);
             expect(translations.some((t) => t.lang === 'en' && t.text === 'Updated EN')).toBe(true);
             ```
           - ⚠️ VAŽNO: createDomain takođe vraća translation objekat sa grammcase i text iz dto.translations[0]
           - Ako postoje translations, očekivati translation: { lang, grammcase, text } sa stvarnim vrednostima
           - Ako ne postoje translations, očekivati translation: { lang, grammcase: null, text: null }
           - ⚠️ NE koristiti service.getOne() za proveru translations nakon update-a - koristiti repo.listTranslations()
           - Razlog: updateDomain i createDomain konstruišu translation objekat iz dto.translations[0] podataka, ali za kompletnu proveru koristiti listTranslations()
        
        9. **Service Layer Tests:**
           - Testirati service metode (create, update, remove) sa stvarnom bazom
           - Service testovi takođe koriste `if (!dbConnected || !tablesExist) { return; }`
        
        10. **Numeric Type Conversion:**
            - PostgreSQL vraća numeričke tipove kao stringove u pg biblioteci kada se ne koristi `cast()` u SQL-u
            - Ako DTO definiše numeričke tipove (npr. `rate: number`, `parity: number`), konvertovati u repository-ju
            - Koristiti type-check sa konverzijom: `typeof row.rate === 'string' ? Number.parseFloat(row.rate) : row.rate`
            - Za integer tipove: `typeof row.parity === 'string' ? Number.parseInt(row.parity, 10) : row.parity`
            - Primena: U `listDomains()` i `findDomainById()` metodama u repository-ju, u mapping-u (row => DTO)
            - Primera: `rate: typeof row.rate === 'string' ? Number.parseFloat(row.rate) : row.rate`
        
        11. **Response Structure & Object Types:**
            - **Original Fields:** Uvek prisutni (npr. `country: string`) - ID vrednosti iz baze
            - **Ref Objects:** Uvek prisutni (npr. `countryfk: object`) - detalji iz JOIN query-ja
            - **Translation Objects:** Uvek prisutni (`translation: object`) - za aktivni lang

            **Razdvajanje Translate vs Referencijalni:**
            - **Translate objekti:** `translation` i `translations` - jezičke varijante
            - **Referencijalni objekti:** `countryfk`, `tpobj` itd. - FK reference sa detaljima

        12. **Create vs Update Response Patterns:**
            **Create Response:**
            - Koristi ručno konstruisan objekat (bez dodatnog DB query-ja)
            - Translation: konstruisan iz insertovanih podataka ili {lang, null, null}
            - Ref objekti: prazne vrednosti (code/text: null, translation sa null)
            - Prednost: Brži response bez query-ja

            **Update Response:**
            - Koristi `findDomainById` za kompletne FK podatke
            - Translation: iz baze ili override sa novim (samo ako su insertovani translations)
            - Ref objekti: puni podaci iz JOIN query-ja
            - Prednost: Kompletni ažurirani podaci

        13. **Translation Object Construction:**
            - **Create sa translations:** Konstruiše iz insertovanih podataka za active lang
            - **Create bez translations:** {lang, grammcase: null, text: null}
            - **Update sa translations:** Override-uje sa insertovanim podacima
            - **Update bez translations:** Koristi translation iz baze (ne override-uje)
            - Uvek vraća objekat sa lang, grammcase, text poljima
        
        12. **Code Length Constraints:**
            - Proveriti `maxLength` u DTO schema (Zod) i SQL tabeli definiciji
            - Testovi MORAJU generisati test podatke koji poštuju maxLength ograničenje
            - Primer: Ako `code` kolona je `varchar(10)`, test kod mora biti maksimalno 10 karaktera
            - Pattern: `const testCode = 'PREFIX' + Date.now().toString().slice(-N)` gde je PREFIX.length + N <= maxLength
            - Primer: Za varchar(10) sa prefixom 'C1': `const testCode = 'C1' + Date.now().toString().slice(-8)` (C1 = 2, + 8 cifara = 10 karaktera)
      test_cases:
        - 'Real database connection (5 pokušaja sa čekanjem)'
        - 'Provera postojanja tabela pre testova'
        - 'Test kompletnog flow-a (CREATE -> READ -> UPDATE -> DELETE)'
        - 'Test translation handling sa stvarnom bazom (ako modul ima translation tabelu)'
        - 'Test foreign key joins sa stvarnom bazom'
        - 'Test service layer metode (create, update, remove)'
        - 'Cleanup nakon testova (briše sve što je testirano)'
        - 'Conditional test execution (preskače ako nema konekcije ili tabele)'
        - 'Transaction rollback testovi'
        - 'Unique test data (uniqueId(), Date.now())'

      cleanup: |
        # OBAVEZNO: Obriši sve test podatke nakon svakog testa
        # Koristi afterEach hook za cleanup
        # Cleanup samo ako dbConnected && tablesExist
        # Prvo obriši iz translation tabele (ako postoji), pa iz glavne tabele
        # Koristi unique test data (uniqueId(), Date.now())
        # Loguj sve kreirane/ažurirane/obrisane podatke za debugging

    # Test arhitektura:
    test_architecture:
      layer_separation: |
        # Testovi prate arhitekturu:
        # - Repository testovi: Mock database connection, test SQL upite
        # - Service testovi: Mock repository, test business logiku
        # - Controller testovi (opciono): Mock service, test request/response handling
        # - Integration testovi: Real database, test kompletnog flow-a

      mocking_strategy: |
        # Repository testovi:
        # - Mock: pool.connect(), pool.query()
        # - Test: SQL upiti, transaction handling, data mapping

        # Service testovi:
        # - Mock: Repository instance
        # - Test: Business logika, validacija, error handling

        # Integration testovi:
        # - Mock: NIJEŠTA (koristi real database)
        # - Test: Kompletan flow, cleanup

      test_data: |
        # Koristi unique test data:
        # - Timestamp u username/email
        # - Random string za ID
        # - Test prefix za sve test podatke (npr. "testuser_")

        # Primer:
        # const testUsername = `testuser_${Date.now()}_${Math.random().toString(36).substring(7)}`;

  # Coverage
  coverage:
    enabled: true
    threshold: 80 # Minimum coverage percentage
    exclude: ['node_modules/', 'dist/', '**/*.d.ts', '**/__tests__/**']

  # Test struktura po modulu:
  module_test_structure: |
    src/modules/{module_name}/__tests__/
      ├── {module_name}.repository.test.ts  # Unit testovi za repository
      ├── {module_name}.service.test.ts     # Unit testovi za service
      └── {module_name}.integration.test.ts  # Integration testovi (opciono)

  # Test best practices:
  best_practices:
    - '⚠️ OBAVEZNO: Svi moduli MORAJU imati SVE tri vrste testova (repository, service, integration)'
    - '⚠️ Svi testovi MORAJU proći (OK status) pre prelaska na sledeći modul'
    - 'Repository testovi: Mock database (getPoolSync), test SQL upite i mapping, transaction handling'
    - 'Service testovi: Mock repository (repoFactory pattern), Mock uniqueId(), test business logiku, Zod validaciju'
    - 'Integration testovi: Real database (attemptDatabaseConnection), cleanup nakon testova (afterEach)'
    - 'Test CRUD operacije - CREATE, READ (list + getOne), UPDATE, DELETE'
    - 'Test translation handling - sa translations, bez translations, listTranslations (ako ima _x tabelu)'
    - 'Test foreign key joins - FK objekti sa translation-ima (ako ima FK)'
    - 'Test transaction handling - BEGIN, COMMIT, ROLLBACK na error'
    - 'Test error handling - SQL greške, AppError (404 za not found), ZodError (invalid data)'
    - 'Test edge cases - null returns, empty arrays, missing translations'
    - 'Test lang parameter - DEFAULT_LANG, custom lang, missing lang -> AppError'
    - 'Test auto-fill code - code = id ako nije prosleđen ili je prazan string (ako modul ima code polje)'
    - 'Koristi unique test data - uniqueId() za ID, timestamp za unique code/text'
    - 'Test cleanup - briši _x pre glavne tabele (ako ima _x), poštuj FK redosled'
    - '⚠️ Ne prelaziti na drugi modul dok se sve ne završi za jedan modul'

# ============================================================================
# API DOCUMENTATION
# ============================================================================
documentation:
  # Swagger/OpenAPI
  swagger:
    disabled: true # **ZOD-ONLY STANDARD** - Nema Swagger dokumentacije
    version: '3.0.0'
    # **ZOD-ONLY**: Nema schema generacije
    # Zod schemas služe samo za runtime validaciju

  # README.md
  readme:
    # Generiše se detaljni README.md sa:
    # - Features listom
    # - Tech stack-om
    # - Quick start guide-om
    # - Environment variables dokumentacijom
    # - API endpoints dokumentacijom
    # - Testing instrukcijama
    # - Docker instrukcijama
    # - CI/CD instrukcijama
    # - Architecture objašnjenjem
    generate: true

  # Health check endpoints
  health:
    endpoints:
      - path: '/health'
        method: 'GET'
        description: 'Basic health check (status, timestamp, uptime, environment)'
        auth_required: false

      - path: '/healthz'
        method: 'GET'
        description: 'Health check with database connection test'
        auth_required: false
        checks: ['database']

      - path: '/ready'
        method: 'GET'
        description: 'Readiness check for Kubernetes'
        auth_required: false
        checks: ['database']

      - path: '/live'
        method: 'GET'
        description: 'Liveness check for Kubernetes'
        auth_required: false

# ============================================================================
# ENVIRONMENT VARIABLES
# ============================================================================
environment:
  # Obavezni
  required:
    - 'DB_HOST'
    - 'DB_PORT'
    - 'DB_USER'
    - 'DB_PASSWORD'
    - 'DB_DATABASE'
    - 'SECRET' # JWT secret (min 32 karaktera)

  # Opcioni
  optional:
    - 'APP_PORT'
    - 'PORT'
    - 'EXPIRESIN' # JWT expiration (default: "1h")
    - 'REFRESHEXPIRESIN' # Refresh token expiration (default: "1d")
    - 'CORS_ORIGIN' # CORS configuration
    - 'SMTP_HOST' # Email service
    - 'SMTP_PORT'
    - 'SMTP_SECURE'
    - 'SMTP_USER'
    - 'SMTP_PASSWORD'
    - 'SMTP_FROM'
    - 'AUTH_SERVER' # Auth server URL (ili "LOCAL" ili "")
    - 'REQUEST_TIMEOUT' # Request timeout u milisekundama (default: 30000)
    - 'NODE_ENV' # development | production | test
    - 'DATA_CENTAR' # Snowflake data center ID (default: "1")
    - 'ROOT_DIR' # API root directory (default: "badm")
    - 'URL_BASE' # Base URL path (default: "/ticketlines/api")
    - 'WEB_DOMEN' # Web domain za email linkove
    - 'LANG' # Default language (default: "sr_cyr")
    - 'CMN_SERVICE_URL' # Common service URL (opciono)
    - 'AUTH_MAX_RETRIES' # Auth provider max retries
    - 'AUTH_TIMEOUT' # Auth provider timeout
    - 'AUTH_CACHE_TTL' # Auth cache TTL
    - 'PROTECT' # (CMN) Y|N (default: Y) - N iskljucuje JWT i permission provere
    - 'MODULE_PROFILE' # Module profile: full_crud | read_only | integration_only | reporting (default: "full_crud")

  # Validacija
  validation:
    # Koristi Zod schema za validaciju
    # env.schema.ts fajl se generiše automatski
    use_zod: true

# ============================================================================
# CONFIGURATION FILES
# ============================================================================
config_files:
  # TypeScript konfiguracija
  typescript:
    file: 'tsconfig.json'
    target: 'ES2020'
    module: 'CommonJS'
    root_dir: 'src'
    out_dir: 'dist'
    strict: true
    es_module_interop: true
    module_resolution: 'node'
    type_roots: ['./src/core/types', './node_modules/@types']

  # Package.json scripts
  package_scripts:
    - name: 'dev'
      command: 'nodemon --exec ts-node src/server.ts'
      description: 'Development server with hot reload'

    - name: 'build'
      command: 'tsc'
      description: 'Build TypeScript to JavaScript'

    - name: 'start'
      command: 'node dist/server.js'
      description: 'Start production server'

    - name: 'test'
      command: 'vitest'
      description: 'Run tests'

    - name: 'test:coverage'
      command: 'vitest --coverage'
      description: 'Run tests with coverage'

    - name: 'test:ui'
      command: 'vitest --ui'
      description: 'Run tests with UI'

    - name: 'type-check'
      command: 'tsc --noEmit'
      description: 'Type check without building'

    - name: 'lint'
      command: 'eslint src --ext .ts'
      description: 'Lint TypeScript files'

    - name: 'format'
      command: 'prettier --write "src/**/*.ts"'
      description: 'Format code with Prettier'

  # Vitest konfiguracija
  vitest:
    file: 'vitest.config.ts'
    test_match: ['**/*.test.ts', '**/*.spec.ts']
    coverage:
      provider: 'v8'
      reporter: ['text', 'json', 'html']
      exclude: ['node_modules/', 'dist/', '**/*.d.ts']

  # Docker konfiguracija
  docker:
    dockerfile:
      base_image: 'node:20-alpine'
      working_dir: '/app'
      copy_files: ['package*.json', 'tsconfig.json', 'src']
      build_command: 'npm ci && npm run build'
      expose_port: '3000'
      start_command: 'node dist/server.js'

    docker_compose:
      services:
        - name: 'app'
          build: '.'
          ports: ['3000:3000']
          environment: ['.env']
          depends_on: ['postgres']

        - name: 'postgres'
          image: 'postgres:15-alpine'
          environment:
            - 'POSTGRES_DB'
            - 'POSTGRES_USER'
            - 'POSTGRES_PASSWORD'
          ports: ['5432:5432']
          volumes: ['postgres_data:/var/lib/postgresql/data']

  # .gitignore
  gitignore:
    patterns:
      - 'node_modules/'
      - 'dist/'
      - '.env'
      - '.env.*.local'
      - 'coverage/'
      - '*.log'
      - '.DS_Store'
      - '.vscode/'
      - '.idea/'

# ============================================================================
# CUSTOM LOGIC & EXTENSIONS
# ============================================================================
custom:
  # Dodatne definicije za specifične slučajeve
  # Može se koristiti za:
  # - Custom business logiku
  # - Dodatne endpoint-e
  # - Specifične validacije
  # - Custom middleware
  extensions: []

  # Primer:
  # extensions:
  #   - module: "user"
  #     custom_methods:
  #       - name: "activateUser"
  #         description: "Activate user account"
  #         route: "POST /:id/activate"

# ============================================================================
# GENERATION RULES
# ============================================================================
generation:
  # Automatska detekcija iz SQL fajla:
  auto_detect:
    # 1. Detektuje prefiks tabela (npr. "adm_" iz "adm_user")
    # 2. Generiše module_prefix i api_base_path na osnovu prefiksa
    # 3. Detektuje translation tabele po patternu "{table_name}x"
    # 4. Detektuje foreign keys iz SQL definicija
    # 5. Detektuje parent-child relacije za tree strukture (parent_id, parent, loc1/loc2, obj1/obj2, org1/org2)
    # 6. Detektuje view-ove (CREATE VIEW ili CREATE OR REPLACE VIEW)
    # 7. Određuje module profile (iz MODULE_PROFILE env ili YAML konfiguracije)
    # 8. Generiše JOIN-ove u repository-ju za foreign keys
    # 9. Generiše endpoint-e i metode prema odabranom profilu
    # 10. Generiše translation handling za translation tabele
    # 11. Generiše tree endpoint-e za hijerarhijske strukture (ako su detektovane)
    # 12. Generiše read-only module za view-ove (automatski read_only profile)

  # Profile detection workflow:
  profile_detection:
    # 1. Proveri MODULE_PROFILE environment varijablu (prioritet)
    # 2. Ako nije postavljena, proveri project.module_profile.type u YAML
    # 3. Ako nije postavljeno ni u YAML, koristi default: "full_crud"
    # 4. Validira da je profile jedan od: full_crud, read_only, integration_only, reporting
    # 5. Ako nije validan, koristi default i loguje upozorenje

    example: |
      # Environment variable (prioritet):
      MODULE_PROFILE=read_only

      # Ili u YAML:
      project:
        module_profile:
          type: 'read_only'

      # Generator će generisati samo GET endpoint-e i read metode

  # Pravila generisanja:
  rules:
    # Za svaku tabelu koja nije translation tabela:
    - generate_module: true
      files: ['controller', 'service', 'repository', 'routes', 'dto', 'tests']
      skip_if: ['translation_table']
      # View-ovi se NE preskaču - generišu se sa read_only profilom
      # Profile-based generisanje:
      # - full_crud: generiše sve fajlove i metode
      # - read_only: generiše samo read metode (list, getOne)
      # - integration_only: generiše custom integration metode
      # - reporting: generiše read metode + reporting metode
      # - view-ovi: automatski read_only profile

    # Za translation tabele:
    - generate_module: false
      handled_by: 'parent_module'
      pattern: '{table_name}x'

    # Za view-ove:
    - generate_view_module: true
      # View-ovi se generišu kao read-only moduli
      # Automatski se primenjuje read_only profile
      files: ['view.repository', 'view.service', 'view.controller', 'view.routes', 'dto']
      # View-ovi koriste .view. sufiks za fajlove (npr. loc.view.repository.ts)

    # Za foreign keys:
    - generate_joins: true
      # Automatski se generiše JOIN u repository list i detail metodama
      # Primer: adm_user.usergrp -> LEFT JOIN adm_usergrp ON adm_usergrp.id = adm_user.usergrp
      # Generiše se dodatna kolona: usergrpCode (iz adm_usergrp.code)
      # Više kolona mogu referencirati istu tabelu - generiše se JOIN za svaku

    # Profile-based endpoint generisanje:
    - module_profile_rules:
        # Profile se određuje iz:
        # 1. MODULE_PROFILE env varijabla (prioritet)
        # 2. project.module_profile.type u YAML (fallback)
        # 3. Default: "full_crud"

        full_crud:
          endpoints: ['GET /', 'GET /:id', 'POST /', 'PUT /', 'DELETE /:id']
          service_methods: ['list', 'getOne', 'create', 'update', 'remove']
          repository_methods:
            [
              'listDomains',
              'findDomainById',
              'createDomain',
              'updateDomain',
              'removeDomain',
            ]
          notes: |
            - DELETE metoda je obavezna za full_crud profile
            - Za module sa translation tabelama, removeDomain() prvo briše iz translation tabele, pa iz glavne tabele
            - Sve se izvršava u transakciji (BEGIN/COMMIT/ROLLBACK)
          dto_types: ['ListItemDto', 'DetailDto', 'CreateDto', 'UpdateDto']

        read_only:
          endpoints: ['GET /', 'GET /:id']
          service_methods: ['list', 'getOne']
          repository_methods: ['listDomains', 'findDomainById']
          dto_types: ['ListItemDto', 'DetailDto']
          # CreateDto i UpdateDto se NE generišu (ili se generišu ali se ne koriste)

        integration_only:
          endpoints: ['POST /sync', 'POST /sync/:id', 'GET /legacy/:legacyId', 'POST /transform']
          service_methods:
            ['syncFromLegacy', 'syncToLegacy', 'getFromLegacy', 'transformLegacyData']
          repository_methods: ['fetchFromLegacy', 'pushToLegacy', 'mapLegacyData']
          dto_types: ['ListItemDto', 'DetailDto', 'LegacySyncDto', 'TransformDto']
          # Standardni CRUD endpoint-i se NE generišu

        reporting:
          endpoints:
            [
              'GET /',
              'GET /:id',
              'GET /export',
              'GET /statistics',
              'GET /analytics',
              'POST /query',
              'GET /charts/:type',
            ]
          service_methods:
            [
              'list',
              'getOne',
              'exportData',
              'getStatistics',
              'getAnalytics',
              'executeQuery',
              'getChartData',
            ]
          repository_methods:
            ['listDomains', 'findDomainById', 'aggregateData', 'groupBy', 'calculateMetrics']
          dto_types: ['ListItemDto', 'DetailDto', 'StatisticsDto', 'AnalyticsDto', 'ChartDataDto']
          # CreateDto i UpdateDto se NE generišu

    # Za strukturne role:
    - structural_roles:
        # Za sada vraća prazan array za allowedObjects
        # TODO: Implementirati kada bude potrebno
        return_empty_array: true

    # ID generisanje:
    - id_generation_ref: 'layer_rules.service_layer.id_generation'

    # Timestamp handling:
    - timestamps:
        created_at: 'Automatski se postavlja u service.create() (samo za full_crud profile)'
        updated_at: 'Automatski se postavlja u service.update() (samo za full_crud profile)'
        format: 'YYYY-MM-DD HH:mm:ss (nowAsString())'
        # Za read_only, integration_only, reporting profile se NE koristi

    # Password handling:
    - password_fields:
        hash_in_service: true
        function: 'hashPassword()'
        location: 'service.create() metoda (samo za full_crud profile)'
        never_returned: true # Password se nikad ne vraća u response-u
        # Za read_only, integration_only, reporting profile se NE koristi

    # Review fajlovi (CI/CD, checklist, scripts):
    - generate_review_files_ref:
        path: 'structure.review_files'
        note: 'Generator treba da generise sve review fajlove u review/ direktorijumu (bez poddirektorijuma).'

    # Tree/Hijerarhijske Strukture Support (PREDLOŽENO)
    - tree_structures:
        # Automatsko generisanje tree endpoint-a za tabele sa parent-child relacijama
        enabled: true
        description: 'Automatski generiše tree endpoint-e za hijerarhijske strukture'

        # Detekcija parent-child relacija:
        detection:
          # Kolone koje ukazuju na parent-child relaciju:
          parent_child_columns:
            - 'parent_id'
            - 'parent'
            - 'loc1' # Za loclink (loc1 -> loc2)
            - 'loc2' # Za loclink
            - 'obj1' # Za objlink (obj1 -> obj2)
            - 'obj2' # Za objlink
            - 'org1' # Za orglink (org1 -> org2)
            - 'org2' # Za orglink

          # Automatska detekcija:
          # - Ako tabela ima bilo koju od parent-child kolona, generiše tree endpoint
          # - Ako tabela ima `parent_id` ili `parent`, koristi standardni tree pattern
          # - Ako tabela ima `loc1`/`loc2`, `obj1`/`obj2`, `org1`/`org2`, koristi link tree pattern

        # Generisani fajlovi i metode:
        generated_files:
          - '{module}.tree.repository.ts' # Tree repository sa recursive CTE upitom
          - '{module}.tree.service.ts' # Tree service sa validacijom
          - '{module}.tree.controller.ts' # Tree controller
          - '{module}.tree.routes.ts' # Tree routes
          # DTO se dodaje u glavni {module}.dto.ts fajl

        # Endpoint-i:
        endpoints:
          - method: 'GET'
            path: '/{module}/tree/:rootId'
            description: 'Hijerarhijska tree struktura počevši od rootId'
            params:
              - 'rootId: string' # ID root elementa
            query_params:
              - 'lang?: string' # Opcioni lang parametar za translations
            auth_required: true
            permission: '{MODULE}_VIEW'

        # Repository metode:
        repository_methods:
          - name: 'getTree'
            signature: 'getTree(rootId: string, lang?: string): Promise<{Module}TreeDto[]>'
            description: 'Recursive CTE upit za tree strukturu'
            sql_pattern: |
              WITH RECURSIVE tree AS (
                -- Base case: root element
                SELECT id, parent_id, ... FROM {table} WHERE id = $1
                UNION ALL
                -- Recursive case: children
                SELECT t.id, t.parent_id, ... FROM {table} t
                INNER JOIN tree ON t.parent_id = tree.id
              )
              SELECT * FROM tree ORDER BY ...
            # VAŽNO: Parametrized query, NE hardkodovani ID-ovi!
            # Lang parametar kroz parametrized query, NE string concatenation

        # Service metode:
        service_methods:
          - name: 'getTree'
            signature: 'getTree(rootId: string, lang?: string): Promise<{Module}TreeDto[]>'
            description: 'Validacija + poziv repository'
            validation: 'Zod validacija za rootId'

        # Controller metode:
        controller_methods:
          - name: 'getTree'
            signature: 'getTree(request: FastifyRequest, reply: FastifyReply)'
            description: 'Type assertions + poziv service'
            type_assertions:
              - 'rootId: (request.params as { rootId: string }).rootId'
              - 'lang: (request.query as { lang?: string })?.lang?.trim()'

        # DTO tipovi:
        dto_types:
          - name: '{Module}TreeDto'
            structure: |
              export interface {Module}TreeDto extends {Module}ListItemDto {
                children: {Module}TreeDto[]; // Recursive tree struktura
              }

        # Primeri primene:
        examples:
          - table: 'cmn_menu'
            parent_column: 'parent'
            description: 'Menu hijerarhija sa parent-child relacijom'
          - table: 'cmn_loclink'
            parent_columns: ['loc1', 'loc2']
            description: 'Lokacije link tree (loc1 -> loc2)'
          - table: 'cmn_objlink'
            parent_columns: ['obj1', 'obj2']
            description: 'Objekti link tree (obj1 -> obj2)'
          - table: 'cmn_orglink'
            parent_columns: ['org1', 'org2']
            description: 'Organizacije link tree (org1 -> org2)'

        # Napomene:
        notes: |
          - Recursive CTE upiti moraju biti parametrized (NE hardkodovani ID-ovi!)
          - Lang parametar kroz parametrized query, NE string concatenation
          - Testirati sa različitim rootId vrednostima
          - Testirati sa različitim lang vrednostima
          - Tree struktura je read-only (samo GET metode)

    # View-ovi Pattern Support (PREDLOŽENO)
    - view_pattern:
        # Automatsko generisanje read-only modula za database view-ove
        enabled: true
        description: 'Automatski generiše read-only module za database view-ove'

        # Detekcija view-ova:
        detection:
          # View-ovi se detektuju po:
          # 1. SQL definiciji: CREATE VIEW ili CREATE OR REPLACE VIEW
          # 2. Ime view-a (opciono): ako se završava sa `_v` ili `_l` sufiksom
          # 3. Eksplicitna oznaka u YAML konfiguraciji

          sql_patterns:
            - 'CREATE VIEW'
            - 'CREATE OR REPLACE VIEW'

          name_patterns:
            - '*_v' # View-ovi sa _v sufiksom
            - '*_l' # View-ovi sa _l sufiksom

        # Automatska primena read_only profila:
        auto_profile: 'read_only'
        # View-ovi se automatski generišu sa read_only profilom

        # Generisani fajlovi:
        generated_files:
          - '{module}.view.repository.ts' # View repository sa SQL upitom
          - '{module}.view.service.ts' # View service (opciono, ako je potrebna business logika)
          - '{module}.view.controller.ts' # View controller
          - '{module}.view.routes.ts' # View routes
          # DTO se dodaje u glavni {module}.dto.ts fajl

        # Endpoint-i (read-only):
        endpoints:
          - method: 'GET'
            path: '/{module}'
            description: 'Lista svih zapisa iz view-a'
            query_params:
              - 'lang?: string' # Opcioni lang parametar
              - 'filter?: object' # Opcioni filter parametri
            auth_required: true
            permission: '{MODULE}_VIEW'

          - method: 'GET'
            path: '/{module}/:id'
            description: 'Jedan zapis iz view-a po ID'
            params:
              - 'id: string'
            query_params:
              - 'lang?: string' # Opcioni lang parametar
            auth_required: true
            permission: '{MODULE}_VIEW'

        # Repository metode:
        repository_methods:
          - name: 'listView'
            signature: 'listView(lang?: string, filters?: ViewFilters): Promise<{Module}ViewDto[]>'
            description: 'SQL upit za view (SELECT * FROM view_name)'
            sql_pattern: 'SELECT * FROM {view_name} WHERE ...'
            # VAŽNO: Parametrized query za filtere!

          - name: 'findViewById'
            signature: 'findViewById(id: string, lang?: string): Promise<{Module}ViewDto | null>'
            description: 'SQL upit za jedan zapis iz view-a'
            sql_pattern: 'SELECT * FROM {view_name} WHERE id = $1'

        # Service metode:
        service_methods:
          - name: 'list'
            signature: 'list(lang?: string, filters?: ViewFilters): Promise<{Module}ViewDto[]>'
            description: 'Business logika za listu (opciono)'

          - name: 'getOne'
            signature: 'getOne(id: string, lang?: string): Promise<{Module}ViewDto>'
            description: 'Business logika za jedan zapis'
            error_handling: "Baca AppError('View record not found', 404) ako ne postoji"

        # Controller metode:
        controller_methods:
          - name: 'list'
            signature: 'list(request: FastifyRequest, reply: FastifyReply)'
            description: 'Type assertions + poziv service'

          - name: 'getOne'
            signature: 'getOne(request: FastifyRequest, reply: FastifyReply)'
            description: 'Type assertions + poziv service'

        # DTO tipovi:
        dto_types:
          - name: '{Module}ViewDto'
            description: 'DTO za view response'
            # Može biti isti kao ListItemDto ili DetailDto, zavisi od view-a

        # Primeri primene:
        examples:
          - view: 'cmn_loc_v'
            description: 'Lokacije view - read-only modul'
          - view: 'cmn_obj_v'
            description: 'Objekti view - read-only modul'
          - view: 'cmn_par_v'
            description: 'Partneri view - read-only modul'
          - view: 'cmn_objtree_json_v'
            description: 'Objekti tree view - read-only modul sa tree strukturom'

        # Napomene:
        notes: |
          - View-ovi su uvek read-only (samo GET metode)
          - Nema CREATE, UPDATE, DELETE operacija
          - SQL upiti moraju biti parametrized (NE string concatenation)
          - View-ovi se automatski generišu sa read_only profilom
          - Može se koristiti za reporting i analytics (reporting profile)

# ============================================================================
# PR CHECKLIST & CODE REVIEW
# ============================================================================
pr_checklist:
  # Checklist za Pull Request review
  # Generator treba da generiše review/pr-checklist.md fajl sa ovom checklistom
  file: 'review/pr-checklist.md'

  checklist_items:
    structure:
      title: '1. Struktura'
      items:
        - 'Modul ima jasne slojeve: routes / controller / service / repository'
        - 'Nema SQL-a van repository sloja'
        - 'Nema business logike u routes'
        - 'Nema type assertion-a van controller sloja'
        - 'Nema generic tipova u routes (app.get<{ Params: { id: string } }>)'
        - 'Nema direktnih database upita u service sloju'
        - 'Repository koristi raw SQL (bez ORM-a)'

    auth_permissions:
      title: '2. Auth & Permissions'
      items:
        - 'Modul koristi ADM kao auth source (ili LOCAL ako je ADM modul)'
        - 'Ne generiše sopstvene tokene (osim ako je ADM modul sa auth_server=LOCAL)'
        - 'Permission check je centralizovan (permissionGuard middleware)'
        - 'Nema rasutih permission provera po kodu'
        - 'Auth guard je primenjen na sve zaštićene rute'
        - 'Permission guard koristi standardni pattern ({MODULE}_{RESOURCE}_{ACTION})'

    api_contract:
      title: '3. API Contract'
      items:
        - '**ZOD-ONLY**: Nema openapi.yaml - validacija kroz Zod schemas'
        - 'Nema breaking change bez odobrenja'
        - 'DTO-i su definisani kroz shared-types gde ima smisla'
        - 'Response tipovi su konzistentni'
        - 'Error response-i su standardizovani'

    validation_error_handling:
      title: '4. Validacija & Error handling'
      items:
        - 'Runtime validacija je u service sloju (Zod)'
        - 'Greške su mapirane na standardni error model (AppError)'
        - 'Ne vraćaju se raw DB greške klijentu'
        - 'Error handling je konzistentan kroz modul'
        - 'Zod validacija se koristi za sve input-e'
        - 'Type assertions su samo u controller sloju'

    sql_migration:
      title: '5. SQL & Migracija'
      items:
        - 'SQL je čitljiv i bez implicitnih zavisnosti'
        - 'Legacy logika je eksplicitno preslikana'
        - 'Nema session-state pretpostavki'
        - 'SQL upiti koriste parametrizovane queries ($1, $2, ...)'
        - 'Nema SQL injection rizika'
        - 'Transaction handling je ispravan (BEGIN, COMMIT, ROLLBACK)'

    testing:
      title: '6. Testovi'
      items:
        - 'Service logika ima testove'
        - 'Repository je testiran ili mockovan'
        - 'Integracioni test ne zavisi od spoljnog stanja'
        - 'Testovi prate arhitekturu (Repository mock database, Service mock repository)'
        - 'Test cleanup je implementiran (afterEach hook)'
        - 'Test data je unique (timestamp, random string)'

    documentation:
      title: '7. Dokumentacija'
      items:
        - 'README modula ažuriran (ako postoji)'
        - 'Ako je migracija – referencirana stara implementacija'
        - 'Swagger dokumentacija je kompletnija'
        - 'Code comments su jasni gde je potrebno'

    module_profile:
      title: '8. Module Profile'
      items:
        - 'Profile je ispravno primenjen (full_crud, read_only, integration_only, reporting)'
        - 'Endpoint-i odgovaraju profilu'
        - 'Service metode odgovaraju profilu'
        - 'Permission guard-ovi odgovaraju profilu'

# ============================================================================
# CI/CD PIPELINE
# ============================================================================
ci_cd:
  # Minimalni realan CI pipeline
  # Generator treba da generiše review/pipeline-module.yml fajl

  pipeline_file: 'review/pipeline-module.yml'

  stages:
    - name: 'lint'
      description: 'Linting i type checking'
      script:
        - 'npm run lint'
        - 'npm run type-check'
      fail_on_error: true

    - name: 'structure'
      description: 'Provera strukture modula'
      script:
        - 'node review/check-structure.js'
      fail_on_error: true
      # Script proverava:
      # - Da li postoje svi potrebni fajlovi (controller, service, repository, routes, dto)
      # - Da li SQL postoji samo u repository sloju
      # - Da li business logika postoji samo u service sloju
      # - Da li type assertions postoje samo u controller sloju

    - name: 'contracts'
      description: 'Validacija API contract-a'
      script:
        - 'openapi-cli validate contracts/*.yaml'
      fail_on_error: true
      # **ZOD-ONLY**: Nema Swagger validacije - validacija kroz Zod

    - name: 'ai-review'
      description: 'AI review arhitekture'
      script:
        - 'node review/run-ai-review.js'
      allow_failure: true
      # AI review je opciono i ne blokira pipeline
      # Koristi review/ai-review.prompt.md za review proces

  # Helper scripts koje generator treba da generiše:
  helper_scripts:
    check_structure:
      file: 'review/check-structure.js'
      description: 'Proverava strukturu modula prema arhitekturnim pravilima'
      checks:
        - 'Proverava da li postoje svi potrebni fajlovi'
        - 'Proverava da li SQL postoji samo u repository sloju'
        - 'Proverava da li business logika postoji samo u service sloju'
        - 'Proverava da li type assertions postoje samo u controller sloju'
        - 'Proverava da li routes ne sadrže logiku'

    run_ai_review:
      file: 'review/run-ai-review.js'
      description: 'Pokreće AI review proces koristeći review/ai-review.prompt.md'
      dependencies:
        - 'backend-generator.yaml'
        - 'Git diff of the PR'
      output: 'Checklist sa severity: INFO / WARNING / ERROR'

# ============================================================================
# AI REVIEW PROMPT
# ============================================================================
ai_review:
  # AI review prompt za automatski review Pull Request-a
  # Generator treba da generiše review/ai-review.prompt.md fajl

  prompt_file: 'review/ai-review.prompt.md'

  context: |
    You are reviewing a backend module.

    Context:
    - Architecture rules are defined in backend-generator.yaml
    - This is an enterprise backend system
    - SQL and business logic correctness is NOT your concern

    Your task:
    - Detect violations of architectural rules
    - Detect layering violations
    - Detect hidden session state assumptions
    - Detect SQL outside repository layer
    - Detect auth or permission inconsistencies
    - Detect type assertion violations
    - Detect generic types in routes
    - Detect business logic in routes or repository
    - Detect validation outside service layer

  rules: |
    Rules:
    - Do NOT suggest refactors unless rules are violated
    - Do NOT comment on performance or business logic
    - Do NOT comment on SQL correctness or business logic correctness
    - Focus ONLY on architectural violations
    - Output findings as a checklist with severity: INFO / WARNING / ERROR

  input: |
    Input:
    - backend-generator.yaml
    - Git diff of the PR
    - Module files (controller, service, repository, routes, dto)

  output_format: |
    Output format:
    ## AI Review Results

    ### Severity: ERROR
    - [ ] Description of error violation

    ### Severity: WARNING
    - [ ] Description of warning violation

    ### Severity: INFO
    - [ ] Description of info violation

  specific_checks:
    layering_violations:
      - 'SQL queries outside repository layer'
      - 'Business logic in routes layer'
      - 'Business logic in repository layer'
      - 'Type assertions outside controller layer'
      - 'Generic types in routes (app.get<{ Params: { id: string } }>)'
      - 'Direct database queries in service layer'
      - 'Validation outside service layer (osim Zod u service)'

    auth_violations:
      - 'Custom token generation outside ADM auth module'
      - 'Scattered permission checks (not using permissionGuard)'
      - 'Missing authGuard on protected routes'
      - 'Inconsistent permission patterns'

    structure_violations:
      - 'Missing required files (controller, service, repository, routes, dto)'
      - 'Files in wrong locations'
      - 'Incorrect naming conventions'

    module_profile_violations:
      - 'Endpoints generated that do not match module profile'
      - 'Service methods generated that do not match module profile'
      - 'Repository methods generated that do not match module profile'

# ============================================================================
# NOTES & ADDITIONAL INFORMATION
# ============================================================================
notes: |
  Ovaj YAML fajl opisuje sve principe, standarde i koncepte koji se primenjuju
  u ADM projektu. Generator treba da:

  1. Parsira SQL schema fajl
  2. Detektuje prefiks tabela
  3. Detektuje translation tabele
  4. Detektuje foreign keys
  5. Detektuje parent-child relacije za tree strukture (parent_id, parent, loc1/loc2, obj1/obj2, org1/org2)
  6. Detektuje view-ove (CREATE VIEW ili CREATE OR REPLACE VIEW)
  7. Određuje module profile (full_crud, read_only, integration_only, reporting)
  8. Generiše kompletan backend server po ovim standardima
  9. Generiše tree endpoint-e za hijerarhijske strukture (ako su detektovane)
  10. Generiše read-only module za view-ove (automatski read_only profile)

  Generator NE generiše kod direktno - AI koristi ovaj YAML i SQL fajl
  da generiše sve potrebne fajlove po istim principima kao ADM projekat.

  Svi fajlovi se generišu sa:
  - TypeScript tipovima
  - Zod validacijom
  - Swagger dokumentacijom
  - Testovima
  - Error handling-om
  - Security middleware-om

  VAŽNO - Striktno razdvajanje slojeva:
  - Routes: SAMO registracija ruta i preHandler (bez schema za CMN ZOD-only)
  - Controllers: Ekstrakcija podataka (type assertions), poziv service, schema definicije
  - Services: Business logika, Zod validacija, poziv repository
  - Repository: SAMO database operacije (raw SQL), data mapping

  Type handling:
  - Routes: NIKADA generic tipovi (app.get<{ Params: { id: string } }>)
  - Controllers: Type assertions (request.params as { id: string })
  - Services: Zod validacija (data: unknown -> Zod.parse -> typed DTO)
  - Repository: Typed DTOs iz Service sloja

  Testovi:
  - Repository testovi: Mock database connection
  - Service testovi: Mock repository
  - Integration testovi: Real database sa cleanup-om

  MODULE PROFILE:
  - Precedence: MODULE_PROFILE env > module_profile.type u YAML > default (full_crud)
  - full_crud (default): Generiše sve CRUD operacije
  - read_only: Generiše samo GET operacije (list, getOne)
  - integration_only: Generiše custom integration endpoint-e za legacy sistem
  - reporting: Generiše read operacije + reporting endpoint-e (export, statistics, analytics)

  Profile utiče na:
  - Koje endpoint-e se generišu
  - Koje service metode se generišu
  - Koje repository metode se generišu
  - Koje DTO tipove se generišu
  - Koje permission guard-ove se dodaju

  Primeri korišćenja:

  1. Read-only modul (npr. za reference tabele):
     MODULE_PROFILE=read_only
     # Generiše: GET /, GET /:id
    # NE generiše: POST /, PUT /, DELETE /:id

  2. Reporting modul (npr. za analytics):
     MODULE_PROFILE=reporting
     # Generiše: GET /, GET /:id, GET /export, GET /statistics, GET /analytics, POST /query, GET /charts/:type
    # NE generiše: POST /, PUT /, DELETE /:id

  3. Integration/Bridge modul (npr. za legacy sistem):
     MODULE_PROFILE=integration_only
     # Generiše: POST /sync, POST /sync/:id, GET /legacy/:legacyId, POST /transform
     # NE generiše: Standardni CRUD endpoint-i

  4. Full CRUD modul (default):
     MODULE_PROFILE=full_crud
     # ili ne postavlja se (default)
    # Generiše: GET /, GET /:id, POST /, PUT /, DELETE /:id (obavezno za full_crud)

  TREE/HIJERARHIJSKE STRUKTURE (PREDLOŽENO):
  - Automatsko generisanje tree endpoint-a za tabele sa parent-child relacijama
  - Detektuje parent-child kolone: parent_id, parent, loc1/loc2, obj1/obj2, org1/org2
  - Generiše: GET /{module}/tree/:rootId endpoint
  - Generiše: getTree() metode u repository, service, controller
  - Generiše: Recursive CTE SQL upit (parametrized!)
  - Generiše: {Module}TreeDto interface sa children: {Module}TreeDto[] property
  - VAŽNO: Recursive CTE upiti moraju biti parametrized (NE hardkodovani ID-ovi!)
  - VAŽNO: Lang parametar kroz parametrized query, NE string concatenation

  VIEW-OVI PATTERN (PREDLOŽENO):
  - Automatsko generisanje read-only modula za database view-ove
  - Detektuje view-ove po SQL definiciji (CREATE VIEW ili CREATE OR REPLACE VIEW)
  - Automatski primenjuje read_only profile
  - Generiše: {module}.view.repository.ts, {module}.view.service.ts, {module}.view.controller.ts, {module}.view.routes.ts
  - Generiše: GET /{module} i GET /{module}/:id endpoint-e (samo read)
  - VAŽNO: SQL upiti moraju biti parametrized (NE string concatenation)
  - View-ovi su uvek read-only (samo GET metode)

  PR CHECKLIST & CI/CD:
  - Automatski generiše review/ direktorijum sa:
    - review/pipeline-module.yml (CI pipeline)
    - review/ai-review.prompt.md (AI review prompt)
    - review/pr-checklist.md (PR checklist)
    - review/check-structure.js (structure check script)
    - review/run-ai-review.js (AI review script)
  - CI pipeline sa 4 stage-a: lint, structure, contracts, ai-review
  - PR checklist sa 8 kategorija provera

# ============================================================================
# PRECIZNE DEFINICIJE ZA TRANSLATIONS MODULE
# ============================================================================
translations_modules:

  # Basic CRUD with Translations (ccard, doctp, locatt pattern)
  basic_crud_with_translations:
    description: "Moduli sa jednom translation tabelom (_x) za više jezika - OPTIMIZOVAN API"

    # 🎯 API OPTIMIZACIJA: Osnovne rute vraćaju samo aktivni jezik
    api_optimization: |
      # ✅ OPTIMIZACIJA PERFORMANSI
      # Osnovne CRUD rute (list, get, create, update) vraćaju SAMO translation objekat za aktivni jezik
      # Posebna ruta /translations/:id vraća SVE prevode

      # Standardne rute (brže):
      GET  /module?lang=sr_cyr    # vraća: { ..., translation: {lang, grammcase, text} }
      GET  /module/:id?lang=sr_cyr # vraća: { ..., translation: {lang, grammcase, text} }
      POST /module?lang=sr_cyr    # vraća: { ..., translation: {lang, grammcase, text} }
      PUT  /module?lang=sr_cyr    # vraća: { ..., translation: {lang, grammcase, text} }

      # Translations ruta (detaljna):
      GET  /module/translations/:id # vraća: { id, code, text, translations: [{lang, grammcase, text}, ...] }

    # 📋 DTO Strukture - optimizovane
    read_dto_structure: |
      # ✅ KORISTI SHARED TRANSLATION TYPES
      import {
        TranslationDtoSchema,
        TranslationDto,
        TranslationLite,
      } from '../common/translation.types';

      # Aliazi za module
      export type CmnTranslationDto = TranslationDto;
      export type CmnTranslationLite = TranslationLite;
      export type CmnLocattTranslationDto = CmnTranslationDto;
      export type CmnLocattTranslationLite = CmnTranslationLite;

      # ✅ OPTIMIZOVANO - samo aktivni jezik u osnovnim DTO-ima
      export interface CmnLocattListItemDto {
        id: string;
        site: string | null;
        code: string;
        text: string;
        valid: number;
        translation?: CmnLocattTranslationLite;
        // ❌ NEMA translations: CmnTranslationDto[] - to je u posebnoj ruti!
        // ❌ NIKADA NE vraćati translations: [] (prazan niz) u standardnim objektima!
      }

      # Poseban DTO za translations rutu
      export interface CmnLocattTranslationsDto {
        id: string;
        code: string;
        text: string;
        translations: CmnLocattTranslationDto[]; // Svi jezici
      }

    response_examples: |
      # Standardna ruta (brža):
      GET /locatt/123?lang=sr_cyr
      {
        "id": "123",
        "code": "TEST",
        "text": "Тест",
        "valid": 1,
        "translation": { "lang": "sr_cyr", "grammcase": "1", "text": "Тест" }
      }

      # Translations ruta (detaljna):
      GET /locatt/translations/123
      {
        "id": "123",
        "code": "TEST",
        "text": "Тест",
        "translations": [
          { "id": "456", "tableid": "123", "lang": "sr_cyr", "grammcase": "1", "text": "Тест" },
          { "id": "789", "tableid": "123", "lang": "en_usa", "grammcase": "2", "text": "Test" }
        ]
      }

    update_dto_structure: |
      # ✅ ISPRAVNO - Simplified input (ne array!)
      export interface CmnDoctpUpdateDto {
        id: string;
        site?: string | null;
        code?: string;
        text?: string;           # Text za lang iz parametra
        valid?: number;
        grammcase?: string;      # Grammcase za lang iz parametra
      }

      # ❌ POGREŠNO - Ne šalje se array translations
      # translations?: Array<{...}>; # NE!

    update_request_examples: |
      # Update sa DEFAULT_LANG (ažurira main.text + _x tabelu)
      PUT /doctp?lang=sr_cyr
      {
        "id": "123",
        "text": "Novi tekst",     # Ažurira main.text!
        "grammcase": "2"
      }

      # Update sa drugim jezikom (ažurira samo _x tabelu)
      PUT /doctp?lang=en_usa
      {
        "id": "123",
        "text": "New text",       # NE ažurira main.text!
        "grammcase": "1"
      }

    update_logic_rules: |
      1. Ako lang === DEFAULT_LANG: ažurira main.text + _x tabelu
      2. Ako lang !== DEFAULT_LANG: ažurira samo _x tabelu
      3. U _x tabeli: DELETE postojeći sa WHERE tableid = ? AND lang = ? + INSERT novi za dati lang
      4. Service generiše ID-jeve za translations
      5. Repository očekuje Array<{id: string, lang: string, grammcase: string, text: string}>

    forbidden_patterns: |
      # ❌ NE šalje se array translations u update DTO
      # ❌ NE menja se main.text ako lang !== DEFAULT_LANG
      # ❌ NE brišu se sve translations, samo za dati lang

    correct_patterns: |
      # ✅ Service priprema translations array za repository
      const translations = dto.text ? [{
        id: uniqueId(),
        lang: resolvedLang,
        grammcase: dto.grammcase ?? '1',
        text: dto.text
      }] : [];

      # ✅ Repository radi DELETE samo za dati lang + INSERT novi
      DELETE FROM doctpx WHERE tableid = ? AND lang = ?  # Briše samo dati jezik
      INSERT INTO doctpx VALUES (...)
# Standard updates: auth dual-mode, JWKS, service JWT, S2S user context

# 1) Dual-mode auth (header + cookie)
# - Priority: Authorization header first, fallback to HttpOnly cookie (adm_access)
# - CSRF required only when auth is via cookie (browser flow)
# - Server-to-server calls use Authorization header, no CSRF

# 2) JWKS
# - ADM exposes public keys via /badm/adm/.well-known/jwks.json
# - JWT header must include kid; rotate by adding new key to JWKS before switch

# 3) Service JWT (client_credentials)
# - Endpoint: POST /badm/adm/auth/oauth/token
# - Body: { client_id, client_secret, grant_type: 'client_credentials' }
# - Response: { access_token, token_type: 'Bearer', expires_in }
# - JWT claim: typ = 'service'
# - Stored clients in adm_client; managed manually/super-admin only

# 4) S2S user context
# - Each hop validates incoming token and forwards its own service JWT
# - Forward minimal user context: X-User-Id, X-User-Roles
# - Receiver validates service token + authorizes user based on forwarded context
