    - 'middleware/bruteForceProtection.ts'
    - 'middleware/errorHandler.ts'
    - 'middleware/requestId.ts'

  # Review fajlovi (svi u review/ direktorijumu, bez poddirektorijuma)
  review_files:
    directory: 'review'
    structure: |
      review/
      ├── pipeline-module.yml      # CI pipeline konfiguracija
      ├── ai-review.prompt.md      # AI review prompt
      ├── pr-checklist.md          # PR checklist dokumentacija
      ├── check-structure.js       # Script za proveru strukture
      └── run-ai-review.js         # Script za AI review
    files:
      - 'review/pipeline-module.yml'
      - 'review/ai-review.prompt.md'
      - 'review/pr-checklist.md'
      - 'review/check-structure.js'
      - 'review/run-ai-review.js'

# ============================================================================
# NAMING CONVENTIONS
# ============================================================================
naming:
  # DTO naming pattern
  dto:
    list_item: '{Module}ListItemDto' # Npr. "AdmUserListItemDto"
    detail: '{Module}DetailDto' # Npr. "AdmUserDetailDto"
    create: '{Module}CreateDto' # Npr. "AdmUserCreateDto"
    update: '{Module}UpdateDto' # Npr. "AdmUserUpdateDto"
    translation: '{Module}TranslationDto' # Npr. "AdmRollTranslationDto"

  # Class naming
  classes:
    controller: '{Module}Controller' # Npr. "UserController"
    service: '{Module}Service' # Npr. "UserService"
    repository: '{Module}Repository' # Npr. "UserRepository"

  # File naming (kebab-case)
  files:
    controller: '{module_name}.controller.ts'
    service: '{module_name}.service.ts'
    repository: '{module_name}.repository.ts'
    routes: '{module_name}.routes.ts'
    dto: '{module_name}.dto.ts'

  # Route naming
  routes:
    base_path: '/{module_name}' # Npr. "/user"
    list: 'GET /'
    get_one: 'GET /:id'
    create: 'POST /'
    update: 'PUT /' # ID u body, bez :id u path
    remove: 'DELETE /:id' # Obavezno za full_crud profile
    translations: 'GET /translations/:id' # Vraća niz svih prevoda za dati ID (samo translation tabela)
  routes_notes: |
    - list/get_one vraćaju SAMO jedan prevod (translation) za aktivni lang (JOIN na X tabelu sa lang filterom).
    - translations ruta (GET /translations/:id) vraća ceo niz prevoda iz X tabelе; koristi TranslationDto array.
    - Ako je potreban ceo niz prevoda, koristi se posebna ruta umesto dodavanja fetchTranslations u list/get.
  lang_handling: |
    - Svi endpoint-i (list, getOne, create, update) primaju lang query parametar
    - Controller ekstraktuje lang iz request.query
    - Service koristi resolveLang(lang?) sa DEFAULT_LANG fallback
    - Ako nema lang ni u query ni u env -> error
  permissions: |
    - Format: CMN_{MODULE_NAME} sa ['VIEW', 'CREATE', 'UPDATE', 'DELETE', 'ALL']
    - Primeri: CMN_LOC, CMN_PARATT, CMN_PARCONTACT
    - Svaki endpoint ima specifičnu permisiju (VIEW, CREATE, UPDATE, DELETE) ili ALL
  route_schema: |
      - **ZOD-ONLY**: rute NE smeju imati schema/openapi references
      - Validacija ide iskljucivo kroz Zod u service sloju
      - update spec NEMA params, samo querystring i body

# ============================================================================
# ARCHITECTURE & LAYER SEPARATION
# ============================================================================
# VAŽNO (obavezno poštovanje): striktno pratiti standard; ako nije izvodljivo,
# zaustaviti izvršavanje i prijaviti problem umesto ad-hoc rešenja.
# U slučaju kršenja standarda (npr. šeme u kontrolerima, neregistrovane šeme,
# inline Swagger $ref hackovi), rad treba pauzirati i standard uskladiti pre
# nastavka.
#
# OBAVEZNA PROVERA STANDARDA:
# - Pre svake izmene koda, OBAVEZNO proveriti relevantne sekcije standarda
# - NIKADA ne implementirati nešto što nije u skladu sa standardom
# exceptions:
#   allowed: true
#   process:
#     - "Kreirati ADR zapis (1 strana): problem, odluka, razlog, posledice"
#     - "Dodati TODO da se standard dopuni u roku od X sprintova"
#   scope_limits:
#     - "Security, auth, data integrity: exceptions are NOT allowed without architect approval"
architecture:
  # Striktno razdvajanje slojeva - OBAVEZNO
  strict_layer_separation: true
  description: |
    Svaki sloj ima jasno definisanu odgovornost i NIKADA ne prelazi granice:
    - Routes: SAMO registracija ruta i preHandler middleware
    - Controllers: SAMO ekstrakcija podataka iz request-a i poziv service metoda
    - Services: Business logika, validacija (Zod), poziv repository metoda
    - Repository: SAMO database operacije (raw SQL), bez business logike
    - Zod schema u {module}.dto.ts je jedini izvor istine za HTTP ugovor i validaciju. JSON Schema/TypeBox/Swagger su legacy i NE koriste se.

  # Pravila za svaki sloj:
  layers:
    routes:
      responsibility: |
        - SAMO registracija ruta (app.get, app.post, app.put, app.delete)
        - PreHandler middleware (authGuard, permissionGuard, rateLimiter, itd.)
        - **ZOD-ONLY**: NEMA schema referenci - validacija se radi u Service sloju
        - NIKADA: logika, validacija, type assertions, query/body processing
      pattern: |
        export async function {module}Routes(app: FastifyInstance) {
          const controller = new {Module}Controller();

          app.get('/', {
            preHandler: [authGuard, requireModuleRole('MODULE', ['MODULE_VIEW'])]
            // ❌ NEMA: schema: schemas.list
          }, controller.list.bind(controller));
        }
      type_handling: |
        # NIKADA ne koristiti generic tipove u routes:
        # ❌ app.get<{ Params: { id: string } }>(...)
        # ✅ app.get(...)
        # Type assertions se rade u Controller-u

    controllers:
      responsibility: |
        - Ekstrakcija podataka iz request-a (params, query, body)
        - Type assertions za request podatke
        - Poziv service metoda
        - Slanje response-a
        - NIKADA: business logika, validacija, database upiti
        - NIKADA: definisanje ili držanje šema; šeme pripadaju schema fajlovima / registraciji
      pattern: |
        export class {Module}Controller {
          private readonly service = new {Module}Service();
          
          async list(request: FastifyRequest, reply: FastifyReply) {
            const lang = (request.query as { lang?: string })?.lang?.trim();
            const items = await this.service.list(lang);
            reply.send(items);
          }
          
          async getOne(request: FastifyRequest, reply: FastifyReply) {
            const id = (request.params as { id: string }).id;
            const lang = (request.query as { lang?: string })?.lang?.trim();
            const item = await this.service.getOne(id, lang);
            reply.send(item);
          }
          
          async create(request: FastifyRequest, reply: FastifyReply) {
            const item = await this.service.create(request.body);
            reply.code(201).send(item);
          }
          
          async update(request: FastifyRequest, reply: FastifyReply) {
            const id = (request.params as { id: string }).id;
            const item = await this.service.update(id, request.body);
            reply.send(item);
          }
        }
      type_assertions: |
        # Type assertions se rade u Controller-u, NIKADA u Routes:
        # ✅ const id = (request.params as { id: string }).id;
        # ✅ const lang = (request.query as { lang?: string })?.lang?.trim();
        # ✅ const body = request.body as {Module}CreateDto;
        # 
        # Razlog: TypeScript ne može automatski da inferiše tipove iz URL parametara
        # bez generic tipova, ali generic tipovi su nepotrebni jer se validacija
        # radi u Service sloju kroz Zod schemas

    schemas:
      description: |
        - **ZOD-ONLY STANDARD**: Koristimo ISKLJUČIVO Zod schemas u DTO fajlovima.
        - NEMA JSON Schema fajlova ({module}.schemas.ts).
        - NEMA routes.schema.ts fajlova.
        - NEMA Controller.getSchemas() metoda.
        - NEMA schema registra u plugins/schemas.ts.
        - Zod schemas služe za runtime validaciju I TypeScript tipove.
      zod_only_standard: |
        - Zod schemas su jedini izvor istine za validaciju i tipove.
        - Definisu se u {module}.dto.ts fajlovima.
        - TypeScript tipovi se infer-uju iz Zod schemas (z.infer<>).
        - Runtime validacija se radi u Service sloju.
        - Nema Swagger dokumentacije (JSON schemas) - fokus na runtime validaciju.
        - Koristi shared TranslationDto/TranslationLite iz '../common/translation.types.ts'.
        - Site polje: 'site: z.string().nullable().optional()' u Zod + 'site?: string | null' u TS interface.
        - Base DTO interfejsi u '../common/base.dto.ts': BaseCreateDto, BaseUpdateDto, BaseListItemDto, BaseTranslationsDto<T>.
        - Nasleđivanje: extends BaseXxxDto + Omit<BaseXxxDto, 'field'> za konflikte.
        - TranslationsDto: extends BaseTranslationsDto<ModuleTranslationDto>.
      benefits: |
        - Manje fajlova i koda
        - Jedan izvor istine za validaciju i tipove
        - Lakše održavanje
        - Brži development


    services:
      responsibility: |
        - Business logika
        - Runtime validacija kroz Zod schemas
        - Poziv repository metoda
        - Error handling (AppError)
        - Transformacija podataka ako je potrebno
        - NIKADA: direktni database upiti, request/reply objekti
      imports: |
        # OBAVEZNO: Svi importi moraju biti na početku fajla
        # NIKADA: dinamički import (await import(...))
        # ✅ import { uniqueId } from '../../core/utils/uniqueId';
        # ❌ const { uniqueId } = await import('../../core/utils/uniqueId');
      pattern: |
        import { uniqueId } from '../../core/utils/uniqueId';
        import { {Module}Repository } from './{module}.repository';
        import { {Module}CreateDtoSchema, {Module}UpdateDtoSchema } from './{module}.dto';
        import { AppError } from '../../core/errors/AppError';
        
        export class {Module}Service {
          private readonly repo = new {Module}Repository();
          
          async list(lang?: string): Promise<{Module}ListItemDto[]> {
            return this.repo.listDomains(lang);
          }
          
          async getOne(id: string, lang?: string): Promise<{Module}DetailDto> {
            const item = await this.repo.findDomainById(id, lang);
            if (!item) {
              throw new AppError('{Module} not found', 404);
            }
            return item;
          }
          
          async create(data: unknown): Promise<{Module}DetailDto> {
            const dto = {Module}CreateDtoSchema.parse(data);
            
            // Generate ID first (needed for auto-fill logic)
            const id = uniqueId();
            
            # Automatsko kreiranje translation zapisa:
            # Ako nema code, postavlja se code = id
            # Ako korisnik ne želi da vodi računa o code, automatski se postavlja na id
            if (!dto.code || dto.code.trim() === '') {
              dto.code = id;
            }
            
            return this.repo.createDomain(dto, id);
          }
          
          async update(id: string, data: unknown): Promise<{Module}DetailDto | null> {
            const dto = {Module}UpdateDtoSchema.parse(data);
            try {
              return await this.repo.updateDomain(id, dto);
            } catch {
              throw new AppError('{Module} not found', 404);
            }
          }
        }
      validation: |
        # SVA validacija se radi u Service sloju kroz Zod:
        # - Controller prosleđuje raw data (unknown type)
        # - Service validira kroz Zod schema
        # - Repository prima validirane DTO tipove
        # 
        # Primer:
        # async create(data: unknown): Promise<{Module}DetailDto> {
        #   const dto = {Module}CreateDtoSchema.parse(data);
        #   
        #   // Generate ID first (needed for auto-fill logic)
        #   const id = uniqueId();
        #   
        #   // Auto-fill code if not provided or empty
        #   if (!dto.code || dto.code.trim() === '') {
        #     dto.code = id;
        #   }
        #   
        #   return this.repo.createDomain(dto, id);
        # }
      
      # Automatsko kreiranje translation zapisa
      auto_fill_logic:
        description: 'Automatsko postavljanje code vrednosti pri kreiranju zapisa'
        applies_to: 'Sve tabele koje imaju kolone id, site, code'
        rules:
          code:
            condition: 'Ako code nije prosleđen ili je prazan string'
            action: 'Postavi code = id'
            purpose: 'Ako korisnik ne želi da vodi računa o code, automatski se postavlja na id'
            implementation: |
              if (!dto.code || dto.code.trim() === '') {
                dto.code = id;
              }
        location: 'Service layer - create() metoda'
        order: |
          1. Parse DTO sa Zod schema
          2. Generate ID sa uniqueId()
          3. Auto-fill code (ako nije prosleđen)
          4. Prosledi DTO i ID repository-ju

    repository:
      responsibility: |
        - SAMO database operacije (raw SQL)
        - Transaction handling
        - SQL query building
        - Data mapping (database -> DTO)
        - NIKADA: business logika, validacija, error handling (osim database errors)
        - NIKADA: poziv service metoda ili funkcija (striktno jednosmerni tok: Controller -> Service -> Repository)
        - NIKADA: generisanje ID (ni za glavnu ni za translation tabelu)
        - NIKADA: uniqueId() import ili poziv u repository-ju
        - NIKADA: fallback za translation ID (trans.id || uniqueId() - ZABRANJENO)
      methods:
        createDomain: |
          prima dto sa id (generisan u service) i prevodima sa id; ne generiše ID
          Signature: createDomain(dto: CreateDto & { id: string, translations?: Array<{ id: string; lang: string; grammcase: string; text: string }> }, lang: string)
          ⚠️ translations[].id je OBAVEZAN string (ne optional), service MORA proslediti
        updateDomain: |
          prima dto sa id u body; ne prima odvojeni id param; koristi dto.id
          Signature: updateDomain(dto: UpdateDto & { translations?: Array<{ id: string; lang: string; grammcase: string; text: string }> }, lang: string)
        listDomains: "može JOIN na X tabelu za aktivni lang; bez fetchTranslations ako postoji /translations/:id ruta"
        findDomainById: "isto kao list, jedan prevod za aktivni lang"
        removeDomain: "briše glavnu tabelu; X tabela samo ako postoji"
        listTranslations: "vraća TranslationDto[] za sve jezike (samo ako postoji /translations/:id ruta)"
      sql_generation:
        createDomain: |
          Koristi dinamičko građenje SQL-a sa columns/values/params nizovima:
          - columns: string[] - lista kolona za INSERT
          - values: string[] - lista ${param(N)}::type za VALUES
          - params: any[] - stvarni parametri
          - paramIndex: number - brojač za param() pozive
          - Opciona polja se dodaju samo ako su prisutna u DTO
          - Na kraju: INSERT INTO table (columns.join(', ')) VALUES (values.join(', '))
        updateDomain: |
          Koristi dinamičko građenje SET klauzule:
          - updates: string[] - lista "column = ${param(N)}::type" ili "column = NULL"
          - params: any[] - stvarni parametri
          - paramIndex: number - brojač za param() pozive
          - Na kraju: UPDATE table SET updates.join(', ') WHERE id = ${param(N)}::numeric
          - RETURNING kolone koje su ažurirane (id, site, code, text, itd.)
          - Nakon translations update (DELETE + INSERT za dati lang), COMMIT transakcije
          - Konstruiše translation objekat iz podataka koje je upravo insertovao
          - Vraća: { ...updateResult.rows[0], translation: { lang, grammcase, text } } // Samo aktivni jezik
          - Pattern: konstruiše translation objekat pre COMMIT-a, koristeći insertovane podatke
        createDomain_return_pattern: |
          # ✅ ISPRAVNO: Konstruiše objekat direktno iz INSERT RETURNING i translation podataka
          # NIKADA ne poziva findDomainById (izbegava dodatni SELECT upit)
          # Pattern:
          const insertResult = await client.query(insertSql, params);
          const created = insertResult.rows[0];
          
          // Construct translation object from the translations we just inserted
          let translation: { lang: string; grammcase: string | null; text: string | null };
          if (dto.translations && dto.translations.length > 0) {
            const trans = dto.translations[0]; // Service sends only one translation
            await this.writeTranslations(client, recordId, dto.translations);
            translation = {
              lang: trans.lang,
              grammcase: trans.grammcase || null,
              text: trans.text || null,
            };
          } else {
            translation = {
              lang,
              grammcase: null,
              text: null,
            };
          }
          
          await client.query('COMMIT');

          return {
            id: created.id,
            site: created.site && created.site.trim() !== '' ? created.site : undefined,
            code: created.code,
            text: created.text,
            valid: created.valid,
            translation, // Samo aktivni jezik
            // ❌ NIKADA NE vraćati translations: [] u standardnim objektima!
          };

          # ❌ NE ISPRAVNO: Pozivanje findDomainById nakon commit-a (dodatni SELECT upit)
          # await client.query('COMMIT');
          # const full = await this.findDomainById(recordId, lang);
          # return full!;
          #
          # Napomena: Stari moduli (um, terratt, tgp, module) još uvek koriste findDomainById pattern,
          # ali novi standard za simplified input strukturu koristi direktno konstruisanje objekta.
      pattern: |
        export class {Module}Repository {
          async listDomains(lang: string): Promise<{Module}ListItemDto[]> {
            const client = await pool.connect();
            try {
              const sql = `
                SELECT 
                  ${cast('main.id', 'text')} as id,
                  ${cast('tx.lang', 'text')} as tx_lang,
                  ${cast('tx.grammcase', 'text')} as tx_grammcase,
                  tx.text as tx_text
                FROM ${identifier(this.tableName)} main
                LEFT JOIN ${identifier(this.translationTableName)} tx ON tx.tableid = main.id AND tx.lang = ${param(1)}::varchar
              `;
              const res = await client.query<any>(sql, [lang]);
              return res.rows.map(row => ({
                ...row,
                translation: {
                  lang,
                  grammcase: row.tx_grammcase ?? null,
                  text: row.tx_text ?? null // Uvek prisutan, null ako nema prevoda
                },
                // ❌ NEMA translations[] - svi prevodi kroz /translations/:id rutu
              }));
            } finally {
              client.release();
            }
          }
        }

  # Zabranjene prakse:
  forbidden_patterns:
    - 'Routes ne smeju da sadrže logiku'
    - 'Controllers ne smeju da sadrže business logiku'
    - 'Services ne smeju da rade direktne database upite'
    - 'Repository ne sme da sadrži business logiku'
    - 'Repository NIKADA ne sme da poziva service metoda ili funkcija'
    - 'Repository NIKADA ne sme da generiše ID-jeve (NE koristi uniqueId())'
    - 'Repository NIKADA ne sme da koristi fallback za translation ID (NE: trans.id || uniqueId())'
    - 'Repository očekuje obavezan id za translations (NE optional id?: string)'
    - 'Dinamički import (await import(...)) - SVI importi moraju biti na početku fajla'
    - 'Generic tipovi u Routes (app.get<{ Params: { id: string } }>)'
    - 'Schema definicije direktno u Routes'
    - 'Validacija u Controller-u (osim type assertions)'
  # Workflow pri izmenama koda:
  change_workflow: |
    PRI IZMENI REPOSITORY-ja:
      1. Grep: grep -r "createDomain|updateDomain|writeTranslations" src/modules/{module}
      2. Pročitaj service da vidim šta prosleđuje
      3. Proverim tipove - da li service prosleđuje Array<{ id: string; ... }>
      4. Proverim da li postoji uniqueId() import u repository-ju (mora biti uklonjen)
      5. Proverim testove - da li koriste iste tipove
    
    PRI IZMENI SERVICE-ja:
      1. Grep: grep -r "createDomain|updateDomain" src/modules/{module}
      2. Pročitaj repository da vidim šta očekuje
      3. Proverim da li service uvek generiše ID-jeve za translations
      4. Proverim da li se ID-jevi prosleđuju repository-ju (Array<{ id: string; ... }>)
    
    UVEK PROVERITI OBA FAJLA ZAJEDNO!

# ============================================================================
# CODING STANDARDS - Detaljne Instrukcije
# ============================================================================
coding_standards:
  note: "Detaljne instrukcije za rad sa zavisnostima između slojeva, ID handling, type conversion, i testiranje."
  
  repository_layer:
    strict_rules:
      forbidden:
        - "Generiše ID-jeve (NE koristi uniqueId())"
        - "Poziva service funkcije"
        - "Ima business logiku"
        - "Koristi fallback za ID-jeve (trans.id || uniqueId() - ZABRANJENO!)"
      allowed:
        - "Koristi prosleđene ID-jeve (očekuje obavezan id za translations)"
        - "Izvršava SQL upite (INSERT, UPDATE, DELETE, SELECT)"
        - "Radi mapping podataka (row -> DTO)"
        - "Upravlja transakcijama (BEGIN, COMMIT, ROLLBACK)"
    
    writeTranslations_method: |
      // ✅ ISPRAVNO:
      private async writeTranslations(
        client: PoolClient,
        tableid: string,
        translations: Array<{ id: string; lang: string; grammcase: string; text: string }> // id je OBAVEZAN
      ): Promise<void> {
        for (const trans of translations) {
          const sql = `INSERT INTO ... VALUES (...)`;
          await client.query(sql, [
            trans.id,  // KORISTI PROSLEĐENI ID - NIKADA uniqueId()
            tableid,
            trans.lang,
            trans.grammcase,
            trans.text,
          ]);
        }
      }
      
      // ❌ POGREŠNO - ZABRANJENO:
      import { uniqueId } from '...';  // NE SME!
      const transId = trans.id || uniqueId();  // ZABRANJENO!
    
    updateDomain_return_pattern:
      rule: "updateDomain konstruiše translation objekat iz podataka koje je upravo insertovao"
      pattern: |
        // Construct translation object from the translations we just inserted
        let translation: { lang: string; grammcase: string | null; text: string | null };
        if (dto.translations !== undefined && dto.translations.length > 0) {
          const trans = dto.translations[0];
          // ... DELETE i INSERT translations ...
          translation = {
            lang: trans.lang,
            grammcase: trans.grammcase || null,
            text: trans.text || null,
          };
        } else {
          translation = { lang, grammcase: null, text: null };
        }
        await client.query('COMMIT');
        return { ...updateResult.rows[0], translation }; // Samo aktivni jezik
        // ❌ NIKADA NE vraćati translations: [] u standardnim objektima!
      why: |
        - Translation objekat se konstruiše iz dto.translations[0] podataka koje service šalje
        - Ako postoje translations, vraća se objekat sa grammcase i text vrednostima
        - Ako ne postoje translations, vraća se objekat sa null vrednostima
        - Izbegava dodatni SELECT upit (ne poziva findDomainById)
      correct: |
        // ✅ ISPRAVNO - konstruiše translation objekat iz dto.translations[0] podataka:
        let translation: { lang: string; grammcase: string | null; text: string | null };
        if (dto.translations !== undefined && dto.translations.length > 0) {
          const trans = dto.translations[0];
          // ... DELETE i INSERT translations ...
          translation = {
            lang: trans.lang,
            grammcase: trans.grammcase || null,
            text: trans.text || null,
          };
        } else {
          translation = { lang, grammcase: null, text: null };
        }
        await client.query('COMMIT');
        return { ...updateResult.rows[0], translation }; // Samo aktivni jezik
        // ❌ NIKADA NE vraćati translations: [] u standardnim objektima!
      test_pattern: |
        // Test proverava translations kroz listTranslations():
        await service.update(updateDto, 'en');
        const translations = await repo.listTranslations(testId);
        expect(translations).toHaveLength(2);
        expect(translations.some((t) => t.lang === 'sr' && t.text === 'Ažurirana')).toBe(true);
    
    repository_types: |
      async createDomain(
        dto: CreateDto & {
          id: string;
          translations?: Array<{ id: string; lang: string; grammcase: string; text: string }>; // id je OBAVEZAN
        },
        lang: string
      ): Promise<DetailDto>
    
    numeric_type_conversion:
      problem: "PostgreSQL vraća numeric kolone kao string u pg biblioteci kada se ne koristi cast() u SQL-u"
      solution: |
        Konvertovati u listDomains() i findDomainById() metodama u repository-ju, u mapping-u:
        
        return {
          ...row,
          rate: typeof row.rate === 'string' ? Number.parseFloat(row.rate) : row.rate,
          parity: typeof row.parity === 'string' ? Number.parseInt(row.parity, 10) : row.parity,
        };
      application:
        - "Za float/decimal tipove: Number.parseFloat()"
        - "Za integer tipove: Number.parseInt(row.parity, 10)"
        - "Uvek proveriti tip pre konverzije (typeof row.rate === 'string')"
        - "Primeniti u listDomains() i findDomainById() metodama"
  
  service_layer:
    id_generation:
      must_do:
        - "Generiše ID-jeve za glavnu entitet (uniqueId() - SYNC funkcija, ne koristi await)"
        - "Generiše ID-jeve za translations (uniqueId() za svaki translation - SYNC funkcija)"
        - "Prosleđuje sve ID-jeve repository-ju"
      
      create_method: |
        async create(data: unknown, lang?: string): Promise<DetailDto> {
          const resolvedLang = this.resolveLang(lang);
          const dto = CreateDtoSchema.parse(data);
          
          const id = uniqueId(); // Generiše ID za glavnu entitet
          
          if (!dto.code || dto.code.trim() === '') {
            dto.code = id; // Auto-fill code
          }
          
          // ✅ ISPRAVNO: Uvek generiše ID-jeve za translations
          const translationsWithIds =
            dto.translations?.map((t) => ({ ...t, id: uniqueId() })) ?? [];
          
          const dtoWithId = { ...dto, id, translations: translationsWithIds };
          return this.repo.createDomain(dtoWithId, resolvedLang);
        }
      
      update_method: |
        async update(data: unknown, lang?: string): Promise<DetailDto> {
          const resolvedLang = this.resolveLang(lang);
          const dto = UpdateDtoSchema.parse(data);
          
          // ✅ ISPRAVNO: Ako translation već ima id, koristi ga; inače generiše novi
          const translationsWithIds =
            dto.translations?.map((t) => ({ ...t, id: t.id ?? uniqueId() })) ?? [];
          
          const dtoWithId = { ...dto, translations: translationsWithIds };
          return this.repo.updateDomain(dtoWithId, resolvedLang);
        }
  
  layer_dependencies:
    rule: |
      - Service uvek generiše ID-jeve
      - Repository uvek očekuje obavezne ID-jeve (bez fallback-a)
      - Ako menjaš repository, OBAVEZNO proveri service da li prosleđuje ID-jeve
      - Ako menjaš service, OBAVEZNO proveri repository da li očekuje ID-jeve
    
    verification_before_change:
      - "Pronađi sve pozive metode (grep createDomain, updateDomain, writeTranslations)"
      - "Proveri da li service prosleđuje ID-jeve"
      - "Proveri da li repository očekuje ID-jeve"
      - "Proveri testove (unit i integration) - da li koriste iste tipove"
  
  type_synchronization:
    repository_types_must_match_service: |
      // SERVICE prosleđuje:
      translations: Array<{ id: string; lang: string; grammcase: string; text: string }>
      
      // REPOSITORY očekuje:
      translations?: Array<{ id: string; lang: string; grammcase: string; text: string }>
      // id je OBAVEZAN (ne optional) u tipu
    
    dto_types_for_clients: |
      // DTO može imati opcioni id (klijent ne mora da prosleđuje)
      export interface CreateDto {
        translations?: Array<{
          id?: string;  // Opcioni - service će generisati
          lang: string;
          grammcase: string;
          text: string;
        }>;
      }
  
  update_translations_pattern:
    warning: "Kada se prosleđuje translations u updateDomain, DELETE briše samo translations ZA DATI LANG sa WHERE tableid = ? AND lang = ?, a INSERT dodaje nove za taj lang."
    implications:
      - "Service garantuje da se šalju samo translations za dati lang"
      - "Testovi MORAJU proslediti samo translations za lang koji se ažurira"
    
    example_correct: |
      // ✅ ISPRAVNO - zadržava 'en' i ažurira 'sr':
      const updateDto = {
        id: testId,
        translations: [
          { lang: 'en', grammcase: '1', text: 'Test Currency EN' }, // Zadržavamo postojeći
          { lang: 'sr', grammcase: '1', text: 'Ažurirana Valuta SR' }, // Ažuriramo ovaj
        ],
      };
    
    example_incorrect: |
      // ❌ POGREŠNO - briše 'en' translation:
      const updateDto = {
        id: testId,
        translations: [
          { lang: 'sr', grammcase: '1', text: 'Ažurirana Valuta SR' },
        ],
      };
    
    repository_pattern: |
      if (dto.translations !== undefined) {
        // DELETE briše SVE translations
        await client.query(
          `DELETE FROM ${identifier(this.translationTableName)} WHERE tableid = ${param(1)}::numeric AND lang = ${param(2)}::varchar`,
          [dto.id, trans.lang]
        );
        // INSERT dodaje samo nove (one koje su prosleđene)
        if (dto.translations.length > 0) {
          await this.writeTranslations(client, dto.id, dto.translations);
        }
      }
  
  code_length_constraints:
    problem: |
      - SQL tabele imaju varchar(N) ograničenja (npr. code character varying(10))
      - Testovi generišu test podatke koji mogu preći maxLength ograničenje
    
    solution: |
      Proveriti maxLength u DTO schema (Zod) i SQL tabeli definiciji, i generisati test podatke koji poštuju maxLength ograničenje.
    
    pattern: |
      // Primer: Za varchar(10) sa prefixom 'C1':
      // C1 = 2 karaktera, + 8 cifara = 10 karaktera (maksimalno)
      const testCode = 'C1' + Date.now().toString().slice(-8);
    
    example_correct: |
      // ✅ ISPRAVNO - poštuje maxLength (C1 + 8 cifara = 10 karaktera):
      const testCode = `C1${Date.now().toString().slice(-8)}`;
    
    example_incorrect: |
      // ❌ POGREŠNO - predugačko (CURR1 + 13 cifara = 18 karaktera, a max je 10):
      const testCode = `CURR1${Date.now()}`;
    
    application:
      - "Uvek proveriti maxLength u DTO schema (Zod) i SQL tabeli"
      - "Generisati test kod koji poštuje ograničenje: 'PREFIX' + Date.now().toString().slice(-N) gde je PREFIX.length + N <= maxLength"
      - "Primenjuje se u integration testovima za kreiranje test podataka"
  
  common_mistakes:
    forbidden_patterns:
      - |
        // Repository:
        import { uniqueId } from '...';  // NE!
        const transId = trans.id || uniqueId();  // NE!
      - |
        // Repository:
        translations?: Array<{ id?: string; ... }>  // NE - id mora biti obavezan
    
    correct_patterns:
      - |
        // Service:
        const translationsWithIds = dto.translations?.map((t) => ({ ...t, id: uniqueId() })) ?? [];
        
        // Repository:
        translations?: Array<{ id: string; ... }>  // DA - id je obavezan
  
  workflow_on_changes:
    when_changing_repository:
      - "Pročitam service da vidim šta prosleđuje"
      - "Proverim tipove - da li odgovaraju"
      - "Proverim testove - da li koriste iste tipove"
      - "Proverim da li postoji uniqueId() import u repository-ju (mora biti uklonjen)"
    
    when_changing_service:
      - "Pročitam repository da vidim šta očekuje"
      - "Proverim da li service uvek generiše ID-jeve"
      - "Proverim da li se ID-jevi prosleđuju repository-ju"
    
    note: "Uvek proveriti oba fajla zajedno!"

# ============================================================================
# CODE PATTERNS & CONCEPTS
# ============================================================================
patterns:
  # Repository pattern
  repository:
    # Svi database upiti su čisti SQL (raw SQL)
    use_raw_sql: true
    # Helper funkcije za SQL:
    helpers:
      - 'cast(column, type)' # Npr. cast('id', 'text') -> id::text
      - 'param(index)' # Npr. param(1), param(2) -> $1, $2
      - 'arrayQuery(column, index, type)' # Za IN upite -> column = ANY($index::type[])
      - 'identifier(name)' # Za quoted names -> "name"
      - 'tx.begin' # Transaction begin -> 'BEGIN'
      - 'tx.commit' # Transaction commit -> 'COMMIT'
      - 'tx.rollback' # Transaction rollback -> 'ROLLBACK'

    # Translation table handling
    translation:
      # Automatski se generiše fetchTranslations metoda
      fetch_method: 'fetchTranslations'
      # Automatski se generiše writeTranslations metoda
      write_method: 'writeTranslations'
      # U list i detail metodama se automatski učitavaju translations
      # Pattern: DELETE stari translations, INSERT nove
      create_update_lang: |
        # Za module koji imaju translation tabele:
        # - create i update endpoint-i PRIMAJU lang param (kao i get/list)
        # - lang se propagira kroz Controller -> Service -> Repository
        # - Repository koristi lang pri fetchTranslations nakon inserta/update-a (filtrira prevode za response)
        # - Translation ID-jeve generiše SERVICE (repo ne generiše ID ni za glavnu ni za prevodnu tabelu)
        # - PUT/UPDATE očekuje id u body (dto.id), ne u URL parametru
      
      # DELETE metoda za module sa translation tabelama:
      delete_method:
        description: 'DELETE metoda za module sa translation tabelama'
        implementation: |
          async removeDomain(id: string): Promise<boolean> {
            const client = await getPoolSync().connect();
            try {
              await client.query('BEGIN');
              
              # Prvo proveri da li zapis postoji
              const checkSql = `SELECT 1 FROM ${identifier(this.tableName)} WHERE id = ${param(1)}::numeric`;
              const checkResult = await client.query(checkSql, [id]);
              if (checkResult.rows.length === 0) {
                await client.query('ROLLBACK');
                return false;
              }
              
              # OBAVEZNO: Prvo briši iz translation tabele
              await client.query(
                `DELETE FROM ${identifier(this.translationTableName)} WHERE tableid = ${param(1)}::numeric`,
                [id]
              );
              
              # Zatim briši iz glavne tabele
              await client.query(
                `DELETE FROM ${identifier(this.tableName)} WHERE id = ${param(1)}::numeric`,
                [id]
              );
              
              await client.query('COMMIT');
              return true;
            } catch (error) {
              await client.query('ROLLBACK');
              throw error;
            } finally {
              client.release();
            }
          }
        order: |
          OBAVEZAN REDOSLED:
          1. BEGIN transakcije
          2. Provera postojanja zapisa (SELECT)
          3. DELETE iz translation tabele (WHERE tableid = id)
          4. DELETE iz glavne tabele (WHERE id = id)
          5. COMMIT transakcije
          6. Ako greška: ROLLBACK
        transaction: 'Sve se izvršava u transakciji - ili sve ili ništa'
        error_handling: 'Ako zapis ne postoji, vraća false (ne baca grešku)'

      # Lang parametar + DEFAULT_LANG (obavezno za module sa X tabelom)
      lang_parameter:
        enabled: true
        description: 'lang iz query ili DEFAULT_LANG iz .env; ako nema ni jedno -> error'
        location: 'list/get/create/update (za module sa translation tabelom)'
        format: |
          Lang kodovi moraju biti u formatu: {language}_{variant}
          Primeri: 'en', 'en_usa', 'en_en', 'sr_cyr', 'sr_lat'
          - 'en' - osnovni engleski (može biti bez varijante)
          - 'sr_cyr' - srpski ćirilica (NE 'sr')
          - 'en_usa' - engleski američki variant
          - Testovi MORAJU koristiti ispravne lang kodove (npr. 'sr_cyr' umesto 'sr')
        implementation: |
          // controller - proverava lang parametar pre poziva service metoda
          async create(request: FastifyRequest, reply: FastifyReply): Promise<void> {
            const lang = (request.query as { lang?: string })?.lang?.trim();
            if (!lang) {
              reply.code(400).send({ 
                status: false, 
                message: 'Language parameter (lang) is required' 
              });
              return;
            }
            const item = await this.service.create(request.body, lang);
            reply.code(201).send(item);
          }

          async update(request: FastifyRequest, reply: FastifyReply): Promise<void> {
            const lang = (request.query as { lang?: string })?.lang?.trim();
            if (!lang) {
              reply.code(400).send({ 
                status: false, 
                message: 'Language parameter (lang) is required' 
              });
              return;
            }
            const item = await this.service.update(request.body, lang);
            reply.send(item);
          }
          
          // service - resolveLang metoda
          // VAŽNO: Koristi DEFAULT_LANG iz env.ts (koji je u stvari LANG iz .env)
          import { DEFAULT_LANG } from '../../config/env';
          
          private resolveLang(requestLang?: string): string {
            const fallback = DEFAULT_LANG?.trim();
            const lang = (requestLang ?? fallback)?.trim();
            if (!lang) {
              throw new AppError('Language is required (query lang or DEFAULT_LANG)', 400);
            }
            return lang;
          }
          
          // env.ts eksportuje DEFAULT_LANG iz env.LANG
          // export const DEFAULT_LANG = env.LANG;
          
          // service - korišćenje
          async list(lang?: string): Promise<ModuleListItemDto[]> {
            const resolvedLang = this.resolveLang(lang);
            return this.repo.listDomains(resolvedLang);
          }

          // controller
          const lang = (request.query as { lang?: string })?.lang?.trim();
          const item = await service.list(lang);

          // routes schema
          querystring: Ref('{Module}LangQuery')

      # translations property kada postoji X tabela
      required_translations_property: false
      description: 'U list/get sa JOIN-om na aktivni lang translations niz može biti izostavljen ili prazan ako se koristi posebna /translations/:id ruta za sve jezike. translation polje uvek postoji kao objekat {lang, grammcase, text} gde je text null ako nema prevoda. Translation polja postoje SAMO ako osnovna tabela ima X (translation) tabelu; ako X ne postoji, nema translation polja.'
      implementation: |
        # Ako se koristi poseban endpoint za sve prevode:
        # - list/get: translation (objekat) za aktivni lang - UVEK prisutan, text može biti null
        # - /translations/:id: vraća TranslationDto[]
        # Primer response kada postoji prevod:
        #   { ..., translation: { lang: "sr_cyr", grammcase: "1", text: "Prevedeni tekst" }, ... }
        # Primer response kada NEMA prevod:
        #   { ..., translation: { lang: "sr_cyr", grammcase: null, text: null }, ... }
        # Ako se koristi stari obrazac bez posebne rute:
        # - list/get: samo translation objekat za aktivni lang
      
      # SQL pattern za LEFT JOIN na X tabelu
      sql_pattern: |
        LEFT JOIN iis.cmn_tablex tx ON tx.tableid = main.id AND tx.lang = ${param(N)}::varchar
        SELECT ${cast('tx.lang', 'text')} as tx_lang, ${cast('tx.grammcase', 'text')} as tx_grammcase, tx.text as tx_text
      
      # translationSelect property pattern (OBAVEZNO koristiti cast da se izbegnu problemi sa apostrofima)
      translationSelect_pattern: |
        private readonly translationSelect =
          `${cast('tx.lang', 'text')} as tx_lang, ${cast('tx.grammcase', 'text')} as tx_grammcase, tx.text as tx_text`;
        # VAŽNO: Koristiti cast() za tx.lang i tx.grammcase da se izbegnu problemi sa apostrofima u rezultatu
      
      # Site NULL handling pattern
      site_null_pattern: |
        # PostgreSQL CAST vraća NULL kao prazan string, koristiti NULLIF da se pretvori u NULL
        # SQL:
        NULLIF(${cast('c.site', 'text')}, '') as site
        
        # Mapping:
        site: row.site || undefined  // NULL ili prazan string postaju undefined (izostavljen iz JSON)
        
        # Primer u SELECT upitima:
        SELECT 
          ${cast('c.id', 'text')} as id,
          NULLIF(${cast('c.site', 'text')}, '') as site,
          c.code, c.text, c.valid
        FROM ${identifier(this.tableName)} c
      
      # Mapping pattern za translation objekat
      mapping_pattern: |
        # Translation uvek postoji kao objekat, text je null ako nema prevoda
        const tr = {
          lang,
          grammcase: row.tx_grammcase ?? null,
          text: row.tx_text ?? null
        };
        return { ...row, translation: tr };

      # Response structure pattern - ORIGINAL FIELD + REF OBJECT
      response_structure_pattern: |
        # NOVI STANDARD: Response objekti vraćaju i originalno polje i ref objekat
        # - Originalno polje: string ID iz tabele (za FK reference)
        # - Ref objekat: kompletan objekat sa detaljima (naziv sa "fk" sufiksom)
        #
        # Primer za country polje:
        # Input (create/update):  country: "1682866515650940928"
        # Output (list/get):      country: "1682866515650940928",
        #                        countryfk: { id, code, text, translation }
        #
        # DTO interface:
        #   country: string | null;        // Originalni ID iz tabele
        #   countryfk: CountryDto | null;  // Ref objekat sa detaljima
        #
        # Schema:
        #   country: { type: ['string', 'null'] }     // Originalni ID
        #   countryfk: { $ref: 'CountryDto#' }         // Ref objekat
        #
        # Repository mapping:
        #   country: row.country,           // Originalni ID string
        #   countryfk: row.country ? {      // Ref objekat sa detaljima
        #     id: row.country,
        #     code: row.countryCode,
        #     text: row.countryTxText ?? row.countryCode ?? undefined,
        #     translation: countryTranslation
        #   } : {                           // Prazan objekat sa null vrednostima
        #     id: null,
        #     code: null,
        #     text: null,
        #     translation: { lang, grammcase: null, text: null }
        #   }
        #
        # Translations handling (ccard pattern):
        # - writeTranslations šalje grammcase kao string i cast-uje ::numeric u SQL-u
        # - Service garantuje da se šalju validni stringovi za grammcase
        # - Repository ne parsira grammcase - to radi PostgreSQL cast
        #
        # Translation handling in service layer (ccard pattern):
        # - Ako se šalju translations u request-u, koriste se one
        # - Ako se ne šalju ali postoji text, kreira se default translation za resolvedLang
        #   sa grammcase: '1' i text iz request-a
        # - Ovo garantuje da uvek postoji bar jedna translation
        #
        # Translation object construction after insert/update:
        # - Nakon writeTranslations, konstruiše se translation objekat za aktivni lang
        # - Ako postoji translation za aktivni lang u insertovanom nizu, koristi se taj
        # - Inače se koristi { lang, grammcase: null, text: null }
        # - Ova logika se primenjuje u createDomain I updateDomain
        # - Objekat se konstruiše ručno sa podacima iz INSERT rezultata (bez dodatnog DB query-ja)
        # - FK objekti se inicijalizuju sa null vrednostima (mogu se dobiti sa GET zahtevom)
        #
        # Business rules in service layer:
        # - Service može da poziva repository metode za proveru business pravila
        # - Primer: findDomainByCode za proveru duplikata pre insert-a
        # - Repository vraća minimalne podatke za business logiku (bez ref objekata)
        #
        # Prednosti:
        # - Originalni ID dostupan za dalje reference
        # - Ref objekat pruža detalje bez dodatnih API poziva
        # - Konzistentno sa FK relacijama u bazi
        # - Lakše za frontend da koristi ID za dalje operacije
        #
        # Date format: YYYYMMDD (8 characters, no dashes)
        # Primer: "20251228" umesto "2025-12-28"
        # Ovo se odnosi na begda/endda polja u DTO šemama
      
      # Numeric type conversion pattern (ako DTO definiše numeričke tipove)
      numeric_conversion_pattern: |
        # PostgreSQL vraća numeric kolone kao string ako se ne koristi cast() u SQL-u
        # Konvertovati u repository-ju u listDomains() i findDomainById() metodama:
        return {
          ...row,
          rate: typeof row.rate === 'string' ? Number.parseFloat(row.rate) : row.rate,
          parity: typeof row.parity === 'string' ? Number.parseInt(row.parity, 10) : row.parity,
        };
      
      # listTranslations metoda (samo ako postoji /translations/:id ruta)
      listTranslations: |
        async listTranslations(tableId: string): Promise<TranslationDto[]> {
          const client = await getPoolSync().connect();
          try {
            const sql = `
              SELECT 
                ${cast('id', 'text')} as id,
                ${cast('tableid', 'text')} as tableid,
                lang, grammcase, text
              FROM ${identifier(this.translationTableName)}
              WHERE tableid = ${param(1)}::numeric
              ORDER BY lang
            `;
            const result = await client.query<TranslationDto>(sql, [tableId]);
            return result.rows;
          } finally {
            client.release();
          }
        }
      
      # writeTranslations - STRICT RULES (NE SME generisati ID-jeve!)
      writeTranslations: |
        # ❌ ZABRANJENO u repository-ju:
        # - import { uniqueId } from '...';  // NE SME!
        # - const transId = trans.id || uniqueId();  // ZABRANJENO!
        # - uniqueId() bilo gde u repository-ju
        #
        # ✅ ISPRAVNO:
        # - Repository SAMO koristi prosleđene ID-jeve
        # - Service je odgovoran za generisanje ID-jeva
        # - Tip: Array<{ id: string; ... }> - id je OBAVEZAN (ne optional)
        private async writeTranslations(
          client: PoolClient,
          tableid: string,
          translations: Array<{ id: string; lang: string; grammcase: string; text: string }>
          # VAŽNO: id je OBAVEZAN string (ne optional id?: string)
        ): Promise<void> {
          if (translations.length === 0) {
            return;
          }
          for (const trans of translations) {
            # NIKADA: trans.id || uniqueId() - samo trans.id (mora biti prosleđen)
            await client.query(
              `INSERT INTO ${identifier(this.translationTableName)} (id, tableid, lang, grammcase, text) 
               VALUES (${param(1)}::numeric, ${param(2)}::numeric, ${param(3)}, ${param(4)}::numeric, ${param(5)})`,
              [trans.id, tableid, trans.lang, trans.grammcase, trans.text]
            );
          }
        }

      # Simplified Input Structure (Frontend Input Pattern)
      simplified_input_structure:
        description: |
          Frontend klijent prosleđuje pojednostavljenu strukturu gde text i grammcase su top-level polja,
          a backend interno konstruiše translations array koristeći lang query parametar.
          Ovo omogućava jednostavniji frontend bez potrebe da zna unutrašnju strukturu translations.
        dto_structure: |
          // CREATE DTO - Klijent prosleđuje:
          export interface CmnModuleCreateDto {
            site?: string | null;  // Ako nije prosleđeno, setuje se na null
            code?: string;         // Optional - auto-fill sa id ako nije prosleđen
            text: string;          // Obavezno - ide u osnovnu tabelu i translation
            valid?: number;        // Optional, default 1
            grammcase?: string;    // Optional - default "1" ako nije prosleđen
            // NEMA translations array-a - backend konstruiše ga intern
          }
          
          // UPDATE DTO - Klijent prosleđuje:
          export interface CmnModuleUpdateDto {
            id: string;            // Obavezno za update
            site?: string | null;
            code?: string;
            text?: string;         // Optional - ako je prosleđen, ažurira translation
            valid?: number;
            grammcase?: string;    // Optional - default "1" ako nije prosleđen
            // NEMA translations array-a - backend konstruiše ga intern
          }
        service_create_logic: |
          async create(data: unknown, lang?: string): Promise<DetailDto> {
            const resolvedLang = this.resolveLang(lang);  // Koristi DEFAULT_LANG iz env.ts ako nije prosleđen
            const dto = CreateDtoSchema.parse(data);
            
            const id = uniqueId();
            
            // Auto-fill code if not provided
            if (!dto.code || dto.code.trim() === '') {
              dto.code = id;
            }
            
            // Set site to null if not provided
            const site = dto.site ?? null;
            
            // Default grammcase to "1" if not provided
            const grammcase = dto.grammcase ?? '1';
            
            // text ide u osnovnu tabelu AND translation tabelu
            // Backend konstruiše translations array sa resolvedLang, grammcase i text
            const translations = [
              {
                id: uniqueId(),
                lang: resolvedLang,
                grammcase,
                text: dto.text,
              },
            ];
            
            // Eksplicitno konstruiši dtoWithId bez spread operatora da se osigura da se translations array ne izgubi
            const dtoWithId = {
              id,
              site,
              code: dto.code,
              text: dto.text,
              valid: dto.valid ?? 1,
              translations,
            };
            
            return this.repo.createDomain(dtoWithId, resolvedLang);
          }
        repository_create_return_pattern: |
          # Repository createDomain vraća objekat konstruisan direktno iz INSERT RETURNING i translation podataka
          # NIKADA ne poziva findDomainById (izbegava dodatni SELECT upit)
          # 
          # Pattern:
          const insertResult = await client.query(insertSql, params);
          const created = insertResult.rows[0];
          
          // Construct translation object from the translations we just inserted
          let translation: { lang: string; grammcase: string | null; text: string | null };
          if (dto.translations && dto.translations.length > 0) {
            const trans = dto.translations[0]; // Service sends only one translation
            await this.writeTranslations(client, recordId, dto.translations);
            translation = {
              lang: trans.lang,
              grammcase: trans.grammcase || null,
              text: trans.text || null,
            };
          } else {
            translation = {
              lang,
              grammcase: null,
              text: null,
            };
          }
          
          await client.query('COMMIT');
          
          return {
            id: created.id,
            site: created.site && created.site.trim() !== '' ? created.site : undefined,
            code: created.code,
            text: created.text,
            valid: created.valid,
            translation,
            // ❌ NEMA translations[] - koristi /translations/:id rutu
          };
        service_update_logic: |
          async update(data: unknown, lang?: string): Promise<DetailDto> {
            const resolvedLang = this.resolveLang(lang);  // Koristi DEFAULT_LANG iz env.ts ako nije prosleđen
            const dto = UpdateDtoSchema.parse(data);
            
            // Koristi DEFAULT_LANG iz env.ts (koji je u stvari LANG iz .env)
            const defaultLang = DEFAULT_LANG?.trim();
            const isDefaultLang = resolvedLang === defaultLang;
            
            // Ako je text prosleđen, ažurira translation
            let translations: Array<{ id: string; lang: string; grammcase: string; text: string }> | undefined;
            
            if (dto.text !== undefined) {
              // Default grammcase to "1" if not provided
              const grammcase = dto.grammcase ?? '1';
              
              // Backend konstruiše translations array sa resolvedLang, grammcase i text
              translations = [
                {
                  id: uniqueId(),
                  lang: resolvedLang,
                  grammcase,
                  text: dto.text,
                },
              ];
            }
            
            // Ako lang === DEFAULT_LANG i text je prosleđen: ažurira i osnovnu tabelu i translation
            // Ako lang !== DEFAULT_LANG i text je prosleđen: ažurira samo translation (osnovna tabela ostaje nepromenjena)
            const dtoWithId = {
              id: dto.id,
              site: dto.site,
              code: dto.code,
              // Only include text in main table update if it's DEFAULT_LANG
              text: isDefaultLang && dto.text !== undefined ? dto.text : undefined,
              valid: dto.valid,
              translations,
            };
            
            return this.repo.updateDomain(dtoWithId, resolvedLang);
          }
        repository_update_translations: |
          // Repository ažurira samo translation za dati lang (ne briše sve translations)
          // ZA BASIC CRUD: dto.translations se uvek šalje (čak i za simplified input)
          if (dto.translations !== undefined && dto.translations.length > 0) {
            // Delete only translation for the given lang: WHERE tableid = ? AND lang = ?
            const translation = dto.translations[0]; // Service šalje samo jedan translation za dati lang
            await client.query(
              `DELETE FROM ${identifier(this.translationTableName)} 
               WHERE tableid = ${param(1)}::numeric AND lang = ${param(2)}::varchar`,
              [dto.id, translation.lang]
            );
            // Insert new translation for the given lang
            await this.writeTranslations(client, dto.id, dto.translations);
          }
        json_schema: |
          // CREATE Schema
          export const ModuleCreateSchema = {
            $id: 'CmnModuleCreateDto',
            type: 'object',
            additionalProperties: false,
            properties: {
              site: { type: ['string', 'null'] },
              code: { type: 'string', minLength: 1, maxLength: 20 }, // Optional - will be auto-filled
              text: { type: 'string', minLength: 1, maxLength: 60 },
              valid: { type: 'number', minimum: 0, maximum: 1 },
              grammcase: { type: 'string', minLength: 1 }, // Optional - default "1"
            },
            required: ['text'], // code NIJE u required jer se auto-fill-uje
          };
          
          // UPDATE Schema
          export const ModuleUpdateSchema = {
            $id: 'CmnModuleUpdateDto',
            type: 'object',
            additionalProperties: false,
            properties: {
              id: { type: 'string', minLength: 1 },
              site: { type: ['string', 'null'] },
              code: { type: 'string', minLength: 1, maxLength: 20 },
              text: { type: 'string', minLength: 1, maxLength: 60 },
              valid: { type: 'number', minimum: 0, maximum: 1 },
              grammcase: { type: 'string', minLength: 1 }, // Optional - default "1"
            },
            required: ['id'],
          };
        key_points: |
          1. Frontend NIKADA ne prosleđuje translations array - to je backend responsibilnost
          2. lang se prosleđuje kao query parametar (?lang=sr_cyr)
          3. text i grammcase su top-level polja u body-ju
          4. grammcase default "1" ako nije prosleđen
          5. site se setuje na null ako nije prosleđen
          6. code se auto-fill-uje sa id ako nije prosleđen
          7. CREATE: text ide u osnovnu tabelu I translation tabelu
          8. UPDATE: 
             - Ako lang === DEFAULT_LANG: ažurira i osnovnu tabelu i translation
             - Ako lang !== DEFAULT_LANG: ažurira samo translation (osnovna tabela ostaje)
          9. Repository ažurira samo translation za dati lang (DELETE + INSERT za taj lang, ne sve)
          10. DEFAULT_LANG se uzima iz env.ts (koji je u stvari LANG iz .env fajla)
          11. Repository createDomain konstruiše return objekat direktno iz INSERT RETURNING i translation podataka (NE poziva findDomainById)
          12. Site NULL handling: koristi se NULLIF u SQL upitima i mapping sa `|| undefined` da se prazan string pretvori u undefined
          13. DELETE ruta koristi path parametar `/:id` (NE query parametar `?id=...`)

      # Primeri korišćenja:
      usage_examples:
        - 'GET /badm/adm/action - vraća sve translations'
        - 'GET /badm/adm/action?lang=sr_cyr - vraća samo srpske translations'
        - 'GET /badm/adm/action/123?lang=en - vraća jedan action sa engleskim translations'
        - 'POST /badm/CMN/ccard?lang=sr_cyr - Body: { "text": "Visa", "grammcase": "1", "valid": 1 }'
        - 'PUT /badm/CMN/ccard?lang=sr_cyr - Body: { "id": "123", "text": "Ažurirano" }'

    # Foreign key handling
    foreign_keys:
      # Automatski se generiše JOIN u list i detail metodama
      # Primer: adm_user.usergrp -> LEFT JOIN adm_usergrp ON adm_usergrp.id = adm_user.usergrp
      # Generiše se dodatna kolona sa code/text iz referencirane tabele
      # Npr. usergrpId (iz adm_user.usergrp) i usergrpCode (iz adm_usergrp.code)
      
      # FK sa X tabelom se vraća kao nested objekat sa prevodima
      join_pattern: |
        SELECT 
          main.*,
          fk.code as "fkCode",
          fk.text as "fkBaseText",
          fkx.text as "fkTxText",
          fkx.grammcase as "fkGrammcase"
        FROM main_table main
        LEFT JOIN fk_table fk ON fk.id = main.fk_id
        LEFT JOIN fk_tablex fkx ON fkx.tableid = main.fk_id AND fkx.lang = ${param(1)}::varchar
      
      mapping_pattern: |
        return {
          fk: row.fk_id ? {
            id: row.fk_id,
            code: row.fkCode,
            text: row.fkTxText ?? row.fkBaseText ?? undefined,
            translation: {
              lang,
              grammcase: row.fkGrammcase ?? null,
              text: row.fkTxText ?? null // Uvek prisutan, null ako nema prevoda
            }
          } : null
        }
      
      dto_structure: |
        interface CmnModuleFkDto {
          id: string;
          code: string;
          text?: string;  // fkTxText ?? fkBaseText ?? undefined
          translation: {
            lang: string;
            grammcase: string | null;
            text: string | null; // Uvek prisutan, null ako nema prevoda
          };
        }
      
      naming: |
        - TranslationLite interfejs: CmnModuleFkTranslationLite
        - FK DTO interfejs: CmnModuleFkDto
        - Primer: CmnParcontactParTranslationLite, CmnParcontactParDto

    # Tree/Hijerarhijske strukture (PREDLOŽENO)
    tree_structures:
      # Automatsko generisanje tree endpoint-a za tabele sa parent-child relacijama
      enabled: true
      description: 'Automatski generiše tree endpoint-e za hijerarhijske strukture'

      # Detekcija:
      detection:
        # Kolone koje ukazuju na parent-child relaciju:
        parent_child_columns:
          - 'parent_id'
          - 'parent'
          - 'loc1' # Za loclink (loc1 -> loc2)
          - 'loc2'
          - 'obj1' # Za objlink (obj1 -> obj2)
          - 'obj2'
          - 'org1' # Za orglink (org1 -> org2)
          - 'org2'

      # Pattern za tree repository:
      repository_pattern: |
        async getTree(rootId: string, lang?: string): Promise<{Module}TreeDto[]> {
          const client = await pool.connect();
          try {
            // Recursive CTE upit (PARAMETRIZED!)
            const sql = `
              WITH RECURSIVE tree AS (
                -- Base case: root element
                SELECT id, parent_id, ... FROM ${identifier('{table}')} 
                WHERE id = ${param(1)}::numeric
                UNION ALL
                -- Recursive case: children
                SELECT t.id, t.parent_id, ... FROM ${identifier('{table}')} t
                INNER JOIN tree ON t.parent_id = tree.id
              )
              SELECT * FROM tree ORDER BY ...
            `;
            const params = [rootId];
            // Lang parametar se dodaje ako postoji (parametrized!)
            const res = await client.query<{Module}TreeDto>(sql, params);
            return this.buildTree(res.rows); // Transformacija u tree strukturu
          } finally {
            client.release();
          }
        }

      # Pattern za tree service:
      service_pattern: |
        async getTree(rootId: string, lang?: string): Promise<{Module}TreeDto[]> {
          // Zod validacija za rootId
          const validatedRootId = z.string().parse(rootId);
          return this.repo.getTree(validatedRootId, lang);
        }

      # Pattern za tree controller:
      controller_pattern: |
        async getTree(request: FastifyRequest, reply: FastifyReply) {
          const rootId = (request.params as { rootId: string }).rootId;
          const lang = (request.query as { lang?: string })?.lang?.trim();
          const tree = await this.service.getTree(rootId, lang);
          reply.send(tree);
        }

      # DTO pattern:
      dto_pattern: |
        export interface {Module}TreeDto extends {Module}ListItemDto {
          children: {Module}TreeDto[]; // Recursive tree struktura
        }

      # VAŽNO:
      important_notes: |
        - Recursive CTE upiti MORAJU biti parametrized (NE hardkodovani ID-ovi!)
        - Lang parametar kroz parametrized query, NE string concatenation
        - Testirati sa različitim rootId vrednostima
        - Testirati sa različitim lang vrednostima
        - Tree struktura je read-only (samo GET metode)

    # View-ovi Pattern (AD-HOC VIEW-OVI - POJEDNOSTAVLJENO)
    view_pattern:
      # Automatsko generisanje read-only modula za database view-ove i ad-hoc view-ove
      enabled: true
      description: 'Automatski generiše read-only module za database view-ove i ad-hoc view-ove (tree, reporting, itd.)'

      # Filozofija:
      philosophy: |
        - View-ovi su AD-HOC - bez striktnih tipova i kompleksnih validacija
        - Strukturirano ide u CRUD GET metode (sa DTO, schema, validacije)
        - View-ovi su fleksibilni, brzi za razvoj, bez preopterećenja
        - Koristi any[] ili Record<string, any>[] umesto striktnih DTO tipova

      # Detekcija:
      detection:
        # View-ovi se detektuju po SQL definiciji:
        sql_patterns:
          - 'CREATE VIEW'
          - 'CREATE OR REPLACE VIEW'
        # Ili po imenu (opciono):
        name_patterns:
          - '*_v' # View-ovi sa _v sufiksom
          - '*_l' # View-ovi sa _l sufiksom
          - '*tree*' # Tree view-ovi (cmn_objtree_json_v, cmn_loctree_json_v, itd.)

      # Automatska primena read_only profila:
      auto_profile: 'read_only'

      # Struktura fajlova:
      file_structure: |
        src/modules/{module}/
        ├── [CRUD fajlovi] - sa DTO, schema, validacije
        └── [View fajlovi] - minimalna struktura, ad-hoc
            ├── {module}.view.repository.ts  # any[] return type
            ├── {module}.view.service.ts      # Minimalna logika
            └── {module}.view.routes.ts      # Minimalna schema

      # Pattern za view repository:
      repository_pattern: |
        import { getPoolSync } from '../../config/db.config';
        import { param, identifier } from '../../core/database';

        export class {Module}ViewRepository {
          /**
           * Get view data - ad-hoc, vraća any[]
           */
          async getView(
            filters?: Record<string, any>,
            lang?: string
          ): Promise<any[]> {
            const client = await getPoolSync().connect();
            try {
              // SQL upit za view (PARAMETRIZED!)
              const sql = `SELECT * FROM ${identifier('{view_name}')} WHERE ...`;
              const params: any[] = [];
              // Lang i filter parametri se dodaju kao parametri (NE string concatenation!)
              const res = await client.query(sql, params);
              return res.rows;
            } finally {
              client.release();
            }
          }
        }

      # Pattern za view service:
      service_pattern: |
        import { {Module}ViewRepository } from './{module}.view.repository';

        export class {Module}ViewService {
          private readonly repo = new {Module}ViewRepository();

          /**
           * Get view - minimalna validacija, vraća any[]
           */
          async getView(
            filters?: Record<string, any>,
            lang?: string
          ): Promise<any[]> {
            // Minimalna validacija (opciono)
            return this.repo.getView(filters, lang);
          }
        }

      # Pattern za view routes:
      routes_pattern: |
        import { FastifyInstance, FastifyRequest, FastifyReply } from 'fastify';
        import { {Module}ViewService } from './{module}.view.service';
        import { authGuard } from '../../middleware/authGuard';
        import { requireModuleRole } from '../../middleware/permissionGuard';

        export async function {module}ViewRoutes(app: FastifyInstance): Promise<void> {
          const service = new {Module}ViewService();

          // View endpoint - minimalna schema
          app.get(
            '/view',
            {
              preHandler: [authGuard, requireModuleRole('MODULE', ['MODULE_VIEW'])],
              schema: {
                querystring: {
                  type: 'object',
                  properties: {
                    lang: { type: 'string' },
                    // Ostali query parametri (opciono)
                  }
                },
                // Response: any (bez striktnih tipova)
                response: {
                  200: {
                    type: 'array',
                    items: { type: 'object' } // Generički object
                  }
                }
              }
            },
            async (request: FastifyRequest, reply: FastifyReply) => {
              const query = request.query as Record<string, any>;
              const result = await service.getView(query, query.lang);
              reply.send(result);
            }
          );
        }

      # VAŽNO - Pravilo:
      rule: |
        VIEW-OVI = AD-HOC:
        - Bez DTO fajlova (koristi any[] ili Record<string, any>[])
        - Minimalna schema validacija (samo query parametri)
        - Fleksibilni, brzi za razvoj
        - SQL upiti moraju biti parametrized (NE string concatenation!)

        CRUD GET = STRUKTURIRANO:
        - Sa DTO fajlovima i striktnim tipovima
        - Kompleksna schema validacija
        - Za strukturirane podatke (SAP strukture, itd.)

      # VAŽNO:
      important_notes: |
        - View-ovi su uvek read-only (samo GET metode)
        - Nema CREATE, UPDATE, DELETE operacija
        - SQL upiti moraju biti parametrized (NE string concatenation!)
        - View-ovi se automatski generišu sa read_only profilom
        - Može se koristiti za reporting, analytics, tree strukture
        - NEMA striktnih DTO tipova - koristi any[] ili Record<string, any>[]
        - Minimalna schema validacija - samo za query parametre
        - Strukturirano ide u CRUD GET metode

  # Service pattern
  service:
    # Service poziva repository metode
    # Ne sadrži direktne database upite
    # Sadrži business logiku
    # Runtime validacija kroz Zod schemas
    # Helper funkcije:
    helpers:
      - name: 'nowAsString'
        description: "Formatira timestamp u 'YYYY-MM-DD HH:mm:ss' format"
        implementation: |
          function nowAsString(): string {
            return new Date().toISOString().slice(0, 19).replace('T', ' ');
          }
        usage: 'Za created_at i updated_at kolone u INSERT/UPDATE upitima'

    # Service metode:
    methods:
      # Standardne metode (za sve profile osim integration_only):
      - name: 'list'
        description: 'Vraća listu svih zapisa'
        implementation: |
          async list(lang?: string): Promise<{Module}ListItemDto[]> {
            const resolvedLang = this.resolveLang(lang);
            return this.repo.listDomains(resolvedLang);
          }
        returns: '{Module}ListItemDto[]'
        calls: |
          - resolveLang(lang) - rezolvuje lang sa DEFAULT_LANG fallback
          - repository.listDomains(resolvedLang)
        # Za module sa translation tabelama, prima opcioni lang parametar
        lang_parameter: 'Opcioni lang query parametar; ako nema, koristi DEFAULT_LANG; ako nema ni jedno -> error'
        profiles: ['full_crud', 'read_only', 'reporting'] # NE za integration_only

      - name: 'getOne'
        description: 'Vraća jedan zapis po ID'
        implementation: |
          async getOne(id: string, lang?: string): Promise<{Module}DetailDto> {
            const resolvedLang = this.resolveLang(lang);
            const item = await this.repo.findDomainById(id, resolvedLang);
            if (!item) {
              throw new AppError('{Module} not found', 404);
            }
            return item;
          }
        parameters: ['id: string', 'lang?: string']
        returns: '{Module}DetailDto'
        calls: |
          - resolveLang(lang) - rezolvuje lang sa DEFAULT_LANG fallback
          - repository.findDomainById(id, resolvedLang)
        error_handling: "Baca AppError('{Module} not found', 404) ako ne postoji"
        # Za module sa translation tabelama, prima opcioni lang parametar
        lang_parameter: 'Opcioni lang query parametar; ako nema, koristi DEFAULT_LANG; ako nema ni jedno -> error'
        profiles: ['full_crud', 'read_only', 'reporting'] # NE za integration_only

      # CRUD metode (samo za full_crud profile):
      - name: 'create'
        description: 'Kreira novi zapis'
        implementation: |
          async create(data: unknown, lang?: string): Promise<{Module}DetailDto> {
            const resolvedLang = this.resolveLang(lang);
            const dto = {Module}CreateDtoSchema.parse(data);
            
            # Generate ID first (needed for auto-fill logic)
            const id = uniqueId();
            
            # Auto-fill code if not provided or empty
            if (!dto.code || dto.code.trim() === '') {
              dto.code = id;
            }
            
            # Generate IDs for translations if present
            # ⚠️ VAŽNO: Service MORA generisati ID-jeve za translations
            # Repository očekuje: Array<{ id: string; ... }> - id je OBAVEZAN
            const translationsWithIds =
              dto.translations?.map((t) => ({ ...t, id: uniqueId() })) ?? [];
            const dtoWithId = { ...dto, id, translations: translationsWithIds };
            
            return this.repo.createDomain(dtoWithId, resolvedLang);
          }
        parameters: ['data: unknown (validira se kroz Zod)', 'lang?: string']
        returns: '{Module}DetailDto'
        calls: |
          - resolveLang(lang) - rezolvuje lang sa DEFAULT_LANG fallback
          - Zod validacija: {Module}CreateDtoSchema.parse(data)
          - uniqueId() - generiše ID za glavnu entitet
          - Auto-fill code = id (ako nije prosleđen)
          - Generiše ID za translations (t.id ?? uniqueId())
          - repository.createDomain(dtoWithId, resolvedLang)
        validation: 'Zod schema validacija - baca ZodError ako validacija ne uspe'
        auto_fill: |
          - code: Automatski se postavlja na id ako nije prosleđen ili je prazan string
          - Primenjuje se na sve tabele koje imaju kolone id, site, code
        translation_ids: |
          - Translation ID-jevi se generišu U ISKLJUČIVO u service sloju
          - Repository NIKADA ne generiše ID-jeve (NE koristi uniqueId(), NE koristi fallback trans.id || uniqueId())
          - create metoda: dto.translations?.map((t) => ({ ...t, id: uniqueId() })) ?? []
          - update metoda: ZA BASIC CRUD SA TRANSLATIONS koristi simplified input (text + grammcase), ne array!
          - Repository očekuje: Array<{ id: string; ... }> - id je OBAVEZAN string (ne optional)
          - Service uvek generiše ID-jeve za translations
        profiles: ['full_crud'] # SAMO za full_crud

      - name: 'update'
        description: 'Ažurira postojeći zapis'
        implementation: |
          async update(data: unknown, lang?: string): Promise<{Module}DetailDto> {
            const resolvedLang = this.resolveLang(lang);
            const dto = {Module}UpdateDtoSchema.parse(data);
            
            # Generate IDs for translations if present
            # ⚠️ VAŽNO: Service MORA generisati ID-jeve za translations
            # - Ako translation već ima id, koristi ga (za update scenarije)
            # - Ako nema id, generiše novi (uniqueId())
            # Repository očekuje: Array<{ id: string; ... }> - id je OBAVEZAN
            const translationsWithIds =
              dto.translations?.map((t) => ({ ...t, id: t.id ?? uniqueId() })) ?? [];
            const dtoWithId = { ...dto, translations: translationsWithIds };
            
            const updated = await this.repo.updateDomain(dtoWithId, resolvedLang);
            if (!updated) {
              throw new AppError('{Module} not found', 404);
            }
            return updated;
          }
        parameters: ['data: unknown (validira se kroz Zod)', 'lang?: string']
        returns: '{Module}DetailDto'
        calls: |
          - resolveLang(lang) - rezolvuje lang sa DEFAULT_LANG fallback
          - Zod validacija: {Module}UpdateDtoSchema.parse(data) - dto mora imati id
          - Generiše ID za translations (t.id ?? uniqueId())
          - repository.updateDomain(dtoWithId, resolvedLang) - prima dto sa id, ne odvojeni id param
        error_handling: "Baca AppError('{Module} not found', 404) ako ne postoji"
        validation: 'Zod schema validacija - baca ZodError ako validacija ne uspe'
        id_in_body: 'ID se prosleđuje u body-u (dto.id), ne u URL parametru'
        profiles: ['full_crud'] # SAMO za full_crud
      
      - name: 'translations'
        description: 'Vraća sve prevode za dati ID'
        implementation: |
          async translations(id: string): Promise<TranslationDto[]> {
            return this.repo.listTranslations(id);
          }
        parameters: ['id: string']
        returns: 'TranslationDto[]'
        calls: 'repository.listTranslations(id)'
        profiles: ['full_crud', 'read_only'] # Samo za module sa X tabelom

      - name: 'remove'
        description: 'Obriši zapis'
        implementation: |
          async remove(id: string): Promise<void> {
            const removed = await this.repo.removeDomain(id);
            if (!removed) {
              throw new AppError('{Module} not found', 404);
            }
          }
        parameters: ['id: string']
        returns: 'void'
        calls: 'repository.removeDomain(id)'
        error_handling: "Baca AppError('{Module} not found', 404) ako ne postoji"
        profiles: ['full_crud'] # SAMO za full_crud
        notes: |
          - Za module sa translation tabelama, repository.removeDomain() prvo briše iz translation tabele, pa iz glavne tabele
          - Sve se izvršava u transakciji (BEGIN/COMMIT/ROLLBACK)
          - Ako zapis ne postoji, vraća false i service baca AppError

      # Integration metode (samo za integration_only profile):
      - name: 'syncFromLegacy'
        description: 'Sinhronizacija svih zapisa sa legacy sistemom'
        implementation: |
          async syncFromLegacy(): Promise<{Module}SyncResultDto> {
            const legacyData = await this.repo.fetchFromLegacy();
            return this.repo.pushToLegacy(legacyData);
          }
        profiles: ['integration_only'] # SAMO za integration_only

      - name: 'syncToLegacy'
        description: 'Sinhronizacija jednog zapisa sa legacy sistemom'
        profiles: ['integration_only'] # SAMO za integration_only

      - name: 'getFromLegacy'
        description: 'Dohvati zapis iz legacy sistema'
        profiles: ['integration_only'] # SAMO za integration_only

      - name: 'transformLegacyData'
        description: 'Transformacija podataka iz legacy formata'
        profiles: ['integration_only'] # SAMO za integration_only

      # Reporting metode (samo za reporting profile):
      - name: 'exportData'
        description: 'Export podataka u različitim formatima (CSV, Excel, PDF)'
        profiles: ['reporting'] # SAMO za reporting

      - name: 'getStatistics'
        description: 'Statistike i agregatni podaci'
        profiles: ['reporting'] # SAMO za reporting

      - name: 'getAnalytics'
        description: 'Analitički podaci i metrike'
        profiles: ['reporting'] # SAMO za reporting

      - name: 'executeQuery'
        description: 'Custom query za reporting'
        profiles: ['reporting'] # SAMO za reporting

      - name: 'getChartData'
        description: 'Podaci za chart-ove (line, bar, pie, itd.)'
        profiles: ['reporting'] # SAMO za reporting

    # Validacija:
    validation:
      method: 'Zod schemas'
      location: 'DTO fajl ({module}.dto.ts)'
      pattern: |
        # Zod schemas se definišu u DTO fajlu:
        export const {Module}CreateDtoSchema = z.object({
          code: z.string().max(150).optional(), # Optional - will be auto-filled with id if not provided
          field1: z.string().min(1),
          field2: z.number().optional(),
          ...
        });

        # Service koristi Zod za runtime validaciju:
        async create(data: unknown): Promise<{Module}DetailDto> {
          const dto = {Module}CreateDtoSchema.parse(data);
          
          # Generate ID first (needed for auto-fill logic)
          const id = uniqueId();
          
          # Auto-fill code if not provided or empty
          if (!dto.code || dto.code.trim() === '') {
            dto.code = id;
          }
          
          return this.repo.createDomain(dto, id);
        }

      error_handling: |
        # Zod baca ZodError ako validacija ne uspe
        # Fastify automatski hvata ZodError i vraća 400 Bad Request
        # Ili može se eksplicitno handle-ovati u Service-u

  # Controller pattern
  controller:
    # Controller poziva service metode
    # Ne sadrži business logiku
    # **ZOD-ONLY**: NEMA getSchemas() metoda
    # Rukuje request/reply objektima
    # Koristi type assertions za request podatke

    # Controller metode:
    methods:
      - name: 'list'
        description: 'GET / - Lista svih zapisa'
        implementation: |
          async list(request: FastifyRequest, reply: FastifyReply) {
            const lang = (request.query as { lang?: string })?.lang?.trim();
            const items = await this.service.list(lang);
            reply.send(items);
          }
        calls: 'service.list(lang?)'
        response: 'reply.send(result)'

      - name: 'getOne'
        description: 'GET /:id - Jedan zapis'
        implementation: |
          async getOne(request: FastifyRequest, reply: FastifyReply) {
            const id = (request.params as { id: string }).id;
            const lang = (request.query as { lang?: string })?.lang?.trim();
            const item = await this.service.getOne(id, lang);
            reply.send(item);
          }
        parameters: |
          - request.params.id (type assertion: as { id: string })
          - request.query.lang (type assertion: as { lang?: string })
        calls: 'service.getOne(id, lang?)'
        response: 'reply.send(result)'

      - name: 'create'
        description: 'POST / - Kreiraj zapis'
        implementation: |
          async create(request: FastifyRequest, reply: FastifyReply) {
            const item = await this.service.create(request.body);
            reply.code(201).send(item);
          }
        parameters: 'request.body (prosleđuje se kao unknown, validacija u Service)'
        calls: 'service.create(request.body)'
        response: 'reply.code(201).send(result)'

      - name: 'update'
        description: 'PUT / - Ažuriraj zapis (id je u body)'
        implementation: |
          async update(request: FastifyRequest, reply: FastifyReply) {
            const id = (request.params as { id: string }).id;
            const item = await this.service.update(id, request.body);
            reply.send(item);
          }
        parameters: |
          - request.params.id (type assertion: as { id: string })
          - request.body (prosleđuje se kao unknown, validacija u Service)
        calls: 'service.update(id, request.body)'
        response: 'reply.send(result)'

      - name: 'remove'
        description: 'DELETE /:id - Obriši zapis'
        implementation: |
          async remove(request: FastifyRequest, reply: FastifyReply) {
            const id = (request.params as { id: string }).id;
            try {
              await this.service.remove(id);
              reply.code(200).send({ status: true, message: '{Module} deleted successfully' });
            } catch (error) {
              if (error instanceof AppError) {
                reply.code(error.statusCode).send({ status: false, message: error.message });
              } else {
                const errorMessage = error instanceof Error ? error.message : 'Unknown error occurred';
                reply.code(500).send({ status: false, message: errorMessage });
              }
            }
          }
        parameters: 'request.params.id (type assertion: as { id: string })'
        calls: 'service.remove(id)'
        response: |
          # Uvek vraća JSON sa status (boolean) i message (string)
          # Uspeh (200): { status: true, message: '{Module} deleted successfully' }
          # Neuspeh (404): { status: false, message: '{Module} not found' }
          # Greška (500): { status: false, message: 'Unknown error occurred' }
          # Frontend proverava HTTP status kod (200 = uspeh, ostalo = neuspeh) ili status boolean polje
        imports: |
          import { AppError } from '../../core/errors/AppError';
        profiles: ['full_crud'] # SAMO za full_crud

    # Schema definicije:
    schemas:
      location: '**ZOD-ONLY**: NEMA getSchemas() metoda - validacija u Service sloju'
      delete_response_pattern: |
        # DELETE response uvek vraća objekat sa status (boolean) i message (string)
        # Controller hvata error-e i vraća odgovarajući response
        # Uspeh (200): { status: true, message: '{Module} deleted successfully' }
        # Neuspeh (404): { status: false, message: '{Module} not found' }
        # Greška (500): { status: false, message: 'Unknown error occurred' }
        # Primer implementacije:
        #   try {
        #     await this.service.remove(id);
        #     reply.code(200).send({ status: true, message: 'Currency deleted successfully' });
        #   } catch (error) {
        #     if (error instanceof AppError) {
        #       reply.code(error.statusCode).send({ status: false, message: error.message });
        #     } else {
        #       reply.code(500).send({ status: false, message: 'Unknown error occurred' });
        #     }
        #   }
      zod_only: |
        # **ZOD-ONLY STANDARD**
        # NEMA getSchemas() metoda u controller-u
        # Zod schemas služe samo za runtime validaciju u Service sloju
            getOne: {
              description: 'Get one {module} item',
              tags: ['{module}'],
              params: {
                type: 'object',
                properties: {
                  id: { type: 'string' }
                },
                required: ['id']
              },
              response: {
                200: { $ref: '#/components/schemas/{Module}DetailDto' },
                404: { type: 'object', properties: { message: { type: 'string' } } }
              }
            },
            create: {
              description: 'Create new {module} item',
              tags: ['{module}'],
              body: {
                type: 'object',
                required: ['...'],
                properties: { ... }
              },
              response: {
                201: { $ref: '#/components/schemas/{Module}DetailDto' }
              }
            },
            update: {
              description: 'Update {module} item',
              tags: ['{module}'],
              params: {
                type: 'object',
                properties: {
                  id: { type: 'string' }
                },
                required: ['id']
              },
              body: {
                type: 'object',
                properties: { ... }
              },
              response: {
                200: { $ref: '#/components/schemas/{Module}DetailDto' },
                404: { type: 'object', properties: { message: { type: 'string' } } }
              }
            },
            remove: {
              description: 'Delete {module} item',
              tags: ['{module}'],
              params: {
                type: 'object',
                properties: {
                  id: { type: 'string' }
                },
                required: ['id']
              },
              response: {
                200: {
                  type: 'object',
                  properties: {
                    status: { type: 'boolean' },
                    message: { type: 'string' },
                  },
                  required: ['status', 'message'],
                  description: 'Successfully deleted',
                },
                404: {
                  type: 'object',
                  properties: {
                    status: { type: 'boolean' },
                    message: { type: 'string' },
                  },
                  required: ['status', 'message'],
                  description: '{Module} not found',
                },
                500: {
                  type: 'object',
                  properties: {
                    status: { type: 'boolean' },
                    message: { type: 'string' },
                  },
                  required: ['status', 'message'],
                  description: 'Internal server error',
                },
              }
            }
          };
        }

  # Routes pattern
  routes:
    # Samo registracija ruta
    # PreHandler middleware (authGuard, permissionGuard, rateLimiter, itd.)
    # **ZOD-ONLY**: NEMA schema referenci - validacija u Service sloju
    # Bez logike - samo routing
    # NIKADA: generic tipovi, type assertions, query/body processing

    # Route struktura (full_crud profile):
    structure_full_crud: |
      export async function {module}Routes(app: FastifyInstance) {
        const controller = new {Module}Controller();
        # ❌ NEMA: const schemas = {Module}Controller.getSchemas();

        app.get('/', {
          preHandler: [authGuard, requireModuleRole('MODULE', ['VIEW', 'ALL'])]
          # ❌ NEMA: schema: schemas.list
        }, controller.list.bind(controller));

        app.get('/:id', {
          preHandler: [authGuard, requireModuleRole('MODULE', ['VIEW', 'ALL'])]
          # ❌ NEMA: schema: schemas.getOne
        }, controller.getOne.bind(controller));

        app.post('/', {
          preHandler: [authGuard, requireModuleRole('MODULE', ['CREATE', 'ALL'])]
          # ❌ NEMA: schema: schemas.create
        }, controller.create.bind(controller));

        app.put('/', {
          preHandler: [authGuard, requireModuleRole('MODULE', ['UPDATE', 'ALL'])]
          # ❌ NEMA: schema: schemas.update
        }, controller.update.bind(controller));

        app.delete('/:id', {
          preHandler: [authGuard, requireModuleRole('MODULE', ['DELETE', 'ALL'])]
          # ❌ NEMA: schema: schemas.remove
        }, controller.remove.bind(controller));
      }

    # Route struktura (read_only profile):
    structure_read_only: |
      export async function {module}Routes(app: FastifyInstance) {
        const controller = new {Module}Controller();
        # ❌ NEMA: const schemas = {Module}Controller.getSchemas();

        app.get('/', {
          preHandler: [authGuard, requireModuleRole('MODULE', ['MODULE_VIEW'])]
          # ❌ NEMA: schema: schemas.list
        }, controller.list.bind(controller));

        app.get('/:id', {
          preHandler: [authGuard, requireModuleRole('MODULE', ['MODULE_VIEW'])]
          # ❌ NEMA: schema: schemas.getOne
        }, controller.getOne.bind(controller));

        # POST, PUT, DELETE se NE registruju
      }

    # Route struktura (integration_only profile):
    structure_integration_only: |
      export async function {module}Routes(app: FastifyInstance) {
        const controller = new {Module}Controller();
        # ❌ NEMA: const schemas = {Module}Controller.getSchemas();

        # Standardni CRUD se NE registruje

        app.post('/sync', {
          preHandler: [authGuard, requireModuleRole('MODULE', ['MODULE_SYNC'])]
          # ❌ NEMA: schema: schemas.sync
        }, controller.syncFromLegacy.bind(controller));

        app.post('/sync/:id', {
          preHandler: [authGuard, requireModuleRole('MODULE', ['MODULE_SYNC'])]
          # ❌ NEMA: schema: schemas.syncOne
        }, controller.syncOneFromLegacy.bind(controller));

        app.get('/legacy/:legacyId', {
          preHandler: [authGuard, requireModuleRole('MODULE', ['MODULE_INTEGRATE'])]
          # ❌ NEMA: schema: schemas.getFromLegacy
        }, controller.getFromLegacy.bind(controller));

        app.post('/transform', {
          preHandler: [authGuard, requireModuleRole('MODULE', ['MODULE_INTEGRATE'])]
          # ❌ NEMA: schema: schemas.transform
        }, controller.transformLegacyData.bind(controller));
      }

    # Route struktura (reporting profile):
    structure_reporting: |
      export async function {module}Routes(app: FastifyInstance) {
        const controller = new {Module}Controller();
        # ❌ NEMA: const schemas = {Module}Controller.getSchemas();

        app.get('/', {
          preHandler: [authGuard, requireModuleRole('MODULE', ['MODULE_VIEW'])]
          # ❌ NEMA: schema: schemas.list
        }, controller.list.bind(controller));

        app.get('/:id', {
          preHandler: [authGuard, requireModuleRole('MODULE', ['MODULE_VIEW'])]
          # ❌ NEMA: schema: schemas.getOne
        }, controller.getOne.bind(controller));

        app.get('/export', {
          preHandler: [authGuard, requireModuleRole('MODULE', ['MODULE_EXPORT'])]
          # ❌ NEMA: schema: schemas.export
        }, controller.exportData.bind(controller));

        app.get('/statistics', {
          preHandler: [authGuard, requireModuleRole('MODULE', ['MODULE_REPORT'])]
          # ❌ NEMA: schema: schemas.statistics
        }, controller.getStatistics.bind(controller));

        app.get('/analytics', {
          preHandler: [authGuard, requireModuleRole('MODULE', ['MODULE_REPORT'])]
          # ❌ NEMA: schema: schemas.analytics
        }, controller.getAnalytics.bind(controller));

        app.post('/query', {
          preHandler: [authGuard, requireModuleRole('MODULE', ['MODULE_REPORT'])]
          # ❌ NEMA: schema: schemas.query
        }, controller.executeQuery.bind(controller));

        app.get('/charts/:type', {
          preHandler: [authGuard, requireModuleRole('MODULE', ['MODULE_REPORT'])]
          # ❌ NEMA: schema: schemas.chartData
        }, controller.getChartData.bind(controller));
      }

    # Zabranjene prakse:
    forbidden: |
      # ❌ NIKADA ne koristiti generic tipove:
      # app.get<{ Params: { id: string } }>(...)
      # app.get<{ Querystring: { lang?: string } }>(...)
      # app.post<{ Body: {Module}CreateDto }>(...)
      #
      # ✅ Umesto toga, koristiti type assertions u Controller-u:
      # const id = (request.params as { id: string }).id;
      # const lang = (request.query as { lang?: string })?.lang?.trim();
      #
      # Razlog: Type assertions se rade u Controller-u gde se podaci obrađuju,
      # Routes samo registruje rute i referencira Controller metode

  # Helper funkcije
  helpers:
    # Unique ID generisanje
    unique_id:
      location: 'core/utils/uniqueId.ts'
      implementation: 'Date.now() + randomBytes - timestamp (13 cifara) + random (7 cifara) = 20 cifara ukupno'
      usage: 'Za ID kolone pri kreiranju novih zapisa'
      dependencies: ['crypto (built-in)']
      format: 'Uvek 20 cifara: timestamp (13) + random (7)'
      guarantees: 'Jedinstvenost garantovana timestamp-om + random delom'

    # Password hashing
    password:
      location: 'core/utils/crypto.ts'
      functions:
        - name: 'hashPassword'
          description: 'Hash-uje password koristeći PBKDF2'
          algorithm: 'PBKDF2-SHA512'
          iterations: 150000
          salt_length: 16
          key_length: 64
          format: 'salt$iterations$hash'

        - name: 'comparePassword'
          description: 'Poređenje password-a sa hash-om'
          timing_safe: true

    # Pagination
    pagination:
      location: 'core/utils/pagination.ts'
      types:
        - 'offset/limit pagination'
        - 'cursor-based pagination'
      functions:
        - 'normalizePagination()'
        - 'normalizeCursorPagination()'
        - 'createPaginationResult()'
        - 'createCursorPaginationResult()'
        - 'buildPaginationQuery()'
        - 'buildCursorQuery()'

  # Error handling
  error_handling:
    custom_error: 'AppError'
    location: 'core/errors/AppError.ts'
    structure: |
      export class AppError extends Error {
        public statusCode: number;
        constructor(message: string, statusCode = 400) {
          super(message);
          this.statusCode = statusCode;
        }
      }
    usage: 'Za sve custom greške u aplikaciji'
    global_handler: 'middleware/errorHandler.ts'

  # Database type configuration
  database:
    type: 'postgresql'  # postgresql | mysql | oracle | mssql | hana
    env_variable: 'DB_TYPE'
    default: 'postgresql'
    description: 'Database type - determines which adapter and connection pool to use'
    validation: 'Must be one of: postgresql, mysql, oracle, mssql, hana'

  # Database adapter factory
  database_adapter:
    pattern: 'Adapter factory pattern za database helper funkcije'
    factory: 'core/database/adapter-factory.ts'
    description: 'Factory pattern za kreiranje adaptera na osnovu DB_TYPE'
    
    # Adapter implementations
    adapters:
      postgresql:
        location: 'core/database/postgres-adapter.ts'
        class: 'PostgresAdapter'
        methods:
          param: '$1, $2, ...'  # PostgreSQL placeholder sintaksa
          cast: 'column::type'  # PostgreSQL cast sintaksa
          arrayQuery: 'column = ANY($index::type[])'  # PostgreSQL array sintaksa
          identifier: '"name"'  # PostgreSQL quoted identifier
          recursive_query: 'WITH RECURSIVE'
          json_aggregation: 'jsonb_agg()'
          json_object: 'jsonb_build_object()'
      
      mysql:
        location: 'core/database/mysql-adapter.ts'
        class: 'MysqlAdapter'
        methods:
          param: '?, ?, ...'  # MySQL placeholder sintaksa
          cast: 'CAST(column AS type)'  # MySQL cast sintaksa
          arrayQuery: 'column IN (?)'  # MySQL IN sintaksa
          identifier: '`name`'  # MySQL backtick identifier
          recursive_query: 'WITH RECURSIVE'  # MySQL 8.0+
          json_aggregation: 'JSON_ARRAYAGG()'
          json_object: 'JSON_OBJECT()'
      
      oracle:
        location: 'core/database/oracle-adapter.ts'
        class: 'OracleAdapter'
        methods:
          param: ':1, :2, ...'  # Oracle placeholder sintaksa
          cast: 'CAST(column AS type)'  # Oracle cast sintaksa
          arrayQuery: 'column IN (SELECT * FROM TABLE(:index))'  # Oracle array sintaksa
          identifier: '"NAME"'  # Oracle quoted identifier (uppercase)
          recursive_query: 'CONNECT BY'  # Oracle hierarchical query
          json_aggregation: 'JSON_ARRAYAGG()'
          json_object: 'JSON_OBJECT()'
      
      mssql:
        location: 'core/database/mssql-adapter.ts'
        class: 'MssqlAdapter'
        methods:
          param: '@p1, @p2, ...'  # SQL Server placeholder sintaksa
          cast: 'CAST(column AS type)'  # SQL Server cast sintaksa
          arrayQuery: 'column IN (SELECT value FROM STRING_SPLIT(@index, ","))'  # SQL Server array sintaksa
          identifier: '[name]'  # SQL Server bracket identifier
          recursive_query: 'WITH ... AS (anchor UNION ALL recursive)'
          json_aggregation: 'FOR JSON PATH'
          json_object: 'JSON_OBJECT()'
      
      hana:
        location: 'core/database/hana-adapter.ts'
        class: 'HanaAdapter'
        methods:
          param: '?, ?, ...'  # SAP HANA placeholder sintaksa
          cast: 'CAST(column AS type)'  # SAP HANA cast sintaksa
          arrayQuery: 'column IN (SELECT * FROM TABLE(:index))'  # SAP HANA array sintaksa
          identifier: '"name"'  # SAP HANA quoted identifier
          recursive_query: 'WITH RECURSIVE'  # SAP HANA recursive CTE
          json_aggregation: 'JSON_ARRAYAGG()'
          json_object: 'JSON_OBJECT()'
    
    export: 'core/database/index.ts eksportuje adapter factory i helper funkcije'
    usage: |
      Repository-ji koriste adapter helper funkcije preko factory-ja:
      import { param, cast, identifier, arrayQuery } from '../../core/database';
      
      Factory automatski bira adapter na osnovu DB_TYPE environment variable.

  # Database connection pool configuration
  database_connection:
    location: 'config/db.config.ts'
    description: 'Connection pool konfiguracija po tipu baze'
    
    # Connection pool adapters
    adapters:
      postgresql:
        pool: 'pg.Pool'
        package: 'pg'
        version: '^8.13.0'
        connection_string: 'postgresql://user:password@host:port/database'
        config: |
          {
            host: DB_CONFIG.host,
            port: DB_CONFIG.port,
            user: DB_CONFIG.user,
            password: DB_CONFIG.password,
            database: DB_CONFIG.database,
            max: 20,
            idleTimeoutMillis: 30000,
            connectionTimeoutMillis: 10000,
          }
      
      mysql:
        pool: 'mysql2.Pool'
        package: 'mysql2'
        version: '^3.x.x'
        connection_string: 'mysql://user:password@host:port/database'
        config: |
          {
            host: DB_CONFIG.host,
            port: DB_CONFIG.port,
            user: DB_CONFIG.user,
            password: DB_CONFIG.password,
            database: DB_CONFIG.database,
            connectionLimit: 20,
            idleTimeout: 30000,
            connectTimeout: 10000,
          }
      
      oracle:
        pool: 'oracledb.Pool'
        package: 'oracledb'
        version: '^6.x.x'
        connection_string: 'oracle://user:password@host:port/service'
        config: |
          {
            user: DB_CONFIG.user,
            password: DB_CONFIG.password,
            connectString: `${DB_CONFIG.host}:${DB_CONFIG.port}/${DB_CONFIG.database}`,
            poolMin: 2,
            poolMax: 20,
            poolIncrement: 1,
            poolTimeout: 30,
          }
      
      mssql:
        pool: 'mssql.ConnectionPool'
        package: 'mssql'
        version: '^11.x.x'
        connection_string: 'mssql://user:password@host:port/database'
        config: |
          {
            server: DB_CONFIG.host,
            port: DB_CONFIG.port,
            user: DB_CONFIG.user,
            password: DB_CONFIG.password,
            database: DB_CONFIG.database,
            pool: {
              max: 20,
              min: 0,
              idleTimeoutMillis: 30000,
            },
            options: {
              enableArithAbort: true,
              encrypt: false,
            },
          }
      
      hana:
        pool: '@sap/hana-client.Connection'
        package: '@sap/hana-client'
        version: '^2.x.x'
        connection_string: 'hana://user:password@host:port?databaseName=database'
        config: |
          {
            host: DB_CONFIG.host,
            port: DB_CONFIG.port,
            uid: DB_CONFIG.user,
            pwd: DB_CONFIG.password,
            databaseName: DB_CONFIG.database,
            minPoolSize: 2,
            maxPoolSize: 20,
          }
    
    retry:
      enabled: true
      max_retries: 5
      initial_delay: 1000
      max_delay: 30000
      factor: 2
      exponential_backoff: true
    
    connection_test: 'Test connection on startup'
    error_handling: 'Retry samo za connection errors'
    
    factory_pattern: |
      // Factory pattern za kreiranje connection pool-a
      export function createConnectionPool(): Pool {
        const dbType = process.env.DB_TYPE || 'postgresql';
        
        switch (dbType) {
          case 'postgresql':
            return createPostgresPool();
          case 'mysql':
            return createMysqlPool();
          case 'oracle':
            return createOraclePool();
          case 'mssql':
            return createMssqlPool();
          case 'hana':
            return createHanaPool();
          default:
            throw new Error(`Unsupported database type: ${dbType}`);
        }
      }

  # HTTPS/SSL Configuration
  https_ssl:
    enabled: true
    description: 'HTTPS/SSL podrška sa validacijom sertifikata'
    location: 'src/server.ts'
    
    # Environment variables
    env_variables:
      HTTPS_ENABLED: 'boolean - da li je HTTPS omogućen (default: false)'
      HTTPS_PORT: 'number - HTTPS port (default: 3443)'
      SSL_DIR: 'string - putanja do SSL sertifikata direktorijuma'
      SSL_KEY_FILE: 'string - ime fajla privatnog ključa (default: localhost.key)'
      SSL_CERT_FILE: 'string - ime fajla sertifikata (default: localhost.crt)'
      SSL_PFX_FILE: 'string - opciono, ime PFX fajla (alternativa za key+cert)'
      SSL_PFX_PASSPHRASE: 'string - opciono, passphrase za PFX fajl'
      FORCE_HTTPS: 'boolean - da li da forsira HTTPS redirect (default: false)'
    
    # Certificate validation
    certificate_validation:
      enabled: true
      description: 'Validacija sertifikata pre pokretanja HTTPS servera'
      checks:
        - 'Provera da li sertifikat fajl postoji'
        - 'Provera da li key fajl postoji'
        - 'Provera da li sertifikat nije istekao'
        - 'Provera da li sertifikat i key se poklapaju'
      behavior: |
        - Ako sertifikat nije validan, HTTPS server se NE pokreće
        - Ako HTTPS_ENABLED=true ali sertifikat nije validan, loguje se upozorenje i pokreće se samo HTTP
        - Ako HTTPS_ENABLED=false, pokreće se samo HTTP server
    
    # Implementation pattern
    implementation_pattern: |
      import http from 'http';
      import https from 'https';
      import fs from 'fs';
      import { FastifyInstance } from 'fastify';
      
      async function startServers(app: FastifyInstance): Promise<void> {
        const httpPort = process.env.PORT || 3000;
        const httpsEnabled = process.env.HTTPS_ENABLED === 'true';
        const httpsPort = parseInt(process.env.HTTPS_PORT || '3443', 10);
        const sslDir = process.env.SSL_DIR || './ssl/';
        const sslKeyFile = process.env.SSL_KEY_FILE || 'localhost.key';
        const sslCertFile = process.env.SSL_CERT_FILE || 'localhost.crt';
        
        // Start HTTP server (always)
        const httpServer = http.createServer(app.server);
        await new Promise<void>((resolve) => {
          httpServer.listen(httpPort, () => {
            console.log(`HTTP Server listening on port ${httpPort}`);
            resolve();
          });
        });
        
        // Start HTTPS server (only if enabled and certificate is valid)
        if (httpsEnabled) {
          try {
            const credentials = loadSSLCredentials(sslDir, sslKeyFile, sslCertFile);
            if (credentials) {
              const httpsServer = https.createServer(credentials, app.server);
              await new Promise<void>((resolve) => {
                httpsServer.listen(httpsPort, () => {
                  console.log(`HTTPS Server listening on port ${httpsPort}`);
                  resolve();
                });
              });
            } else {
              console.warn('HTTPS enabled but certificate validation failed. Starting HTTP only.');
            }
          } catch (error) {
            console.error('Failed to start HTTPS server:', error);
            console.warn('Starting HTTP server only.');
          }
        }
      }
      
      function loadSSLCredentials(
        sslDir: string,
        keyFile: string,
        certFile: string
      ): { key: string; cert: string } | null {
        try {
          const keyPath = `${sslDir}${keyFile}`;
          const certPath = `${sslDir}${certFile}`;
          
          // Check if files exist
          if (!fs.existsSync(keyPath)) {
            console.error(`SSL key file not found: ${keyPath}`);
            return null;
          }
          
          if (!fs.existsSync(certPath)) {
            console.error(`SSL certificate file not found: ${certPath}`);
            return null;
          }
          
          const key = fs.readFileSync(keyPath, 'utf8');
          const cert = fs.readFileSync(certPath, 'utf8');
          
          // Basic validation (can be extended)
          if (!key || !cert) {
            console.error('SSL key or certificate is empty');
            return null;
          }
          
          // TODO: Add certificate expiration check
          // TODO: Add certificate-key matching validation
          
          return { key, cert };
        } catch (error) {
          console.error('Error loading SSL credentials:', error);
          return null;
        }
      }
    
    # Common usage patterns
    usage_patterns:
      development:
        description: 'Development - samo HTTP'
        config: |
          HTTPS_ENABLED=false
          PORT=3000
      
      production_http_only:
        description: 'Production - samo HTTP (reverse proxy)'
        config: |
          HTTPS_ENABLED=false
          PORT=3000
          # HTTPS se rešava na reverse proxy nivou (nginx, traefik, itd.)
      
      production_https:
        description: 'Production - HTTPS sa validacijom'
        config: |
          HTTPS_ENABLED=true
          HTTPS_PORT=3443
          SSL_DIR=/etc/ssl/certs/
          SSL_KEY_FILE=server.key
          SSL_CERT_FILE=server.crt
          PORT=3000  # HTTP za redirect ili health checks
      
      production_both:
        description: 'Production - HTTP i HTTPS (najčešće)'
        config: |
          HTTPS_ENABLED=true
          HTTPS_PORT=3443
          SSL_DIR=/etc/ssl/certs/
          SSL_KEY_FILE=server.key
          SSL_CERT_FILE=server.crt
          PORT=3000  # HTTP server za redirect ili health checks
    
    # SSL Directory Structure
    ssl_directory:
      location: 'ssl/ (root directory)'
      description: 'Direktorijum za SSL sertifikate i ključeve'
      structure: |
        ssl/
        ├── localhost.key          # Privatni ključ (NE commit-ovati u git)
        ├── localhost.crt          # Sertifikat (NE commit-ovati u git)
        ├── localhost.csr          # Certificate Signing Request (može biti u git)
        ├── localhost.ext          # Certificate extension config (može biti u git)
        ├── ca.srl                 # Certificate Authority serial file (može biti u git)
        └── *.pfx                  # PFX fajlovi (NE commit-ovati u git)
      
      required_files:
        production: ['localhost.key', 'localhost.crt'] # ili ['*.pfx']
        development: [] # Opciono za development
      
      optional_files:
        - 'localhost.csr'  # Certificate Signing Request
        - 'localhost.ext'  # Certificate extension configuration
        - 'ca.srl'         # CA serial file
      
      git_ignore_patterns:
        - '*.key'          # Privatni ključevi
        - '*.crt'          # Sertifikati (mogu biti osetljivi)
        - '*.pem'          # PEM fajlovi
        - '*.pfx'          # PFX fajlovi
        - '*.p12'          # P12 fajlovi
        - '*.jks'          # Java KeyStore
        - '*.keystore'     # Keystore fajlovi
      
      safe_to_commit:
        - '*.csr'        # Certificate Signing Request (javni)
        - '*.ext'        # Extension config (javni)
        - '*.srl'        # Serial file (javni)
    
    # VAŽNO:
    important_notes: |
      - HTTPS server se NE pokreće ako sertifikat nije validan
      - Ako HTTPS_ENABLED=true ali sertifikat nije validan, pokreće se samo HTTP sa upozorenjem
      - Najčešća upotreba: HTTP + HTTPS (oba servera)
      - Production: HTTPS se često rešava na reverse proxy nivou (nginx, traefik)
      - Development: samo HTTP (bez sertifikata)
      - Certificate validation je obavezna - ne diže HTTPS ako sertifikat nije validan
      - SSL direktorijum (ssl/) se kreira u root direktorijumu projekta
      - Osetljivi fajlovi (*.key, *.crt, *.pfx) se NE commit-uju u git
      - Javni fajlovi (*.csr, *.ext, *.srl) mogu biti u git repozitorijumu

  # Module registration
  module_registration:
    file: 'src/modules/index.ts'
    pattern: |
      export const API_BASE_PATH = '/b{prefix}/{module_prefix}';
      # Primer: '/badm/adm' za prefiks 'adm_'

      export async function registerModules(app: FastifyInstance) {
        app.register(authRoutes, { prefix: `${API_BASE_PATH}/auth` });
        app.register({module}Routes, { prefix: `${API_BASE_PATH}/{module}` });
        # ... za svaki modul
      }
    usage: 'app.ts poziva registerModules(app)'

  # DTO struktura
  dto_structure:
    # DetailDto extends ListItemDto
    pattern: |
      export interface {Module}ListItemDto {
        id: string;
        # ... osnovne kolone
      }

      export interface {Module}DetailDto extends {Module}ListItemDto {
        # Može dodati dodatne kolone ako je potrebno
      }

    # Translation DTO
    translation_dto: |
      export interface {Module}TranslationDto {
        id: string;
        tableid: string;
        lang: string;
        grammcase: string;
        text: string;
      }
      
      export interface {Module}TranslationLite {
        lang: string;
        grammcase: string | null;
        text: string | null; // Uvek prisutan, null ako nema prevoda
      }
      
      # Primer ListItemDto sa translation poljem:
      # export interface CmnModuleListItemDto {
      #   id: string;
      #   code: string;
      #   text: string;
      #   translation: CmnModuleTranslationLite; // Uvek prisutan (ne optional), text može biti null
      #   // ❌ NEMA translations[] - koristi GET /translations/:id za sve prevode
      # }
    
    # **ZOD-ONLY STANDARD**
    zod_validation_patterns: |
      # ✅ KORISTI SHARED ZOD SCHEMAS
      import {
        TranslationDtoSchema,
        TranslationLiteSchema,
      } from '../common/translation.types';

      # Module aliaz schemas
      export const {Module}TranslationSchema = TranslationDtoSchema;
      export const {Module}TranslationLiteSchema = TranslationLiteSchema;

      # ListItemSchema - MORA uključivati SAMO translation polje (ne translations array)
      export const {Module}ListItemSchema = z.object({
        id: z.string(),
        # ... ostala polja ...
        translation: {Module}TranslationLiteSchema, // Uvek prisutan (ne optional)
        // ❌ NEMA: translations: z.array(...) - to je u posebnoj ruti
        // ❌ NIKADA NE vraćati translations: [] (prazan niz) u standardnim objektima!
      });

      # TypeScript tipovi se infer-uju iz Zod schemas ILI koriste shared tipovi
      export type {Module}ListItemDto = z.infer<typeof {Module}ListItemSchema>;
      # ILI jednostavnije: export type {Module}TranslationDto = TranslationDto;
    
    # FK sub-objekti sa prevodima
    fk_sub_objects: |
      # FK sa X tabelom se vraća kao nested objekat
      export interface CmnModuleFkTranslationLite {
        lang: string;
        grammcase: string | null;
        text: string | null; // Uvek prisutan, null ako nema prevoda
      }
      
      export interface CmnModuleFkDto {
        id: string;
        code: string;
        text?: string;  // fkTxText ?? fkBaseText ?? undefined
        translation: CmnModuleFkTranslationLite; // Uvek prisutan, text može biti null
      }
      
      # U ListItemDto:
      export interface CmnModuleListItemDto {
        fk: CmnModuleFkDto | null;  # nullable ako FK kolona može biti NULL
      }
    
    # Translation ID handling u CreateDto/UpdateDto
    translation_id_handling: |
      # Translation items u CreateDto/UpdateDto mogu imati opcioni id
      export interface CmnModuleCreateDto {
        translations?: Array<{
          id?: string;  # Opciono - ako nije prosleđen, generiše se u service
          lang: string;
          grammcase: string;
          text: string;
        }>;
      }
      
      # Service generiše ID ako nedostaje:
      const translationsWithIds = dto.translations?.map((t) => ({ ...t, id: t.id ?? uniqueId() })) ?? [];
    
    # Code auto-fill
    code_auto_fill: |
      # Ako code nije prosleđen ili je prazan string, automatski se postavlja code = id
      # Primenjuje se samo na tabele koje imaju code kolonu
      if (!dto.code || dto.code.trim() === '') {
        dto.code = id; // id je već generisan
      }

    # Create/Update DTO
    create_update_dto: |
      export interface {Module}CreateDto {
        # Sve kolone osim id, created_at, updated_at
        # Password se hash-uje u service-u
      }

      export interface {Module}UpdateDto {
        # Sve kolone opcione (osim id)
        # null vrednosti za brisanje
      }

  # App initialization
  app_initialization:
    file: 'src/app.ts'
    function: 'buildApp(httpsOptions?)'
    description: 'Kreira i konfiguriše Fastify aplikaciju sa svim pluginovima, middleware-ima i rutama'
    
    # HTTPS Support
    https_support:
      enabled: true
      description: 'Aplikacija može biti pokrenuta sa HTTPS opcijama'
      parameters:
        - 'httpsOptions?: { key: string; cert: string } | { pfx: Buffer; passphrase?: string }'
      usage: |
        const app = await buildApp({ key: sslKey, cert: sslCert });
        // Ili sa PFX:
        const app = await buildApp({ pfx: pfxBuffer, passphrase: 'pass' });
    
    # Plugins (Fastify plugins)
    plugins:
      # @fastify/helmet - Security headers
      helmet:
        package: '@fastify/helmet'
        description: 'Dodaje HTTP security headers za zaštitu od XSS, clickjacking, MIME sniffing, itd.'
        purpose: 'Bezbednost - automatski postavlja security headers (X-Content-Type-Options, X-Frame-Options, X-XSS-Protection, itd.)'
        configuration: 'Default konfiguracija; override NIJE dozvoljen (izmena samo kroz standard)'
        when_used: 'Uvek se registruje - obavezan za production'
      
      # @fastify/cors - Cross-Origin Resource Sharing
      cors:
        package: '@fastify/cors'
        description: 'Omogućava CORS (Cross-Origin Resource Sharing) za API pristup iz browser-a'
        purpose: 'Omogućava frontend aplikacijama da pristupaju API-ju sa različitih domena'
        configuration: |
          - origin: CORS_ORIGIN env varijabla (default: '*')
          - credentials: true (dozvoljava cookies)
          - methods: ['GET', 'POST', 'PUT', 'DELETE', 'OPTIONS']
          - allowedHeaders: ['Content-Type', 'Authorization', 'X-CSRF-Token']
        when_used: 'Uvek se registruje - potrebno za web aplikacije'
        location: 'src/core/utils/cors.ts'
      
      # @fastify/cookie - Cookie support
      cookie:
        package: '@fastify/cookie'
        description: 'Dodaje podršku za HTTP cookies u Fastify aplikaciji'
        purpose: 'Omogućava čitanje i pisanje cookies (koristi se za session management, CSRF tokens, itd.)'
        configuration: 'Default konfiguracija'
        when_used: 'Uvek se registruje - potrebno za cookie-based autentifikaciju i CSRF zaštitu'
      
      # @fastify/jwt - JSON Web Token
      jwt:
        package: '@fastify/jwt'
        description: 'Dodaje JWT (JSON Web Token) podršku za autentifikaciju i autorizaciju'
        purpose: 'Omogućava generisanje i validaciju JWT tokena za autentifikaciju korisnika'
        configuration: |
          - secret: JWT_SECRET iz env varijable (minimum 32 karaktera)
          - sign.expiresIn: EXPIRESIN env varijabla (default: "1h"); promena samo preko env
          - ostala JWT podesavanja su fiksna; izmena samo kroz standard
        when_used: 'Uvek se registruje - obavezan za JWT-based autentifikaciju'
        usage: |
          // U route handler-u:
          const token = await app.jwt.sign({ userId: user.id });
          // U middleware-u:
          await request.jwtVerify(); // Validira token
      
      # Swagger/OpenAPI (legacy - NE KORISTI SE u ZOD-ONLY standardu)
      swagger_legacy:
        status: 'disabled'
        note: 'ZOD-ONLY: nema schema refs, nema Swagger-a, nema JSON schema ugovora.'
    
    # Global Hooks (Fastify hooks)
    hooks:
      # onRequest hook - requestIdMiddleware
      onRequest_requestId:
        hook: 'onRequest'
        middleware: 'requestIdMiddleware'
        file: 'src/middleware/requestId.ts'
        description: 'Dodaje jedinstveni request ID svakom HTTP request-u'
        purpose: |
          - Tracking i debugging - svaki request ima jedinstveni ID
          - Logging - request ID se koristi u logovima za praćenje request-a kroz sistem
          - Error tracking - olakšava praćenje grešaka u distributed sistemima
        implementation: |
          - Generiše UUID za svaki request
          - Postavlja request.id
          - Dodaje X-Request-Id header u response
        when_used: 'Uvek se primenjuje na svaki request'
      
      # onError hook - errorHandler
      onError_errorHandler:
        hook: 'onError'
        handler: 'errorHandler'
        file: 'src/middleware/errorHandler.ts'
        description: 'Globalni error handler za sve greške u aplikaciji'
        purpose: |
          - Centralizovano rukovanje greškama
          - Konzistentan format error response-a
          - Bezbednost - sakriva stack trace u production modu
        error_types:
          - 'ZodError: Validation errors (400 Bad Request)'
          - 'AppError: Custom application errors (sa statusCode)'
          - 'Database errors: Connection failures (503 Service Unavailable)'
          - 'FastifyError: Framework errors (sa statusCode)'
          - 'Generic Error: 500 Internal Server Error'
        response_format: |
          {
            error: string,
            message: string,
            details?: any,  // Za Zod errors
            stack?: string  // Samo u development modu
          }
        when_used: 'Uvek se primenjuje na sve greške'
    
    # Schema Registration
    schema_registration:
      function: 'registerAllSchemas(app)'
      file: 'src/plugins/schemas.ts'
      description: 'Registruje sve JSON schemas SINHRONO pre registracije ruta'
      purpose: |
        - Centralizovana registracija svih module schemas
        - Omogućava reuse schemas kroz $ref u Swagger dokumentaciji
        - Brže route registracije (schemas su već registrovani)
      implementation: |
        - Sinhrono poziva app.addSchema() za svaki modul
        - Proverava da li schema već postoji (izbegava duplikate)
        - Mora biti pozvano PRE registerModules()
      when_used: 'Uvek se poziva pre registracije ruta'
    
    # Service Initialization
    service_initialization:
      email_service:
        function: 'initEmailService()'
        file: 'src/core/services/email.service.ts'
        description: 'Inicijalizuje email service za slanje email-ova'
        purpose: 'Omogućava aplikaciji da šalje email-ove (notifikacije, reset password, itd.)'
        configuration: |
          - SMTP_HOST: SMTP server host
          - SMTP_PORT: SMTP server port
          - SMTP_SECURE: true/false (TLS)
          - SMTP_USER: SMTP username
          - SMTP_PASSWORD: SMTP password
          - SMTP_FROM: Default sender email
        when_used: 'Uvek se poziva - ako nije konfigurisan, samo loguje upozorenje'
        optional: true
    
    # Route Registration Order
    route_registration_order:
      description: 'Redosled registracije ruta je VAŽAN'
      order:
        1: 'healthRoutes - Health check endpoint-i (bez autentifikacije)'
        2: 'registerModules() - Svi business moduli (sa autentifikacijom)'
      note: 'Health routes se registruju prvi jer su javni i ne zahtevaju autentifikaciju'

  # Server startup
  server_startup:
    file: 'src/server.ts'
    initialization: |
      const app = buildApp();
      app.listen({ port, host: '0.0.0.0' });
    graceful_shutdown:
      signals: ['SIGTERM', 'SIGINT']
      handlers:
        - 'app.close()'
        - 'pool.end()'
      timeout: 10000
    error_handling:
      - 'uncaughtException'
      - 'unhandledRejection'

# ============================================================================
# SECURITY & MIDDLEWARE
# ============================================================================
security:
  # Middleware koji se primenjuju
  middleware:
    - name: 'authGuard'
      description: 'JWT token validation'
      applies_to: ['protected_routes']

    - name: 'permissionGuard'
      description: 'Role-based access control'
      applies_to: ['protected_routes']
      # Ako je auth_server URL, poziva {auth_server}/auth/check-permission
      # kada JWT token ne sadrži potrebne informacije

    - name: 'csrfProtection'
      description: 'CSRF token validation'
      applies_to: ['state_changing_operations']

    - name: 'rateLimiter'
      description: 'Rate limiting'
      applies_to: ['all_routes']

    - name: 'bruteForceProtection'
      description: 'Brute force attack prevention'
      applies_to: ['auth_routes']

  # Global protection toggle (CMN pattern)
  protection_toggle:
    env: 'PROTECT'
    values:
      Y: 'Default. authGuard + permissionGuard se normalno primenjuju.'
      N: 'Iskljuuje JWT i permission provere (authGuard/permissionGuard no-op) – samo za testiranje/lokalni dev.'
    required_behavior:
      - 'Ako je PROTECT=N, middleware-i ne smeju blokirati request (nema validacije tokena ni permission provere).'
      - 'Ako je PROTECT=Y ili nije setovan, primenjuju se standardne provere.'
      - 'PROTECT parametar mora biti definisan u env.schema.ts i env.ts.'
      - 'Ako postoji globalni preHandler (app.addHook) koji radi jwtVerify, mora postovati PROTECT i preskociti verifikaciju kada je PROTECT=N.'
      - 'Ne duplirati jwtVerify u globalnom hook-u i authGuard bez potrebe; globalni hook mora biti public-route aware kao u CMN.'

  # Permission pattern
  permissions:
    # Format: "{MODULE}_{RESOURCE}_{ACTION}"
    # Primer: "ADM_USER_VIEW", "ADM_USER_EDIT"
    pattern: '{MODULE}_{RESOURCE}_{ACTION}'
    # requireModuleRole middleware koristi ovaj pattern

