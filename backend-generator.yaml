# Backend Generator Configuration
# Ovaj YAML fajl, zajedno sa SQL schema fajlom, omogućava generisanje kompletnog backend servera
# po istim standardima kao ADM projekat.

# ============================================================================
# STANDARDS CONSOLIDATION
# ============================================================================
standards_reference:
  note: "Ovaj fajl je jedini kanonički izvor standarda; legacy ./standards/ direktorijum uklonjen."
  enforcement:
    note: "SVE odredbe u standardu su OBAVEZNE (MUST/SHALL)."
    clarification: "Ako je bilo koja odredba nejasna ili kontradiktorna, IZVRŠENJE SE ZAUSTAVLJA i TRAŽI SE dodatno objašnjenje pre nastavka."
  cmn_active_standard:
    note: "CMN koristi ZOD-ONLY standard za CRUD + translation. Swagger/JSON schema sekcije su legacy i NE koriste se."
    rules:
      - "NEMA {module}.schemas.ts fajlova."
      - "NEMA {module}.routes.schema.ts fajlova."
      - "NEMA schema registra u plugins/schemas.ts za CRUD module."
      - "Routes NEMAJU schema polje (vidi ccard/locatt)."
      - "**ZOD-ONLY**: Jedina istina je Zod schema u dto.ts."
      - "**ZOD-ONLY**: NEMA Swagger/OpenAPI ni schema refs u routes/controllers."
      - "Zod schema u {module}.dto.ts je jedini izvor istine (runtime validacija + tipovi)."
      - "Translation objekat UVEK postoji za _x tabele: {lang, grammcase, text} (text moze biti null)."
      - "SQL SELECT/WHERE/JOIN MORAJU koristiti alias (npr. o.id, o.code) da se izbegne ambiguous column."
      - "SQL JOIN/WHERE CAST: ako FK i PK nisu istog tipa (npr. numeric vs varchar), eksplicitno cast-ovati oba (npr. u.id::text = l.user1::text)."
      - "DTO-i koriste base tipove: BaseCreateDto, BaseUpdateDto, BaseListItemDto, BaseTranslationsDto."
      - "Ako tabela NEMA code/text/valid (asocijativne/link tabele), DTO je eksplicitan (ne koristi Base*), ali FK objekti i dalje koriste BaseFkDto."
      - "FK DTO standard: koristi se BaseFkDto iz common/base.dto.ts (nema per-modul FK DTO)."
      - "Translation tipovi dolaze iz common/translation.types.ts (TranslationDto, TranslationLite)."
      - "CMN ne koristi Swagger/OpenAPI ni JSON schema generaciju."
      - "CMN ne implementira testove; __tests__ fajlovi postoje samo sa TODO sadrzajem."
      - "Ako __tests__ direktorijum postoji, obavezni fajlovi su repository/service/integration sa TODO sadrzajem."
      - "Test sekcije u ovom fajlu su legacy i IGNORISU se za CMN."
      - "CRUD ROUTES: GET /, GET /:id, POST /, PUT /, DELETE /:id, GET /translations/:id (ako postoji _x tabela)."
      - "CRUD VALIDATION: Service koristi Zod schemas kao jedini source-of-truth."
      - "TS tipovi (ako postoje) se izvode (infer) iz Zod schema."
      - "CRUD REQUEST/RESPONSE: NEMA translations[] u body-ju ni u response-u; samo translation objekat za aktivni jezik."
      - "TRANSLATIONS ROUTE: /translations/:id je jedina ruta koja vraća translations[] (svi jezici)."
      - "CREATE TRANSLATION: ako postoji _x tabela, uvek se upisuje prevod za resolvedLang (lang iz query ili DEFAULT_LANG) sa grammcase='1' i text=dto.text."
      - "UPDATE TRANSLATION: ako dto.text postoji, upisuje se prevod za resolvedLang (DELETE+INSERT) sa grammcase='1' i text=dto.text; ako dto.text nije prosleđen, prevod se ne menja."
      - "DELETE RESPONSE: uvek {status: boolean, message: string}."
      - "FK STANDARD: za svaki FK kolonu vraca se originalno polje (string ID) + {name}fk objekat sa {id, code, text, translation}."
      - "EXTERNAL FK (DRUGI BACKEND): ako FK pokazuje na tabelu u drugoj bazi/servisu, NE vracati {name}fk objekat iz baze."
      - "EXTERNAL FK (DRUGI BACKEND): vracaj samo originalno polje (string ID) + {name}ext objekat (npr. userext) popunjen iz drugog servisa."
      - "EXTERNAL LOOKUP: GET /users/:id za pojedinacni fetch, POST /users/lookup sa body { ids: string[] } za batch fetch."
      - "EXTERNAL OBJTP/OBJ (DRUGI BACKEND): za objtp/obj koji nisu u istoj shemi koristi CMN_BACK_URL i vrati objtpext/objext sa {id, code, text}."
      - "EXTERNAL OBJTP/OBJ LOOKUP: GET /objtp/:id?lang=<lang> i GET /obj/:id?lang=<lang>."
      - "EXTERNAL OBJTP/OBJ LOOKUP (BATCH): POST /objtp/lookup i POST /obj/lookup sa body { ids: string[], lang?: string } ako postoji; u suprotnom fallback na GET po id."
      - "EXTERNAL LOOKUP FAILURE: ako je timeout/greska ili nije konfigurisan base URL, ignorisati gresku i popuniti {name}ext sa praznim stringovima (samo id)."
      - "EXTERNAL CONFIG: base URL za spoljne servise se definise u .env i env.ts (npr. ADM_BACK_URL, CMN_BACK_URL)."
      - "SELF-REFERENCE STANDARD: ako FK pokazuje na istu tabelu (parentid), vrati parentfk; ako parentid null -> parentfk null."
      - "SELF-REFERENCE TREE: ako tabela ima self FK (parentid), obavezno implementirati tree endpoint-e."
      - "TREE ROUTES (self FK):"
      - "  - GET /tree/:rootId (param rootId)"
      - "  - GET /tree-by-root?root=<id>&lang=<lang>"
      - "TREE IMPLEMENTATION: repository getTree(rootId, lang) sa rekurzivnim CTE i mapiranjem children."
      - "PERIOD ADJUSTMENT: svaka tabela sa begda/endda poljima MORA imati period adjustment logiku (bez TODO)."
      - "PERIOD ADJUSTMENT DEFAULT: ako tabela ima begda/endda, implementacija razgranicenja je PODRAZUMEVANA osim ako korisnik eksplicitno ne kaze da se razgranicenje NE radi."
      - "PERIOD ADJUSTMENT EXCEPTION: kada korisnik eksplicitno trazi bez razgranicenja, NE dodavati period adjustment rute niti logiku."
      - "PERIOD ROUTES: /insert-with-period-adjustment (POST), /update-with-period-adjustment (PUT), /delete-with-period-adjustment/:id (DELETE), /find-by-key (GET), /get-by-date (GET) (po uzoru na currrate)."
      - "LINK MODULE TREE: samo {model}link moduli SMEJU imati rutu /tree-by-{model}."
      - "LINK MODULE TREE ROUTE: /tree-by-{model} SHALL postojati samo za {model}link (npr. /tree-by-loc za loclink)."
      - "LINK MODULE TREE (PARENT/CHILD FIELDS): ako link tabela ima {model}2 (parent) i {model}1 (child), implementirati /tree-by-{model}?{model}=<id>&date=<YYYYMMDD>&lang=<lang>."
      - "LINK MODULE TREE QUERY (PARENT/CHILD FIELDS): anchor WHERE l.{model}2 = <id>; rekurzija JOIN na l.{model}2 = s.{model}1; filter begda/endda ako postoje."
      - "LINK MODULE TREE RESPONSE (PARENT/CHILD FIELDS): node = { id, parent_{model}, {model}, code, text, textx, children } gde {model}=child ({model}1), parent_{model}={model}2."
      - "OBJLINK TREE (PARENT OBJTP2/OBJ2): objtp2/obj2 je parent, objtp1/obj1 je child."
      - "OBJLINK TREE ROUTE: /tree-by-obj?objtp=<id>&obj=<id>&date=<YYYYMMDD>&lang=<lang>."
      - "OBJLINK TREE FILTER: opcioni param cmn_link ogranicava tree na taj link (AND l.cmn_link = cmn_link)."
      - "OBJLINK TREE QUERY: rekurzivni CTE sa anchor l.objtp2=objtp AND l.obj2=obj AND JOIN na (l.objtp2,l.obj2) -> (s.objtp1,s.obj1)."
      - "OBJLINK TREE RESPONSE: node = { id, parent_objtp, parent_obj, objtp, objtp_code, objtp_textx, obj, code, text, textx, children }."
      - "OBJLINK PERIOD KEY: (objtp1, obj1, objtp2, obj2, begda) za findByKey i getByDate."
      - "ROUTES REQUIRING EXPLICIT CONFIRMATION: /move-subtree, /move-back, /tree-by-{model} SHALL se dodati SAMO uz eksplicitnu potvrdu korisnika."
    examples:
      dto_translation_input: |
        // DTO (primer kao ccard/locatt) - bez translations[] u CRUD
        export interface CmnXListItemDto extends Omit<BaseListItemDto, 'translation'> {
          translation: CmnTranslationLite;
        }

        export const CmnXCreateDtoSchema = z.object({
          site: z.string().nullable().optional(),
          code: z.string().max(100).optional(),
          text: z.string().min(1).max(500),
          valid: z.number().int().min(0).max(1).optional().default(1),
        });
      translation_mapping: |
        // Repository mapping (list/get) - translation UVEK postoji
        const tr = {
          lang,
          grammcase: row.tx_grammcase ?? null,
          text: row.tx_text ?? null,
        };

        return {
          id: row.id,
          site: row.site,
          code: row.code,
          text: row.text,
          valid: row.valid,
          translation: tr,
        };
      fk_mapping: |
        // FK mapping pattern
        return {
          tp: row.tp,
          tpfk: {
            id: row.tp,
            code: row.tpCode,
            text: row.tpTxText ?? row.tpBaseText ?? '',
            translation: { lang, grammcase: null, text: row.tpTxText ?? null }
          }
        };
      fk_dto: |
        // Base FK DTO (shared)
        export interface BaseFkDto {
          id: string;
          code: string;
          text: string;
          translation: TranslationLite;
        }
      external_user_dto: |
        // External user DTO (other backend)
        export interface ExternalUserDto {
          id: string;
          username: string;
          first: string;
          last: string;
          mail: string;
        }
      external_user_mapping: |
        // External mapping fallback (timeout/error)
        const userext = fetchedUser ?? { id: usrId, username: '', first: '', last: '', mail: '' };
      selfref_mapping: |
        // Self-reference mapping pattern (parent)
        return {
          parentid: row.parentId,
          parentfk: row.parentId
            ? {
                id: row.parentId,
                code: row.parentCode,
                text: row.parentTxText ?? row.parentBaseText ?? '',
                translation: { lang, grammcase: null, text: row.parentTxText ?? null }
              }
            : null
        };
  sources_merged:
    - name: "architecture, routing, dto-schema, translation, repository, service, security, https, views-tree, response-structure, checklist"
      checklist_ref: "standards_reference.cmn_active_standard.rules"
      note: "Canonical rules live in standards_reference.cmn_active_standard.rules; do not duplicate here."
# ============================================================================
# PROJECT METADATA
# ============================================================================
project:
  name: '' # Ime projekta (npr. "CMN", "WST") - automatski detektuje se iz SQL prefiksa tabela
  description: '' # Opcioni opis projekta
  version: '1.0.0'
  api_base_path: '' # Automatski generiše se na osnovu prefiksa (npr. "badm/adm" za prefiks "adm_")
  module_prefix: '' # Automatski detektuje se iz SQL prefiksa tabela (npr. "adm_" iz "adm_user")

  # Module Profile/Type Configuration
  # Određuje koje endpoint-e i metode se generišu za modul
  # Može se postaviti kroz env varijablu MODULE_PROFILE ili direktno u YAML konfiguraciji
  # Precedence: MODULE_PROFILE env > module_profile.type u YAML > default (full_crud)
  module_profile:
    # Profile tipovi:
    # - "full_crud" (default): Generiše sve CRUD operacije (GET, POST, PUT, DELETE)
    # - "read_only": Generiše samo GET operacije (list, getOne) - bez create, update, delete
    # - "integration_only": Generiše samo bridge/integration endpoint-e ka legacy sistemu
    #   - Ne generiše standardne CRUD endpoint-e
    #   - Generiše custom endpoint-e za integraciju sa legacy sistemom
    #   - Može generisati sync endpoint-e, transformacije, itd.
    # - "reporting": Generiše samo read operacije sa dodatnim reporting funkcionalnostima
    #   - GET operacije (list, getOne)
    #   - Custom reporting endpoint-e (export, statistics, analytics)
    #   - Može generisati aggregate queries, charts data, itd.

    # Način određivanja profila:
    # 1. Environment varijabla (prioritet): MODULE_PROFILE=read_only
    # 2. YAML konfiguracija (fallback): module_profile.type: "read_only"
    # 3. Default: "full_crud" ako nije postavljeno

    type: 'full_crud' # full_crud | read_only | integration_only | reporting

    # Environment variable name za određivanje profila
    env_variable: 'MODULE_PROFILE'

    # Validne vrednosti za env varijablu
    valid_profiles:
      - 'full_crud'
      - 'read_only'
      - 'integration_only'
      - 'reporting'

    # Default profile ako nije postavljeno
    default: 'full_crud'

    reporting:
      exports:
        enabled: false
        formats: ["csv"]   # dozvoljeno: csv, xlsx, pdf
      rules:
        - "Ako exports.enabled=true, formats mora biti neprazna lista."
        - "Default format je csv."

    # Profile-specific konfiguracije:
    profiles:
      full_crud:
        description: 'Pun CRUD modul - sve operacije (GET, POST, PUT, DELETE)'
        endpoints:
          - method: 'GET'
            path: '/'
            description: 'Lista svih zapisa'
            enabled: true
          - method: 'GET'
            path: '/:id'
            description: 'Jedan zapis po ID'
            enabled: true
          - method: 'POST'
            path: '/'
            description: 'Kreiraj novi zapis'
            enabled: true
          - method: 'PUT'
            path: '/'
            description: 'Ažuriraj postojeći zapis (id u body)'
            enabled: true
          - method: 'DELETE'
            path: '/:id'
            description: 'Obriši zapis'
            enabled: true # Obavezno za full_crud profile
        service_methods:
          - 'list'
          - 'getOne'
          - 'create'
          - 'update'
          - 'remove' # Obavezno za full_crud profile
        repository_methods:
          - 'listDomains'
          - 'findDomainById'
          - 'createDomain'
          - 'updateDomain'
          - 'removeDomain' # Obavezno za full_crud profile
        permissions:
          - '{MODULE}_VIEW'
          - '{MODULE}_EDIT'
          # DELETE koristi {MODULE}_EDIT permisiju (ne zahteva posebnu DELETE permisiju)

      read_only:
        description: 'Read-only modul - samo čitanje podataka (GET operacije)'
        endpoints:
          - method: 'GET'
            path: '/'
            description: 'Lista svih zapisa'
            enabled: true
          - method: 'GET'
            path: '/:id'
            description: 'Jedan zapis po ID'
            enabled: true
          - method: 'POST'
            path: '/'
            description: 'Kreiraj novi zapis'
            enabled: false # DISABLED
          - method: 'PUT'
            path: '/'
            description: 'Ažuriraj postojeći zapis (id u body)'
            enabled: false # DISABLED
          - method: 'DELETE'
            path: '/:id'
            description: 'Obriši zapis'
            enabled: false # DISABLED
        service_methods:
          - 'list'
          - 'getOne'
          # create, update, delete se NE generišu
        repository_methods:
          - 'listDomains'
          - 'findDomainById'
          # createDomain, updateDomain, deleteDomain se NE generišu
        permissions:
          - '{MODULE}_VIEW'
          # EDIT i DELETE permisije se NE generišu
        notes: |
          - Service metode create(), update(), delete() se NE generišu
          - Repository metode createDomain(), updateDomain(), deleteDomain() se NE generišu
          - DTO CreateDto i UpdateDto se NE generišu (ili se generišu ali se ne koriste)
          - Controller metode create(), update(), delete() se NE generišu
          - Routes za POST, PUT, DELETE se NE registruju
          - Permission guard za EDIT/DELETE se NE dodaje

      integration_only:
        description: 'Integration/Bridge modul - most ka legacy sistemu'
        endpoints:
          - method: 'GET'
            path: '/'
            description: 'Lista svih zapisa'
            enabled: false # Standardni CRUD se NE generišu
          - method: 'GET'
            path: '/:id'
            description: 'Jedan zapis po ID'
            enabled: false # Standardni CRUD se NE generišu
          - method: 'POST'
            path: '/'
            description: 'Kreiraj novi zapis'
            enabled: false # Standardni CRUD se NE generišu
          - method: 'PUT'
            path: '/:id'
            description: 'Ažuriraj postojeći zapis'
            enabled: false # Standardni CRUD se NE generišu
          # Custom integration endpoint-i:
          - method: 'POST'
            path: '/sync'
            description: 'Sinhronizacija sa legacy sistemom'
            enabled: true
          - method: 'POST'
            path: '/sync/:id'
            description: 'Sinhronizacija jednog zapisa sa legacy sistemom'
            enabled: true
          - method: 'GET'
            path: '/legacy/:legacyId'
            description: 'Dohvati zapis iz legacy sistema po legacy ID'
            enabled: true
          - method: 'POST'
            path: '/transform'
            description: 'Transformacija podataka iz legacy formata'
            enabled: true
        service_methods:
          # Standardni CRUD se NE generišu
          # Custom integration metode:
          - 'syncFromLegacy'
          - 'syncToLegacy'
          - 'getFromLegacy'
          - 'transformLegacyData'
        repository_methods:
          # Standardni CRUD se NE generišu
          # Custom integration metode:
          - 'fetchFromLegacy'
          - 'pushToLegacy'
          - 'mapLegacyData'
        permissions:
          - '{MODULE}_SYNC'
          - '{MODULE}_INTEGRATE'
        notes: |
          - Standardni CRUD endpoint-i se NE generišu
          - Generišu se custom endpoint-i za integraciju sa legacy sistemom
          - Service i Repository sadrže metode za komunikaciju sa legacy sistemom
          - Može se konfigurisati legacy API URL, credentials, itd.
          - Transformacije podataka iz legacy formata u novi format
          - Bidirekciona sinhronizacija (legacy <-> new system)

      reporting:
        description: 'Reporting modul - čitanje podataka sa dodatnim reporting funkcionalnostima'
        endpoints:
          - method: 'GET'
            path: '/'
            description: 'Lista svih zapisa'
            enabled: true
          - method: 'GET'
            path: '/:id'
            description: 'Jedan zapis po ID'
            enabled: true
          - method: 'POST'
            path: '/'
            description: 'Kreiraj novi zapis'
            enabled: false # DISABLED
          - method: 'PUT'
            path: '/'
            description: 'Ažuriraj postojeći zapis (id u body)'
            enabled: false # DISABLED
          - method: 'DELETE'
            path: '/:id'
            description: 'Obriši zapis'
            enabled: false # DISABLED
          # Custom reporting endpoint-i:
          - method: 'GET'
            path: '/export'
            description: 'Export podataka (CSV, Excel, PDF)'
            enabled: true
          - method: 'GET'
            path: '/statistics'
            description: 'Statistike i agregatni podaci'
            enabled: true
          - method: 'GET'
            path: '/analytics'
            description: 'Analitički podaci i metrike'
            enabled: true
          - method: 'POST'
            path: '/query'
            description: 'Custom query za reporting'
            enabled: true
          - method: 'GET'
            path: '/charts/:type'
            description: 'Podaci za chart-ove (line, bar, pie, itd.)'
            enabled: true
        service_methods:
          - 'list'
          - 'getOne'
          # Custom reporting metode:
          - 'exportData'
          - 'getStatistics'
          - 'getAnalytics'
          - 'executeQuery'
          - 'getChartData'
        repository_methods:
          - 'listDomains'
          - 'findDomainById'
          # Custom reporting metode:
          - 'aggregateData'
          - 'groupBy'
          - 'calculateMetrics'
        permissions:
          - '{MODULE}_VIEW'
          - '{MODULE}_REPORT'
          - '{MODULE}_EXPORT'
        notes: |
          - Standardni CRUD endpoint-i se generišu samo za čitanje (GET)
          - Generišu se dodatni reporting endpoint-i
          - Service i Repository sadrže metode za agregaciju, statistike, export
          - Može se generisati podrška za različite export formate (CSV, Excel, PDF)
          - Chart data endpoint-i za različite tipove chart-ova
          - Custom query endpoint za fleksibilno izveštavanje

# ============================================================================
# AUTHENTICATION & AUTHORIZATION
# ============================================================================
auth:
  # AUTH STANDARD
  # Default: auth je centralizovan u ADM.
  # Izuzetak: LOCAL_SHARED_DB je dozvoljen samo ako modul deli istu DB instancu sa ADM auth tabelama.
  ownership: "ADM_ONLY"
  allowed_modes: ["REMOTE_ADM", "LOCAL_SHARED_DB_EXCEPTION", "NONE"]
  default_mode: "REMOTE_ADM"
  local_shared_db_exception_requires:
    - "explicit_flag"
    - "justification_adr"
  rules:
    - "Ako auth.mode != REMOTE_ADM, modul mora imati ADR/justification."
    - "LOCAL_SHARED_DB_EXCEPTION je dozvoljen samo uz eksplicitno ukljucen flag."

  # AUTH_SERVER parametar kontroliše generisanje auth modula:
  # - "LOCAL": generiše kompletnu lokalnu auth implementaciju (samo za ADM modul)
  #   - Zahteva da modul ima prefiks "adm_" u tabelama
  #   - Generiše sve auth endpoint-e i koristi lokalnu bazu podataka
  #   - Može se koristiti i za druge module ako su na istom DB serveru sa ADM podacima
  # - "" (prazan): ne generiše auth modul (default za non-ADM module)
  # - URL (npr. "https://adm.example.com"): koristi eksterni ADM auth server
  #   - Modul ide po podatke za auth na ADM server
  #   - Koristi definisane endpoint-e za JWT i permission provere
  auth_server: 'LOCAL' # ili "" ili URL

  # Endpoint-i koji se generišu kada je auth_server = "LOCAL" (samo za ADM modul):
  endpoints:
    - path: '/auth/login'
      method: 'POST'
      description: 'User login with username/password'
    - path: '/auth/register'
      method: 'POST'
      description: 'Register new user'
    - path: '/auth/refresh'
      method: 'POST'
      description: 'Refresh access token'
    - path: '/auth/set-password'
      method: 'POST'
      description: 'Set new password for authenticated user'
    - path: '/auth/forgot-password'
      method: 'POST'
      description: 'Request password reset email'
    - path: '/auth/reset-password'
      method: 'POST'
      description: 'Reset password using reset token'
    - path: '/auth/validate'
      method: 'GET'
      description: 'Validate JWT token and return user information'
    - path: '/auth/check-permission'
      method: 'POST'
      description: 'Check if user has permission for module/role/action'

  # Konfiguracija za eksterni ADM auth server (kada auth_server = URL)
  # VAŽNO: ADM modul je uvek LOCAL (auth_server = "LOCAL")
  # Ova sekcija se koristi kada drugi moduli (CMN, WST, TIC, itd.) treba da pozivaju ADM server
  # za autentifikaciju i autorizaciju
  external_auth:
    # Base URL ADM auth servera (npr. "https://adm.example.com" ili "http://localhost:4001")
    # Ako je prazan, koristi se vrednost iz auth_server
    base_url: '' # Opciono, default: vrednost iz auth_server

    # Endpoint-i za komunikaciju sa ADM serverom
    # Ovi endpoint-i se pozivaju iz authGuard i permissionGuard middleware-a
    # kada drugi moduli (non-ADM) treba da provere token ili permisije
    endpoints:
      # Endpoint za validaciju JWT tokena i dobijanje korisničkih podataka
      # authGuard middleware poziva ovaj endpoint kada drugi modul treba da proveri token
      # POSTAVLJENO: Stvarni endpoint koji već postoji u ADM modulu
      jwt_validation:
        path: '/badm/adm/auth/validate' # Stvarni path u ADM modulu
        method: 'GET' # Stvarni HTTP method
        description: 'Validira JWT token i vraća korisničke podatke sa ADM servera'
        # Request headers: { Authorization: 'Bearer {token}' }
        # Request body: Nema (GET request)
        # Response: { userId: string, id: string, username: string, email?: string, admin: string, rolesByModule: object, scopes: object, channels?: array }
        # Error response: { message: string } sa status kodom 401 (Unauthorized)

      # Endpoint za proveru permisija
      # permissionGuard middleware poziva ovaj endpoint kada drugi modul treba da proveri permisije
      # POSTAVLJENO: Stvarni endpoint koji već postoji u ADM modulu
      permission_check:
        path: '/badm/adm/auth/check-permission' # Stvarni path u ADM modulu
        method: 'POST' # Stvarni HTTP method
        description: 'Proverava permisije korisnika za modul/role/action na ADM serveru'
        # Request headers: { Authorization: 'Bearer {token}' }
        # Request body: { moduleName: string, role?: string, action?: string }
        # Response: { status: boolean, allowedObjects?: string[] }
        # Error response: { message: string } sa status kodom 401 (Unauthorized) ili 403 (Forbidden)

    # Konfiguracija za HTTP zahteve ka ADM serveru
    # Ove opcije se koriste kada drugi moduli pozivaju ADM server endpoint-e
    http_config:
      timeout: 10000 # Timeout u milisekundama (default: 10000)
      max_retries: 3 # Maksimalan broj pokušaja (default: 3)
      retry_delay: 1000 # Delay između pokušaja u milisekundama (default: 1000)
      family: 4 # IP family (4 za IPv4, 6 za IPv6, default: 4)

  # Kada drugi moduli (non-ADM) koriste eksterni ADM auth server:
  # - authGuard poziva {base_url}{external_auth.endpoints.jwt_validation.path}
  # - permissionGuard poziva {base_url}{external_auth.endpoints.permission_check.path}
  # kada JWT token ne sadrži potrebne informacije ili kada treba verifikacija sa ADM servera

  # Napomena:
  # - ADM modul je uvek LOCAL (auth_server = "LOCAL") - koristi lokalnu bazu i JWT secret
  # - Drugi moduli (CMN, WST, TIC, itd.) koriste auth_server = URL (npr. "https://adm.example.com")
  # - Lokalni auth modul se generiše samo ako:
  #   1. auth_server = "LOCAL"
  #   2. module_prefix = "adm_" (detektuje se iz SQL prefiksa tabela)

# ============================================================================
# DATABASE CONFIGURATION
# ============================================================================
database:
  # SQL fajl sa schema definicijama
  schema_file: '' # Putanja do SQL fajla (npr. "schema.sql")

  # Automatska detekcija iz SQL fajla:
  auto_detect:
    table_prefix: true # Detektuje prefiks tabela (npr. "adm_" iz "adm_user")
    foreign_keys: true # Detektuje foreign key veze iz SQL definicija
    translation_tables: true # Detektuje translation tabele po patternu "tablenamex"

  # Translation table pattern
  translation:
    pattern: '{table_name}x' # Npr. "adm_roll" -> "adm_rollx"
    columns:
      - name: 'lang'
        type: 'varchar'
      - name: 'grammcase'
        type: 'varchar'
      - name: 'text'
        type: 'text'
    foreign_key_column: 'tableid' # Kolona koja referencira glavnu tabelu

  # Foreign key handling
  foreign_keys:
    # Automatski detektuje se iz SQL:
    # - Ime kolone koja referencira drugu tabelu
    # - Tabela na koju se referencira
    # - Više kolona mogu referencirati istu tabelu (npr. userlink: user_id -> adm_user, linked_user_id -> adm_user)
    auto_detect: true
    # Primer: ako kolona se zove "usergrp", automatski se detektuje da referencira "adm_usergrp"
    # i generiše se JOIN u repository-ju

# ============================================================================
# PROJECT STRUCTURE
# ============================================================================
structure:
  # Osnovna struktura direktorijuma
  directories:
    - 'src/modules/{module_name}'
    - 'src/core'
    - 'src/middleware'
    - 'src/config'
    - 'src/routes'
    - 'src/modules/{module_name}/__tests__'
    - 'review' # Review fajlovi (CI/CD, checklist, scripts)

  # Fajlovi po modulu (generišu se za svaku tabelu koja nije translation tabela)
  module_files:
    - '{module_name}.controller.ts'
    - '{module_name}.service.ts'
    - '{module_name}.repository.ts'
    - '{module_name}.routes.ts'
    - '{module_name}.dto.ts'
    - '__tests__/{module_name}.repository.test.ts'
    - '__tests__/{module_name}.service.test.ts'

  # Core fajlovi (generišu se jednom)
  core_files:
    - 'core/database/index.ts'
    - 'core/database/postgres-adapter.ts'
    - 'core/errors/AppError.ts'
    - 'core/types/auth.ts'
    - 'core/utils/crypto.ts'
    - 'core/utils/uniqueId.ts'
    - 'core/utils/pagination.ts'
    - 'core/utils/validation.ts'
    - 'core/utils/csrfToken.ts'
    - 'core/utils/cors.ts'
    - 'core/services/email.service.ts'

  # Config fajlovi
  config_files:
    - 'config/env.ts'
    - 'config/env.schema.ts'
    - 'config/db.config.ts'

  # App fajlovi
  app_files:
    - 'app.ts'
    - 'server.ts'
    - 'modules/index.ts'
    - 'routes/health.routes.ts'

  # Root konfiguracioni fajlovi
  root_files:
    - 'package.json'
    - 'tsconfig.json'
    - '.gitignore'
    - '.env.example'
    - 'Dockerfile'
    - 'docker-compose.yml'
    - 'README.md'
    - 'vitest.config.ts'

  # Middleware fajlovi
  middleware_files:
    - 'middleware/authGuard.ts'
    - 'middleware/permissionGuard.ts'
    - 'middleware/csrfProtection.ts'
